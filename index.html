const MSG_TOPICS=['Operation','Marketing','Supply','Finance','HR','Management','Other'];
const TOPIC_COLORS={Operation:'#14B8A6',Marketing:'#9B78D4',Supply:'#CC9C3A',Finance:'#5FB87A',HR:'#5B8FD4',Management:'#E0857A',Other:'#869490'};

function ContactHQ({profile,storeName,onSeen}){
  const [history,setHistory]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showNew,setShowNew]=useState(false);
  const [activeThread,setActiveThread]=useState(null);

  async function loadHistory(){
    setLoading(true);
    const frId=await resolveFranchiseeId(profile);
    if(frId){
      const{data}=await sb.from('ops_messages').select('*').eq('franchisee_id',frId).order('created_at',{ascending:false});
      setHistory(data||[]);
    }
    setLoading(false);
  }
  useEffect(()=>{loadHistory();},[]);

  const unreadCount=history.filter(m=>m.last_sender_role==='hq').length;

  return(
    <>
      <div className="page-header">
        <div>
          <div className="page-title" style={{display:'flex',alignItems:'center',gap:8}}>Contact HQ{unreadCount>0&&<span style={{background:'var(--red)',color:'#fff',borderRadius:999,fontSize:11,fontWeight:700,padding:'1px 8px'}}>{unreadCount}</span>}</div>
          <div className="page-sub">Messages with headquarters</div>
        </div>
        <button className="btn btn-primary" onClick={()=>setShowNew(true)}>+ New Message</button>
      </div>
      <div className="content">
        <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:12}}>Message History</div>
        {loading?<div className="loading">Loading...</div>:history.length===0?(
          <div style={{color:'var(--muted)',fontSize:13,padding:'20px 0'}}>No messages yet. Tap "+ New Message" to reach HQ.</div>
        ):history.map(m=>{
          const unread=m.last_sender_role==='hq';
          return(
            <div key={m.id} onClick={()=>setActiveThread(m)} style={{cursor:'pointer',background:'var(--panel)',border:`1px solid ${unread?'rgba(20,184,166,.45)':'var(--border)'}`,borderLeft:`3px solid ${TOPIC_COLORS[m.topic]||'#869490'}`,borderRadius:10,padding:14,marginBottom:10,transition:'border-color .15s'}}
              onMouseEnter={e=>e.currentTarget.style.borderColor=unread?'var(--teal)':'var(--border2)'} onMouseLeave={e=>e.currentTarget.style.borderColor=unread?'rgba(20,184,166,.45)':'var(--border)'}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6,gap:8,flexWrap:'wrap'}}>
                <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                  <span style={{fontSize:11,fontWeight:700,background:(TOPIC_COLORS[m.topic]||'#869490')+'22',color:TOPIC_COLORS[m.topic]||'#869490',padding:'2px 8px',borderRadius:999}}>{m.topic}</span>
                  <span style={{fontSize:14,fontWeight:700}}>{m.subject}</span>
                  {unread&&<span style={{background:'var(--teal)',color:'#04201C',borderRadius:999,fontSize:10,fontWeight:700,padding:'1px 7px'}}>New reply</span>}
                </div>
                <span style={{fontSize:11,color:unread?'var(--teal-bright)':m.status==='replied'?'var(--green)':'var(--muted)'}}>{unread?'● HQ replied':m.status==='replied'?'✓ Replied':'Awaiting reply'}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10}}>
                <div style={{fontSize:13,color:'var(--muted)',lineHeight:1.5,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.body}</div>
                <span style={{fontSize:11,color:'var(--muted2)',fontWeight:600,whiteSpace:'nowrap'}}>Open →</span>
              </div>
            </div>
          );
        })}
      </div>
      {showNew&&<NewMessageModal profile={profile} storeName={storeName} onClose={()=>setShowNew(false)} onSent={()=>{setShowNew(false);loadHistory();if(onSeen)onSeen();}}/>}
      {activeThread&&<FranchiseeThreadModal message={activeThread} profile={profile} storeName={storeName} onClose={()=>{setActiveThread(null);loadHistory();if(onSeen)onSeen();}} onSeen={onSeen}/>}
    </>
  );
}

// New message compose modal (franchisee → HQ)
function NewMessageModal({profile,storeName,onClose,onSent}){
  const [topic,setTopic]=useState('');
  const [subject,setSubject]=useState('');
  const [body,setBody]=useState('');
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState('');

  async function send(){
    if(!topic){setMsg('Please choose a topic.');return;}
    if(!subject.trim()||!body.trim()){setMsg('Subject and message are required.');return;}
    setBusy(true);setMsg('');
    const frId=await resolveFranchiseeId(profile);
    const{error}=await sb.from('ops_messages').insert([{
      franchisee_id:frId||null,store_name:storeName,
      sender_name:profile?.full_name||profile?.name||storeName,
      topic,subject:subject.trim(),body:body.trim(),status:'open',is_read:false,
    }]);
    if(error){setMsg('Error: '+error.message);setBusy(false);return;}
    try{
      await authFetch(EMAIL_FN,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          to:'hq@uglydonutsncorndogs.com',
          subject:`[${topic}] New message from ${storeName}: ${subject.trim()}`,
          html:`<div style="font-family:sans-serif;max-width:600px;margin:0 auto;background:#0E0E0E;color:#F0EDE8;padding:28px;border-radius:12px;"><div style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#14B8A6;margin-bottom:8px;">Franchise Ops · New Message</div><h2 style="margin:0 0 4px;font-size:18px;">${subject.trim()}</h2><div style="font-size:13px;color:#8A8480;margin-bottom:16px;">From <strong style="color:#F0EDE8;">${storeName}</strong> · Topic: <strong style="color:#14B8A6;">${topic}</strong></div><div style="background:#1A2A28;border:1px solid #243634;border-radius:10px;padding:16px;font-size:14px;line-height:1.6;white-space:pre-wrap;">${body.trim().replace(/</g,'&lt;')}</div><a href="https://uglyops.netlify.app" style="display:inline-block;margin-top:20px;background:#14B8A6;color:#04201C;padding:11px 22px;border-radius:8px;text-decoration:none;font-weight:700;font-size:14px;">Reply in Franchise Ops →</a></div>`,
        }),
      });
    }catch(e){/* email best-effort */}
    setBusy(false);
    if(onSent)onSent();
  }

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">New Message to HQ</div>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div className="form-group">
            <label>Topic</label>
            <div style={{display:'flex',flexWrap:'wrap',gap:8,marginTop:4}}>
              {MSG_TOPICS.map(t=>(
                <button key={t} onClick={()=>setTopic(t)} className="btn btn-sm"
                  style={{background:topic===t?TOPIC_COLORS[t]:'var(--panel2)',color:topic===t?'#04201C':'var(--text)',border:`1px solid ${topic===t?TOPIC_COLORS[t]:'var(--border2)'}`,fontWeight:topic===t?700:500}}>
                  {t}
                </button>
              ))}
            </div>
          </div>
          <div className="form-group"><label>Subject</label><input value={subject} onChange={e=>setSubject(e.target.value)} placeholder="Brief subject line"/></div>
          <div className="form-group"><label>Message</label><textarea value={body} onChange={e=>setBody(e.target.value)} rows={5} placeholder="Describe your question or issue..." style={{resize:'vertical'}}/></div>
          {msg&&<div style={{padding:12,background:msg.startsWith('✓')?'rgba(95,184,122,.1)':'rgba(224,82,82,.1)',border:`1px solid ${msg.startsWith('✓')?'rgba(95,184,122,.3)':'rgba(224,82,82,.3)'}`,borderRadius:8,fontSize:13,color:msg.startsWith('✓')?'var(--green)':'var(--red)'}}>{msg}</div>}
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={send} disabled={busy||!topic||!subject.trim()||!body.trim()}>{busy?'Sending...':'Send to HQ'}</button>
        </div>
      </div>
    </div>
  );
}

// Conversation thread modal (franchisee side)
function FranchiseeThreadModal({message,profile,storeName,onClose,onSeen}){
  const [replies,setReplies]=useState([]);
  const [loading,setLoading]=useState(true);
  const [reply,setReply]=useState('');
  const [busy,setBusy]=useState(false);

  async function loadReplies(){
    setLoading(true);
    const{data}=await sb.from('ops_message_replies').select('*').eq('message_id',message.id).order('created_at',{ascending:true});
    setReplies(data||[]);
    setLoading(false);
  }
  useEffect(()=>{
    loadReplies();
    if(message.last_sender_role==='hq'){
      sb.from('ops_messages').update({last_sender_role:'seen'}).eq('id',message.id).then(()=>{if(onSeen)onSeen();});
    }
  },[]);

  async function sendReply(){
    if(!reply.trim())return;
    setBusy(true);
    const{error}=await sb.from('ops_message_replies').insert([{
      message_id:message.id,sender_role:'franchisee',
      sender_name:profile?.full_name||profile?.name||storeName,body:reply.trim(),
    }]);
    if(error){setBusy(false);return;}
    await sb.from('ops_messages').update({is_read:false,status:'open',last_sender_role:'franchisee'}).eq('id',message.id);
    try{
      await authFetch(EMAIL_FN,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          to:'hq@uglydonutsncorndogs.com',
          subject:`[${message.topic}] ${storeName} replied: ${message.subject}`,
          html:`<div style="font-family:sans-serif;max-width:600px;margin:0 auto;background:#0E0E0E;color:#F0EDE8;padding:28px;border-radius:12px;"><div style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#14B8A6;margin-bottom:8px;">Franchise Ops · New Reply</div><h2 style="margin:0 0 4px;font-size:18px;">Re: ${message.subject}</h2><div style="font-size:13px;color:#8A8480;margin-bottom:16px;">From <strong style="color:#F0EDE8;">${storeName}</strong></div><div style="background:#1A2A28;border:1px solid #243634;border-radius:10px;padding:16px;font-size:14px;line-height:1.6;white-space:pre-wrap;">${reply.trim().replace(/</g,'&lt;')}</div><a href="https://uglyops.netlify.app" style="display:inline-block;margin-top:20px;background:#14B8A6;color:#04201C;padding:11px 22px;border-radius:8px;text-decoration:none;font-weight:700;font-size:14px;">Reply in Franchise Ops →</a></div>`,
        }),
      });
    }catch(e){/* best-effort */}
    setReply('');
    await loadReplies();
    setBusy(false);
  }

  const thread=buildThread(message,replies);

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div>
            <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:3,flexWrap:'wrap'}}>
              <span style={{fontSize:11,fontWeight:700,background:(TOPIC_COLORS[message.topic]||'#869490')+'22',color:TOPIC_COLORS[message.topic]||'#869490',padding:'2px 8px',borderRadius:999}}>{message.topic}</span>
            </div>
            <div className="modal-title" style={{margin:0}}>{message.subject}</div>
          </div>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          {loading?<div style={{padding:'12px 0',color:'var(--muted)',fontSize:13}}>Loading...</div>:(
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {thread.map((t,i)=>{
                const isMe=t.role==='franchisee';
                return(
                  <div key={i} style={{display:'flex',flexDirection:'column',alignItems:isMe?'flex-end':'flex-start'}}>
                    <div style={{maxWidth:'82%',background:isMe?'var(--panel2)':'var(--teal)',color:isMe?'var(--text)':'#04201C',borderRadius:isMe?'12px 12px 2px 12px':'12px 12px 12px 2px',padding:'11px 13px',fontSize:14,lineHeight:1.55,whiteSpace:'pre-wrap'}}>{t.body}</div>
                    <div style={{fontSize:10,color:'var(--muted2)',marginTop:3,padding:'0 4px'}}>{t.role==='hq'?'HQ':'You'} · {new Date(t.at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
        <div className="modal-footer" style={{flexDirection:'column',alignItems:'stretch',gap:8}}>
          <textarea value={reply} onChange={e=>setReply(e.target.value)} rows={2} placeholder="Reply to HQ..." style={{width:'100%',background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:14,outline:'none',resize:'vertical'}}/>
          <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
            <button className="btn btn-ghost" onClick={onClose}>Close</button>
            <button className="btn btn-primary" onClick={sendReply} disabled={busy||!reply.trim()}>{busy?'...':'Send Reply'}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── FRANCHISEE WARNINGS (own standing) ────────────────────
function FranchiseeWarnings({profile,storeName,onUpdate}){
  const [warnings,setWarnings]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selected,setSelected]=useState(null);

  async function load(){
    setLoading(true);
    const frId=await resolveFranchiseeId(profile);
    if(frId){
      const{data}=await sb.from('ops_warnings').select('*').eq('franchisee_id',frId).order('issued_at',{ascending:false});
      setWarnings(data||[]);
      // Viewing My Standing marks every warning as seen at its current status, which
      // clears the notification badge. Status changes by HQ re-trigger it next time.
      try{await sb.rpc('mark_my_warnings_seen');}catch(e){}
      if(onUpdate)onUpdate();
    }
    setLoading(false);
  }
  useEffect(()=>{load();},[]);

  const oneYearAgo=new Date(Date.now()-365*24*60*60*1000);
  const activeCount=warnings.filter(w=>w.status!=='rescinded'&&new Date(w.issued_at)>=oneYearAgo).length;
  const color=activeCount>=3?'var(--red)':activeCount===2?'var(--gold)':activeCount===1?'var(--blue)':'var(--green)';

  return(
    <>
      <div className="page-header"><div><div className="page-title">My Standing</div><div className="page-sub">Compliance status and warning history</div></div></div>
      <div className="content">
        {/* Standing card */}
        <div className="card" style={{maxWidth:520,marginBottom:24,border:`1px solid ${activeCount>=3?'rgba(224,82,82,.4)':activeCount===2?'rgba(204,156,58,.4)':'var(--border)'}`}}>
          <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:12}}>Active Warnings (last 12 months)</div>
          <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:12}}>
            <div style={{display:'flex',gap:6}}>
              {[0,1,2].map(i=>(
                <div key={i} style={{width:40,height:14,borderRadius:5,background:i<activeCount?color:'var(--border2)'}}/>
              ))}
            </div>
            <span style={{fontSize:20,fontWeight:700,color}}>{activeCount}/3</span>
          </div>
          {activeCount>=3?(
            <div style={{fontSize:13,color:'var(--red)',lineHeight:1.5}}>Your store has reached the warning threshold defined in the Franchise Agreement. Please contact HQ immediately.</div>
          ):activeCount===2?(
            <div style={{fontSize:13,color:'var(--gold)',lineHeight:1.5}}>One more warning within 12 months may trigger a termination review. Please address any outstanding issues.</div>
          ):activeCount===1?(
            <div style={{fontSize:13,color:'var(--muted)',lineHeight:1.5}}>You have one active warning. Maintain compliance to keep your standing in good order.</div>
          ):(
            <div style={{fontSize:13,color:'var(--green)',lineHeight:1.5}}>Your store is in good standing. No active warnings.</div>
          )}
        </div>

        {/* History */}
        <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:12}}>Warning History</div>
        {loading?<div className="loading">Loading...</div>:warnings.length===0?(
          <div style={{color:'var(--muted)',fontSize:13,padding:'10px 0'}}>No warnings on record. Keep up the great work!</div>
        ):warnings.map(w=>{
          const expired=new Date(w.issued_at)<oneYearAgo;
          const dl=deadlineInfo(w.deadline);
          const preview=w.reason.length>70?w.reason.slice(0,70)+'…':w.reason;
          return(
            <div key={w.id} onClick={()=>setSelected(w)} style={{cursor:'pointer',background:'var(--panel)',border:'1px solid var(--border)',borderLeft:`3px solid ${w.status==='rescinded'?'var(--muted2)':w.status==='submitted'?'var(--gold)':expired?'var(--border2)':'var(--red)'}`,borderRadius:10,padding:14,marginBottom:10,opacity:w.status==='rescinded'||expired?0.65:1,transition:'border-color .15s'}}
              onMouseEnter={e=>e.currentTarget.style.borderColor='var(--border2)'} onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6,flexWrap:'wrap',gap:6}}>
                <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                  <span style={{fontSize:11,fontWeight:700,background:'rgba(224,82,82,.15)',color:'var(--red)',padding:'2px 8px',borderRadius:999}}>{w.category}</span>
                  {w.status==='submitted'&&<span style={{fontSize:10,color:'var(--gold)',fontWeight:700,textTransform:'uppercase'}}>● Under review</span>}
                  {w.status==='registered'&&<span style={{fontSize:10,color:'var(--red)',fontWeight:700,textTransform:'uppercase'}}>● Warning Registered</span>}
                  {w.status==='rescinded'&&<span style={{fontSize:10,color:'var(--green)',fontWeight:700,textTransform:'uppercase'}}>✓ Rescinded</span>}
                  {expired&&w.status!=='rescinded'&&<span style={{fontSize:10,color:'var(--muted)',fontWeight:700,textTransform:'uppercase'}}>Expired</span>}
                  {dl&&w.status!=='rescinded'&&!expired&&<span style={{fontSize:10,fontWeight:700,color:dl.color,border:`1px solid ${dl.color}`,padding:'1px 7px',borderRadius:999}}>{dl.label}</span>}
                </div>
                <span style={{fontSize:11,color:'var(--muted)'}}>{new Date(w.issued_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10}}>
                <div style={{fontSize:13,color:'var(--muted)',lineHeight:1.5,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{preview}</div>
                <span style={{fontSize:11,color:'var(--muted2)',fontWeight:600,whiteSpace:'nowrap'}}>View →</span>
              </div>
            </div>
          );
        })}
      </div>
      {selected&&<FranchiseeWarningModal warning={selected} onClose={()=>setSelected(null)} onAction={load}/>}
    </>
  );
}

// ── FRANCHISEE WARNING DETAIL (read-only) ─────────────────
function FranchiseeWarningModal({warning,onClose,onAction}){
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState('');
  const oneYearAgo=new Date(Date.now()-365*24*60*60*1000);
  const expired=new Date(warning.issued_at)<oneYearAgo;
  const dl=deadlineInfo(warning.deadline);
  const canSubmit=warning.status==='active'&&!expired;

  async function submitForReview(){
    setBusy(true);setMsg('');
    const{error}=await sb.rpc('submit_warning_for_review',{p_warning_id:warning.id});
    setBusy(false);
    if(error){setMsg('Error: '+error.message);return;}
    if(onAction)onAction();
    onClose();
  }

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div>
            <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:4,flexWrap:'wrap'}}>
              <span style={{fontSize:11,fontWeight:700,background:'rgba(224,82,82,.15)',color:'var(--red)',padding:'2px 8px',borderRadius:999}}>{warning.category}</span>
              {warning.status==='submitted'&&<span style={{fontSize:10,color:'var(--gold)',fontWeight:700,textTransform:'uppercase'}}>● Under review</span>}
              {warning.status==='registered'&&<span style={{fontSize:10,color:'var(--red)',fontWeight:700,textTransform:'uppercase'}}>● Warning Registered</span>}
              {warning.status==='rescinded'&&<span style={{fontSize:10,color:'var(--green)',fontWeight:700,textTransform:'uppercase'}}>✓ Rescinded</span>}
              {expired&&warning.status!=='rescinded'&&<span style={{fontSize:10,color:'var(--muted)',fontWeight:700,textTransform:'uppercase'}}>Expired</span>}
              {canSubmit&&<span style={{fontSize:10,color:'var(--red)',fontWeight:700,textTransform:'uppercase'}}>Active</span>}
              {dl&&warning.status!=='rescinded'&&<span style={{fontSize:10,fontWeight:700,color:dl.color,border:`1px solid ${dl.color}`,padding:'1px 7px',borderRadius:999}}>{dl.label}</span>}
            </div>
            <div className="modal-title" style={{margin:0}}>Official Warning</div>
          </div>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          {dl&&warning.status!=='rescinded'&&(
            <div style={{background:dl.overdue?'rgba(224,82,82,.1)':'var(--panel2)',border:`1px solid ${dl.overdue?'rgba(224,82,82,.35)':'var(--border)'}`,borderRadius:10,padding:14,marginBottom:16,display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,flexWrap:'wrap'}}>
              <div>
                <div style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',fontWeight:700,marginBottom:3}}>Correction Deadline</div>
                <div style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>{dl.dateStr}</div>
              </div>
              <div style={{fontSize:22,fontWeight:800,color:dl.color}}>{dl.label}</div>
            </div>
          )}
          <div style={{fontSize:11,color:'var(--muted)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.06em',fontWeight:700}}>Reason</div>
          <div style={{background:'var(--panel2)',borderRadius:10,padding:16,fontSize:14,lineHeight:1.6,whiteSpace:'pre-wrap',marginBottom:16}}>{warning.reason}</div>
          <div style={{fontSize:11,color:'var(--muted2)',marginBottom:4}}>Issued by {warning.issued_by||'HQ'} on {new Date(warning.issued_at).toLocaleString('en-US',{month:'long',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'})}</div>
          {canSubmit&&(
            <div style={{fontSize:12,color:'var(--muted)',marginTop:8,lineHeight:1.5}}>Once you have corrected this issue, submit it for HQ review by the deadline. HQ will either rescind the warning (if resolved) or keep it on record.</div>
          )}
          {warning.status==='submitted'&&(
            <div style={{background:'rgba(204,156,58,.1)',border:'1px solid rgba(204,156,58,.3)',borderRadius:8,padding:12,marginTop:12}}>
              <div style={{fontSize:13,color:'var(--gold)',fontWeight:700,marginBottom:2}}>Submitted for review{warning.submitted_at?` on ${new Date(warning.submitted_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`:''}.</div>
              <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.5}}>HQ is reviewing your correction. You will see the outcome here once reviewed.</div>
            </div>
          )}
          {warning.status==='registered'&&(
            <div style={{background:'rgba(224,82,82,.1)',border:'1px solid rgba(224,82,82,.3)',borderRadius:8,padding:12,marginTop:12}}>
              <div style={{fontSize:13,color:'var(--red)',fontWeight:700,marginBottom:2}}>Warning Registered.</div>
              <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.5}}>HQ reviewed your submission and this warning stands as an official strike on your record. It still counts toward your standing.</div>
            </div>
          )}
          {warning.status==='rescinded'&&(
            <div style={{background:'rgba(95,184,122,.1)',border:'1px solid rgba(95,184,122,.3)',borderRadius:8,padding:12,marginTop:12}}>
              <div style={{fontSize:10,fontWeight:700,color:'var(--green)',textTransform:'uppercase',marginBottom:4}}>Rescinded {warning.rescinded_at?`· ${new Date(warning.rescinded_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`:''}</div>
              <div style={{fontSize:13,color:'var(--text)',lineHeight:1.5}}>{warning.rescinded_reason||'This warning has been rescinded by HQ. It no longer counts toward your standing, but remains on record.'}</div>
            </div>
          )}
          {msg&&<div style={{fontSize:13,color:'var(--red)',marginTop:8}}>{msg}</div>}
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Close</button>
          {canSubmit&&<button className="btn btn-primary" onClick={submitForReview} disabled={busy}>{busy?'Submitting...':'Submit for Review'}</button>}
        </div>
      </div>
    </div>
  );
}

// ── FRANCHISEE TASKS ──────────────────────────────────────
function FranchiseeTasks({profile,onUpdate}){
  const [assignments,setAssignments]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selected,setSelected]=useState(null);
  const [subtasksMap,setSubtasksMap]=useState({});
  const [completionsMap,setCompletionsMap]=useState({});
  const [notLinked,setNotLinked]=useState(false);

  async function load(){
    setLoading(true);
    const fr=await resolveFranchisee(profile);
    if(!fr){setNotLinked(true);setLoading(false);return;}
    setNotLinked(false);

    const{data:assigns}=await sb.from('ops_assignments')
      .select('*,ops_tasks(title,description,category,due_date,require_hq_approval,status)')
      .eq('franchisee_id',fr.id)
      .order('created_at',{ascending:false});
    // Filter out archived tasks client-side
    const filteredAssigns=(assigns||[]).filter(a=>a.ops_tasks?.status!=='archived');

    setAssignments(filteredAssigns||[]);

    // Load subtasks and completions for each assignment
    const stMap={},cMap={};
    await Promise.all((filteredAssigns||[]).map(async a=>{
      const[stRes,cRes]=await Promise.all([
        sb.from('ops_subtasks').select('*').eq('ops_task_id',a.ops_task_id).order('sort_order'),
        sb.from('ops_completions').select('*').eq('ops_assignment_id',a.id),
      ]);
      stMap[a.id]=stRes.data||[];
      cMap[a.id]=cRes.data||[];
    }));
    setSubtasksMap(stMap);setCompletionsMap(cMap);
    setLoading(false);
  }
  useEffect(()=>{load();},[]);

  const statusColors={pending:'var(--muted)',in_progress:'var(--blue)',submitted:'var(--gold)',approved:'var(--green)',rejected:'var(--red)'};

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">My Tasks</div><div className="page-sub">Tasks assigned by HQ</div></div>
      </div>
      <div className="content">
        {loading?<div className="loading">Loading...</div>:notLinked?(
          <div className="empty"><div className="empty-icon">⚠</div><div className="empty-title">Account not linked to a store</div><div style={{fontSize:13,color:'var(--muted)',lineHeight:1.6,maxWidth:420,margin:'0 auto'}}>We couldn't connect your login to a store record, so tasks can't be shown. This is not the same as having no tasks. Please contact HQ to fix your account link.</div></div>
        ):assignments.length===0?(
          <div className="empty"><div className="empty-icon">▤</div><div className="empty-title">No tasks yet</div><div style={{fontSize:13,color:'var(--muted)'}}>HQ will assign tasks here</div></div>
        ):(
          assignments.map(a=>(
            <div key={a.id} style={{background:'var(--panel)',border:`1px solid ${a.status==='rejected'?'rgba(224,82,82,.3)':'var(--border)'}`,borderRadius:12,padding:18,marginBottom:12,cursor:'pointer',transition:'border-color .2s'}}
              onClick={()=>setSelected(a)}
              onMouseEnter={e=>e.currentTarget.style.borderColor='var(--orange)'}
              onMouseLeave={e=>e.currentTarget.style.borderColor=a.status==='rejected'?'rgba(224,82,82,.3)':'var(--border)'}>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <span className={`cat-badge cat-${a.ops_tasks?.category}`}>{catLabel(a.ops_tasks?.category)}</span>
                  <span style={{fontSize:15,fontWeight:700}}>{a.ops_tasks?.title}</span>
                </div>
                <span style={{fontSize:12,fontWeight:700,color:statusColors[a.status],background:statusColors[a.status]+'22',padding:'2px 10px',borderRadius:999,whiteSpace:'nowrap'}}>
                  {STATUS_LABELS[a.status]||a.status}
                </span>
              </div>
              {a.ops_tasks?.description&&<div style={{fontSize:13,color:'var(--muted)',marginBottom:8}}>{a.ops_tasks.description}</div>}
              {a.ops_tasks?.due_date&&<div style={{fontSize:12,color:daysUntil(a.ops_tasks.due_date)<0?'var(--red)':daysUntil(a.ops_tasks.due_date)<=3?'var(--orange)':'var(--muted)'}}>
                Due: {fmtDate(a.ops_tasks.due_date)} {daysUntil(a.ops_tasks.due_date)<0&&'· OVERDUE'}
              </div>}
              {a.status==='rejected'&&a.hq_notes&&(
                <div style={{marginTop:8,padding:10,background:'rgba(224,82,82,.08)',border:'1px solid rgba(224,82,82,.2)',borderRadius:6,fontSize:12,color:'var(--red)'}}>
                  HQ Feedback: {a.hq_notes}
                </div>
              )}
              {(subtasksMap[a.id]||[]).length>0&&(
                <div style={{marginTop:8,fontSize:12,color:'var(--muted)'}}>
                  {(completionsMap[a.id]||[]).filter(c=>c.completed).length}/{(subtasksMap[a.id]||[]).length} sub-tasks complete
                </div>
              )}
            </div>
          ))
        )}
      </div>
      {selected&&<FranchiseeTaskModal assignment={selected} subtasks={subtasksMap[selected.id]||[]} completions={completionsMap[selected.id]||[]} onClose={()=>{setSelected(null);load();if(onUpdate)onUpdate();}}/>}
    </>
  );
}

// ── FRANCHISEE TASK MODAL ─────────────────────────────────
function FranchiseeTaskModal({assignment,subtasks,completions,onClose}){
  const [comps,setComps]=useState(completions);
  const [busy,setBusy]=useState(false);
  const [uploadingId,setUploadingId]=useState(null);
  const [textInputs,setTextInputs]=useState({});

  async function toggleSubtask(st){
    const existing=comps.find(c=>c.ops_subtask_id===st.id);
    if(existing?.completed)return; // can't uncheck
    setBusy(true);
    let err=null;
    if(existing){
      const r=await sb.from('ops_completions').update({completed:true,completed_at:new Date().toISOString()}).eq('id',existing.id);
      err=r.error;
    }else{
      const r=await sb.from('ops_completions').insert([{ops_assignment_id:assignment.id,ops_subtask_id:st.id,completed:true,completed_at:new Date().toISOString()}]);
      err=r.error;
    }
    if(err){alert('Could not mark complete: '+err.message+'\nPlease try again.');setBusy(false);return;}
    const{data}=await sb.from('ops_completions').select('*').eq('ops_assignment_id',assignment.id);
    setComps(data||[]);
    setBusy(false);
  }

  async function uploadProof(st, file){
    // Guard against very large phone photos that stall or fail
    if(file.size>10*1024*1024){
      alert('That image is '+(file.size/1024/1024).toFixed(1)+'MB. Please use a photo under 10MB (most phones let you choose a smaller size).');
      return;
    }
    setUploadingId(st.id);
    const path=`proofs/${Date.now()}-${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
    const{error}=await sb.storage.from('ops-proofs').upload(path,file,{contentType:file.type});
    if(error){alert('Upload failed: '+error.message);setUploadingId(null);return;}
    const{data:urlData}=sb.storage.from('ops-proofs').getPublicUrl(path);
    // Save completion with proof
    const existing=comps.find(c=>c.ops_subtask_id===st.id);
    let saveErr=null;
    if(existing){
      const r=await sb.from('ops_completions').update({completed:true,completed_at:new Date().toISOString(),proof_image_url:urlData.publicUrl,proof_text:textInputs[st.id]||null}).eq('id',existing.id);
      saveErr=r.error;
    }else{
      const r=await sb.from('ops_completions').insert([{ops_assignment_id:assignment.id,ops_subtask_id:st.id,completed:true,completed_at:new Date().toISOString(),proof_image_url:urlData.publicUrl,proof_text:textInputs[st.id]||null}]);
      saveErr=r.error;
    }
    if(saveErr){alert('Photo uploaded but saving failed: '+saveErr.message+'\nPlease try again.');setUploadingId(null);return;}
    const{data}=await sb.from('ops_completions').select('*').eq('ops_assignment_id',assignment.id);
    setComps(data||[]);
    setUploadingId(null);
  }

  async function saveTextProof(st){
    const text=textInputs[st.id];
    if(!text?.trim())return;
    setBusy(true);
    const existing=comps.find(c=>c.ops_subtask_id===st.id);
    let err=null;
    if(existing){
      const r=await sb.from('ops_completions').update({completed:true,completed_at:new Date().toISOString(),proof_text:text}).eq('id',existing.id);
      err=r.error;
    }else{
      const r=await sb.from('ops_completions').insert([{ops_assignment_id:assignment.id,ops_subtask_id:st.id,completed:true,completed_at:new Date().toISOString(),proof_text:text}]);
      err=r.error;
    }
    if(err){alert('Could not save: '+err.message+'\nPlease try again.');setBusy(false);return;}
    const{data}=await sb.from('ops_completions').select('*').eq('ops_assignment_id',assignment.id);
    setComps(data||[]);
    setBusy(false);
  }

  async function submitToHQ(){
    if(!window.confirm('Submit all completed tasks to HQ for review?'))return;
    setBusy(true);
    const{error}=await sb.from('ops_assignments').update({status:assignment.ops_tasks?.require_hq_approval?'submitted':'approved',updated_at:new Date().toISOString()}).eq('id',assignment.id);
    setBusy(false);
    if(error){alert('Submit failed: '+error.message+'\nPlease try again.');return;}
    onClose();
  }

  const allRequired=subtasks.filter(s=>s.is_required);
  const allRequiredDone=allRequired.every(s=>comps.find(c=>c.ops_subtask_id===s.id&&c.completed));
  const totalDone=comps.filter(c=>c.completed).length;
  const pct=subtasks.length?Math.round(totalDone/subtasks.length*100):0;
  const canSubmit=assignment.status==='pending'||assignment.status==='in_progress'||assignment.status==='rejected';

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-lg">
        <div className="modal-header">
          <div>
            <div style={{display:'flex',gap:8,marginBottom:4}}>
              <span className={`cat-badge cat-${assignment.ops_tasks?.category}`}>{catLabel(assignment.ops_tasks?.category)}</span>
            </div>
            <div className="modal-title">{assignment.ops_tasks?.title}</div>
            {assignment.ops_tasks?.description&&<div style={{fontSize:12,color:'var(--muted)',marginTop:3}}>{assignment.ops_tasks.description}</div>}
          </div>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          {assignment.status==='rejected'&&assignment.hq_notes&&(
            <div style={{marginBottom:16,padding:12,background:'rgba(224,82,82,.08)',border:'1px solid rgba(224,82,82,.2)',borderRadius:8,fontSize:13,color:'var(--red)'}}>
              <strong>HQ Feedback:</strong> {assignment.hq_notes}
            </div>
          )}
          {assignment.status==='approved'&&(
            <div style={{marginBottom:16,padding:12,background:'rgba(95,184,122,.08)',border:'1px solid rgba(95,184,122,.2)',borderRadius:8,fontSize:13,color:'var(--green)',textAlign:'center',fontWeight:700}}>
              ✓ Approved by HQ
            </div>
          )}

          <div style={{marginBottom:16}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
              <span style={{color:'var(--muted)'}}>{totalDone}/{subtasks.length} complete</span>
              <span style={{fontWeight:700,color:pct===100?'var(--green)':'var(--orange)'}}>{pct}%</span>
            </div>
            <div className="progress-bar"><div className="progress-fill" style={{width:`${pct}%`,background:pct===100?'var(--green)':'var(--orange)'}}/></div>
          </div>

          {subtasks.map(st=>{
            const comp=comps.find(c=>c.ops_subtask_id===st.id);
            const done=comp?.completed;
            return(
              <div key={st.id} style={{padding:'14px 0',borderBottom:'1px solid var(--border)'}}>
                <div style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:done?8:12}}>
                  <div style={{width:22,height:22,borderRadius:5,background:done?'var(--green)':'var(--panel2)',border:`2px solid ${done?'var(--green)':'var(--border2)'}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}>
                    {done&&<span style={{fontSize:13,color:'#000',fontWeight:700}}>✓</span>}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:done?'var(--muted)':'var(--text)',textDecoration:done?'line-through':'none'}}>{st.title}</div>
                    {st.description&&<div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{st.description}</div>}
                    <div style={{fontSize:10,color:'var(--muted2)',marginTop:2}}>{PROOF_TYPES.find(p=>p.key===st.proof_type)?.label}{st.is_required&&<span style={{color:'var(--red)',marginLeft:4}}>*Required</span>}</div>
                  </div>
                </div>

                {/* Proof area */}
                {!done&&canSubmit&&(
                  <div style={{paddingLeft:32}}>
                    {st.proof_type==='photo'&&(
                      <label style={{display:'inline-flex',alignItems:'center',gap:8,background:'var(--panel2)',border:'1px dashed var(--border2)',borderRadius:8,padding:'8px 14px',cursor:'pointer',fontSize:13,color:'var(--muted)'}}>
                        {uploadingId===st.id?'Uploading...':'📷 Upload Photo'}
                        <input type="file" accept="image/*" onChange={e=>e.target.files[0]&&uploadProof(st,e.target.files[0])} style={{display:'none'}} disabled={uploadingId===st.id}/>
                      </label>
                    )}
                    {st.proof_type==='text'&&(
                      <div style={{display:'flex',gap:8}}>
                        <input value={textInputs[st.id]||''} onChange={e=>setTextInputs(t=>({...t,[st.id]:e.target.value}))} placeholder="Enter confirmation..." style={{flex:1,background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'8px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none'}}/>
                        <button className="btn btn-primary btn-sm" onClick={()=>saveTextProof(st)} disabled={busy}>Submit</button>
                      </div>
                    )}
                    {st.proof_type==='checkbox'&&(
                      <button className="btn btn-ghost btn-sm" onClick={()=>toggleSubtask(st)} disabled={busy}>Mark Complete</button>
                    )}
                  </div>
                )}

                {/* Show proof */}
                {done&&(
                  <div style={{paddingLeft:32}}>
                    {comp.proof_image_url&&<img src={comp.proof_image_url} alt="proof" style={{maxWidth:200,maxHeight:150,borderRadius:6,objectFit:'cover',border:'1px solid var(--border)'}}/>}
                    {comp.proof_text&&<div style={{fontSize:12,color:'var(--muted)',fontStyle:'italic'}}>{comp.proof_text}</div>}
                    {!comp.proof_image_url&&!comp.proof_text&&<div style={{fontSize:11,color:'var(--muted)'}}>Marked complete</div>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Close</button>
          {canSubmit&&(
            <button className="btn btn-primary" onClick={submitToHQ} disabled={busy||!allRequiredDone}>
              {busy?'Submitting...':assignment.ops_tasks?.require_hq_approval?'Submit to HQ for Approval →':'Mark as Complete →'}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// ── FRANCHISEE ANNOUNCEMENTS ──────────────────────────────
function FranchiseeAnnouncements({profile,onUpdate}){
  const [announcements,setAnnouncements]=useState([]);
  const [receipts,setReceipts]=useState([]);
  const [loading,setLoading]=useState(true);
  const [franchiseeId,setFranchiseeId]=useState(null);

  useEffect(()=>{
    async function load(){
      setLoading(true);
      const frId=await resolveFranchiseeId(profile);
      setFranchiseeId(frId);

      const[aRes,rRes]=await Promise.all([
        sb.from('ops_announcements').select('*').eq('status','active').order('created_at',{ascending:false}),
        frId?sb.from('ops_announcement_receipts').select('*').eq('franchisee_id',frId):{data:[]},
      ]);
      setAnnouncements(aRes.data||[]);
      setReceipts(rRes.data||[]);
      setLoading(false);
    }
    load();
  },[]);

  async function confirm(annId){
    if(!franchiseeId){
      alert('Unable to confirm receipt — store not linked. Please contact HQ.');
      return;
    }
    const existing=receipts.find(r=>r.announcement_id===annId);
    if(existing?.confirmed)return;
    let error=null;
    if(existing){
      const res=await sb.from('ops_announcement_receipts').update({confirmed:true,confirmed_at:new Date().toISOString()}).eq('id',existing.id);
      error=res.error;
    }else{
      const res=await sb.from('ops_announcement_receipts').insert([{announcement_id:annId,franchisee_id:franchiseeId,confirmed:true,confirmed_at:new Date().toISOString()}]);
      error=res.error;
    }
    if(error){
      alert('Failed to confirm receipt. Please try again or contact HQ.');
      return;
    }
    // Only update UI after successful DB save
    const{data}=await sb.from('ops_announcement_receipts').select('*').eq('franchisee_id',franchiseeId);
    setReceipts(data||[]);
    if(onUpdate)onUpdate();
  }

  const ANN_CATS=[
    {key:'general',label:'General',color:'#5B8FD4'},
    {key:'urgent',label:'Urgent',color:'#E05252'},
    {key:'menu',label:'Menu Update',color:'#CC9C3A'},
    {key:'policy',label:'Policy',color:'#9B78D4'},
  ];
  function catColor(k){return ANN_CATS.find(c=>c.key===k)?.color||'#5B8FD4';}
  function catLbl(k){return ANN_CATS.find(c=>c.key===k)?.label||k;}

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Announcements</div><div className="page-sub">Messages from HQ</div></div>
      </div>
      <div className="content">
        {!loading&&!franchiseeId&&(
          <div style={{background:'rgba(224,82,82,.1)',border:'1px solid rgba(224,82,82,.3)',borderRadius:10,padding:14,marginBottom:16,fontSize:13,color:'var(--red)',lineHeight:1.5}}>
            ⚠ Your login isn't linked to a store, so you can't confirm receipts. Please contact HQ to fix your account.
          </div>
        )}
        {loading?<div className="loading">Loading...</div>:announcements.length===0?(
          <div className="empty"><div className="empty-icon">◈</div><div className="empty-title">No announcements</div></div>
        ):(
          announcements.map(ann=>{
            const receipt=receipts.find(r=>r.announcement_id===ann.id);
            const confirmed=receipt?.confirmed;
            const color=catColor(ann.category);
            return(
              <div key={ann.id} style={{background:'var(--panel)',border:`1px solid ${confirmed?'rgba(95,184,122,.3)':'var(--border)'}`,borderLeft:`3px solid ${color}`,borderRadius:12,padding:18,marginBottom:12}}>
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <span style={{fontSize:11,fontWeight:700,background:color+'22',color,padding:'2px 8px',borderRadius:999,textTransform:'uppercase'}}>{catLbl(ann.category)}</span>
                    <span style={{fontSize:11,color:'var(--muted)'}}>{fmtDate(ann.created_at)}</span>
                    {ann.due_date&&<span style={{fontSize:11,fontWeight:700,color:'var(--gold)'}}>Confirm by {fmtDate(ann.due_date)}</span>}
                  </div>
                  {confirmed
                    ?<span style={{fontSize:12,color:'var(--green)',fontWeight:700}}>✓ Received</span>
                    :<button className="btn btn-primary btn-sm" onClick={()=>confirm(ann.id)}>Confirm Receipt</button>
                  }
                </div>
                <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>{ann.title}</div>
                <div style={{fontSize:13,color:'var(--muted)',lineHeight:1.6,whiteSpace:'pre-wrap',marginBottom:12}}>{ann.body}</div>
                {/* Attachments */}
                {(ann.attachment_url||ann.link_url)&&(
                  <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:8}}>
                    {ann.attachment_url&&ann.attachment_type==='image'&&(
                      <a href={ann.attachment_url} target="_blank" rel="noreferrer">
                        <img src={ann.attachment_url} alt={ann.attachment_name} style={{maxHeight:160,maxWidth:260,borderRadius:6,objectFit:'cover',border:'1px solid var(--border)',cursor:'pointer'}}/>
                      </a>
                    )}
                    {ann.attachment_url&&ann.attachment_type==='video'&&(
                      <video src={ann.attachment_url} controls style={{maxHeight:200,maxWidth:320,borderRadius:6,border:'1px solid var(--border)'}}/>
                    )}
                    {ann.attachment_url&&(ann.attachment_type==='pdf'||ann.attachment_type==='file')&&(
                      <a href={ann.attachment_url} target="_blank" rel="noreferrer" style={{display:'flex',alignItems:'center',gap:8,background:'rgba(204,156,58,.1)',border:'1px solid rgba(204,156,58,.3)',borderRadius:8,padding:'10px 16px',textDecoration:'none',color:'var(--gold)',fontSize:13,fontWeight:600}}>
                        {ann.attachment_type==='pdf'?'📄':'📎'} {ann.attachment_name||'Download File'}
                      </a>
                    )}
                    {ann.link_url&&(
                      <a href={ann.link_url} target="_blank" rel="noreferrer" style={{display:'flex',alignItems:'center',gap:8,background:'rgba(155,120,212,.1)',border:'1px solid rgba(155,120,212,.3)',borderRadius:8,padding:'10px 16px',textDecoration:'none',color:'var(--purple)',fontSize:13,fontWeight:600}}>
                        🔗 {ann.link_label||'View Link'}
                      </a>
                    )}
                  </div>
                )}
              </div>
            );
          })
        )}
      </div>
    </>
  );
}

// ── UGLYBOT PORTAL ────────────────────────────────────────
function UglyBotModal({onClose}){
  const [src,setSrc]=React.useState(null);
  // Full-screen popup of the same UglyBot app (uglybot.netlify.app). Both apps share
  // the same Supabase project, so we hand the current session to the iframe via the URL
  // hash and the user is signed in automatically (no second login). Using the
  // "modal-overlay" class lets the global scroll-lock also pin this to the visible
  // viewport on mobile, so the bot's input stays above the keyboard.
  React.useEffect(()=>{
    (async()=>{
      let url='https://uglybot.netlify.app/';
      try{
        const{data}=await sb.auth.getSession();
        const s=data&&data.session;
        if(s&&s.access_token&&s.refresh_token){
          const p=new URLSearchParams({
            access_token:s.access_token,
            refresh_token:s.refresh_token,
            expires_in:String(s.expires_in||3600),
            token_type:'bearer',
            type:'magiclink',
          });
          url='https://uglybot.netlify.app/#'+p.toString();
        }
      }catch(e){/* fall back to manual login */}
      setSrc(url);
    })();
  },[]);
  return(
    <div className="modal-overlay" style={{background:'var(--bg)',padding:0,alignItems:'stretch',justifyContent:'flex-start',flexDirection:'column',zIndex:2000}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 16px',borderBottom:'1px solid var(--border)',background:'var(--panel)',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontWeight:700,fontSize:15,color:'var(--text)'}}>UglyBot</span>
          {src&&<a href={src} target="_blank" rel="noopener" style={{fontSize:12,color:'var(--muted)',textDecoration:'none'}}>Open in new tab ↗</a>}
        </div>
        <button onClick={onClose} aria-label="Close" style={{background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,color:'var(--text)',fontSize:14,fontWeight:600,lineHeight:1,cursor:'pointer',padding:'7px 14px',fontFamily:'inherit'}}>✕ Close</button>
      </div>
      <div style={{flex:1,minHeight:0}}>
        {src
          ?<iframe src={src} title="UglyBot" style={{width:'100%',height:'100%',border:'none',display:'block',background:'var(--bg)'}} allow="clipboard-write; clipboard-read; camera; microphone"/>
          :<div style={{padding:24,color:'var(--muted)',fontSize:14}}>Loading…</div>}
      </div>
    </div>
  );
}


// Background scroll lock while a modal is open. On mobile we use the position:fixed
// body technique (overflow:hidden alone does NOT stop scrolling on iOS Safari), and
// pin each overlay to the visible viewport so its input stays above the keyboard.
(function(){
  const vv=window.visualViewport;
  let scheduled=false,locked=false,savedY=0;
  function setLock(on){
    const mobile=window.innerWidth<=768;
    if(on&&!locked){
      document.body.classList.add('modal-open');
      if(mobile){
        savedY=window.scrollY||window.pageYOffset||0;
        document.body.style.position='fixed';
        document.body.style.top=`-${savedY}px`;
        document.body.style.left='0';
        document.body.style.right='0';
        document.body.style.width='100%';
      }
      locked=true;
    }else if(!on&&locked){
      document.body.classList.remove('modal-open');
      if(document.body.style.position==='fixed'){
        document.body.style.position='';
        document.body.style.top='';
        document.body.style.left='';
        document.body.style.right='';
        document.body.style.width='';
        window.scrollTo(0,savedY);
      }
      locked=false;
    }
  }
  function apply(){
    scheduled=false;
    const overlays=document.querySelectorAll('.modal-overlay');
    setLock(overlays.length>0);
    const mobile=window.innerWidth<=768;
    overlays.forEach(o=>{
      if(mobile&&vv){o.style.height=vv.height+'px';o.style.top=vv.offsetTop+'px';o.style.bottom='auto';}
      else{o.style.height='';o.style.top='';o.style.bottom='';}
    });
  }
  const schedule=()=>{if(!scheduled){scheduled=true;requestAnimationFrame(apply);}};
  new MutationObserver(schedule).observe(document.body,{childList:true,subtree:true});
  if(vv){vv.addEventListener('resize',schedule);vv.addEventListener('scroll',schedule);}
  window.addEventListener('resize',schedule);
})();

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
