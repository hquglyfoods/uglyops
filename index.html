              {MSG_TOPICS.map(t=>(
                <button key={t} onClick={()=>setTopic(t)} className="btn btn-sm"
                  style={{background:topic===t?TOPIC_COLORS[t]:'var(--panel2)',color:topic===t?'#04201C':'var(--text)',border:`1px solid ${topic===t?TOPIC_COLORS[t]:'var(--border2)'}`,fontWeight:topic===t?700:500}}>
                  {t}
                </button>
              ))}
            </div>
          </div>
          <div className="form-group"><label>Subject</label><input value={subject} onChange={e=>setSubject(e.target.value)} placeholder="Brief subject line"/></div>
          <div className="form-group"><label>Message</label><textarea value={body} onChange={e=>setBody(e.target.value)} rows={5} placeholder="Write your message to the franchisee..." style={{resize:'vertical'}}/></div>
          {msg&&<div style={{fontSize:13,color:'var(--red)',marginBottom:8}}>{msg}</div>}
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={send} disabled={busy||!frId||!topic||!subject.trim()||!body.trim()}>{busy?'Sending...':'Send Message →'}</button>
        </div>
      </div>
    </div>
  );
}

function HQReview(){
  const [submitted,setSubmitted]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selected,setSelected]=useState(null);
  const [selectedSubtasks,setSelectedSubtasks]=useState([]);

  async function load(){
    setLoading(true);
    const{data}=await sb.from('ops_assignments').select('*,franchisees(name,territory,email),ops_tasks(title,category,require_hq_approval)').eq('status','submitted').order('updated_at',{ascending:false});
    setSubmitted(data||[]);setLoading(false);
  }
  useEffect(()=>{load();},[]);

  async function openDetail(a){
    const{data:st}=await sb.from('ops_subtasks').select('*').eq('ops_task_id',a.ops_task_id).order('sort_order');
    setSelectedSubtasks(st||[]);
    setSelected(a);
  }

  async function approve(id){await sb.from('ops_assignments').update({status:'approved',reviewed_at:new Date().toISOString(),reviewed_by:'HQ'}).eq('id',id);setSelected(null);load();}
  async function reject(id){const n=window.prompt('Rejection reason:');if(n===null)return;await sb.from('ops_assignments').update({status:'rejected',hq_notes:n,reviewed_at:new Date().toISOString(),reviewed_by:'HQ'}).eq('id',id);setSelected(null);load();}

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">HQ Review</div><div className="page-sub">Submitted tasks awaiting approval</div></div>
      </div>
      <div className="content">
        {loading?<div className="loading">Loading...</div>:submitted.length===0?(
          <div className="empty"><div className="empty-icon">◎</div><div className="empty-title">All caught up</div><div style={{fontSize:13,color:'var(--muted)'}}>No submissions pending review</div></div>
        ):(
          submitted.map(a=>(
            <div key={a.id} onClick={()=>openDetail(a)} style={{background:'var(--panel)',border:'1px solid rgba(204,156,58,.3)',borderRadius:12,padding:18,marginBottom:12,cursor:'pointer',transition:'border-color .15s'}}
              onMouseEnter={e=>e.currentTarget.style.borderColor='var(--gold)'}
              onMouseLeave={e=>e.currentTarget.style.borderColor='rgba(204,156,58,.3)'}>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
                <div>
                  <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:6}}>
                    <span className={`cat-badge cat-${a.ops_tasks?.category}`}>{catLabel(a.ops_tasks?.category)}</span>
                    <span style={{fontSize:15,fontWeight:700}}>{a.ops_tasks?.title}</span>
                  </div>
                  <div style={{fontSize:13,color:'var(--text)',fontWeight:600}}>{a.franchisees?.name}</div>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{a.franchisees?.territory} · {a.franchisees?.email}</div>
                  <div style={{fontSize:11,color:'var(--gold)',marginTop:4}}>Click to review submitted proof →</div>
                </div>
                <div style={{display:'flex',gap:8}} onClick={e=>e.stopPropagation()}>
                  <button className="btn btn-danger btn-sm" onClick={()=>reject(a.id)}>Reject</button>
                  <button className="btn btn-green btn-sm" onClick={()=>approve(a.id)}>Approve ✓</button>
                </div>
              </div>
            </div>
          ))
        )}
      </div>
      {selected&&<AssignmentDetailModal assignment={selected} subtasks={selectedSubtasks} onClose={()=>setSelected(null)} onApprove={()=>approve(selected.id)} onReject={()=>reject(selected.id)}/>}
    </>
  );
}


// ── ACCOUNT MANAGER ──────────────────────────────────────
function AccountManager({onBadgeRefresh}){
  const [accounts,setAccounts]=useState([]);
  const [unregistered,setUnregistered]=useState([]);
  const [loading,setLoading]=useState(true);
  const [editMember,setEditMember]=useState(null);
  const [busy,setBusy]=useState(null);
  const [msgs,setMsgs]=useState({});
  const [emailInputs,setEmailInputs]=useState({});
  const [filterRole,setFilterRole]=useState('all');
  const [acctSearch,setAcctSearch]=useState('');
  const [pop,setPop]=useState(null);
  const [showPending,setShowPending]=useState(false);
  const [showInvite,setShowInvite]=useState(false);
  const [invForm,setInvForm]=useState({email:'',name:'',title:'COO'});
  const [invBusy,setInvBusy]=useState(false);
  const [invMsg,setInvMsg]=useState('');

  async function inviteHQ(){
    if(!invForm.email||!invForm.name)return;
    setInvBusy(true);setInvMsg('');
    const tempPass=Math.random().toString(36).slice(-10)+'A1!';
    const{data:user,error}=await sb.auth.signUp({email:invForm.email,password:tempPass,options:{data:{name:invForm.name}}});
    if(user?.user){
      const{error:upsertErr}=await sb.from('profiles').upsert([{id:user.user.id,full_name:invForm.name,name:invForm.name,title:invForm.title||'Team',role:'hq',is_active:true}],{onConflict:'id'});
      if(upsertErr){setInvMsg('Account auth created, but profile save failed: '+upsertErr.message);}
      else{setInvMsg(`Account created for ${invForm.name}. Temp password: ${tempPass} — share this securely and ask them to change it on first login.`);}
      setInvForm({email:'',name:'',title:'COO'});
      load();
    }else{setInvMsg(error?.message||'Error creating account.');}
    setInvBusy(false);
  }

  async function load(){
    setLoading(true);
    const[pRes,sRes]=await Promise.all([
      sb.from('profiles').select('id,full_name,name,title,role,store,is_active,created_at').order('full_name'),
      sb.from('franchisees').select('id,name,store_name,territory,email').in('status',['open','soft_open']).order('store_name'),
    ]);
    const profiles=pRes.data||[];
    const allStores=sRes.data||[];
    // Map store_name -> email so we can send password resets to franchisee accounts
    const emailByStore={};
    allStores.forEach(s=>{ if(s.store_name)emailByStore[s.store_name]=s.email; if(s.name)emailByStore[s.name]=emailByStore[s.name]||s.email; });
    const profilesWithEmail=profiles.map(p=>({...p,_email:p.role==='franchisee'?emailByStore[p.store]:null}));
    const registeredNames=new Set(profiles.filter(p=>p.role==='franchisee').map(p=>p.store).filter(Boolean));
    setAccounts(profilesWithEmail);
    setUnregistered(allStores.filter(s=>!registeredNames.has(s.store_name||s.name)));
    setLoading(false);
    if(onBadgeRefresh)onBadgeRefresh();
  }
  useEffect(()=>{load();},[]);

  async function sendPasswordReset(m){
    // Resolve email: prefer the mapped _email, then look it up directly by store match.
    let email=m._email;
    if(!email){
      const{data:frs}=await sb.from('franchisees').select('store_name,name,email').in('status',['open','soft_open']);
      const match=(frs||[]).find(f=>f.store_name===m.store||f.name===m.store);
      email=match?.email||null;
    }
    if(!email){
      window.alert('No email on file for this franchisee.\n\nAdd their email in OS → CRM Franchisees (Edit Info), then try again.\n\nNote: the store name on the account must match the franchisee record exactly.');
      return;
    }
    if(!window.confirm(`Send a password reset email to ${email}?\nThe franchisee will get a link to set a new password.`))return;
    // Send via Resend (reliable). Fall back to Supabase built-in mailer if the function fails.
    try{
      const res=await authFetch(RESET_PW_FN,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email,name:m.full_name||m.name||''}),
      });
      const data=await res.json().catch(()=>({}));
      if(res.ok&&data.ok){
        window.alert(`Password reset link sent to ${email}.`);
        return;
      }
      const fnReason=data.error||(`status ${res.status}`);
      const{error:fbErr}=await sb.auth.resetPasswordForEmail(email,{redirectTo:'https://uglyops.netlify.app'});
      if(!fbErr){window.alert(`Password reset link sent to ${email}.`);return;}
      window.alert('Could not send reset email.\n\nResend reason: '+fnReason+'\nBuilt-in mailer reason: '+(fbErr.message||JSON.stringify(fbErr))+'\n\nThe franchisee can also use "Forgot password?" on the login screen.');
    }catch(e){
      const{error:fbErr}=await sb.auth.resetPasswordForEmail(email,{redirectTo:'https://uglyops.netlify.app'});
      if(!fbErr){window.alert(`Password reset link sent to ${email}.`);return;}
      window.alert('Could not send reset email.\n\nReason: '+(e.message||String(e))+'\n\nThe franchisee can also use "Forgot password?" on the login screen.');
    }
  }

  async function approveStore(s){
    const email=emailInputs[s.id]||s.email;
    if(!email){setMsgs(m=>({...m,[s.id]:'Please enter an email address.'}));return;}
    setBusy(s.id);
    const storeName=s.store_name||s.name||'';
    try{
      const res=await authFetch(CREATE_ACCOUNT_FN,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email,storeName,franchiseeId:s.id}),
      });
      const data=await res.json();
      if(!res.ok||data.error){
        setMsgs(m=>({...m,[s.id]:'Error: '+(data.error||'Unknown error')}));
      }else{
        setMsgs(m=>({...m,[s.id]:data.emailSent
          ?`✓ Account created and login email sent to ${email}\nTemp password: ${data.tempPass}  (also emailed — share securely)`
          :`✓ Account created — but email did NOT send.\n${data.emailError?'Reason: '+data.emailError+'\n':''}Give the franchisee these login details manually:\nURL: https://uglyops.netlify.app\nEmail: ${email}\nTemp password: ${data.tempPass}`
        }));
        load();
      }
    }catch(e){
      setMsgs(m=>({...m,[s.id]:'Error: '+e.message}));
    }
    setBusy(null);
  }

  async function removePending(s){
    if(!window.confirm(`Remove ${s.store_name||s.name} from the activation list?\n\nThis deletes the franchisee record from Ops. (It does NOT affect the OS Franchisees section unless this store was pushed from there.)`))return;
    setBusy(s.id);
    await sb.from('franchisees').delete().eq('id',s.id);
    setBusy(null);
    load();
  }

  async function toggleActive(m){await sb.from('profiles').update({is_active:!m.is_active}).eq('id',m.id);load();}
  async function deleteAccount(m){
    if(!window.confirm(`Delete ${m.full_name||m.name||'this account'}? Cannot be undone.`))return;
    await sb.from('profiles').delete().eq('id',m.id);load();
  }

  const q=acctSearch.trim().toLowerCase();
  const filtered=accounts.filter(a=>filterRole==='all'||a.role===filterRole)
    .filter(a=>!q||[a.full_name,a.name,a.store,a.title,a.role].some(v=>(v||'').toLowerCase().includes(q)));

  // Render a cell that truncates past 12 chars and reveals the full value in a balloon on tap.
  function cellTrunc(text,{bold,muted}={}){
    const s=(text==null||text==='')?'—':String(text);
    const base={fontWeight:bold?600:undefined,fontSize:muted?12:undefined,color:muted?'var(--muted)':undefined};
    if(s.length<=12)return <span style={base}>{s}</span>;
    return <span onClick={e=>{e.stopPropagation();const r=e.currentTarget.getBoundingClientRect();const above=r.bottom>window.innerHeight*0.55;setPop({text:s,x:Math.max(8,Math.min(r.left,window.innerWidth-228)),y:above?r.top-6:r.bottom+6,above});}}
      style={{...base,cursor:'pointer',borderBottom:'1px dotted var(--muted2)',whiteSpace:'nowrap'}}>{s.slice(0,12)}…</span>;
  }

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Accounts</div><div className="page-sub">Franchisee and HQ account management</div></div>
        <button className="btn btn-primary" onClick={()=>setShowInvite(s=>!s)}>+ Add HQ Member</button>
      </div>
      <div className="content">
        {showInvite&&(
          <div className="card" style={{marginBottom:20}}>
            <div style={{fontWeight:700,marginBottom:12}}>Add HQ Team Member</div>
            <div className="form-row" style={{display:'flex',gap:12,flexWrap:'wrap'}}>
              <div className="form-group" style={{flex:1,minWidth:200}}><label>Full Name</label><input value={invForm.name} onChange={e=>setInvForm(f=>({...f,name:e.target.value}))} placeholder="Tom Alcott" style={{width:'100%',background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:14,outline:'none'}}/></div>
              <div className="form-group" style={{flex:1,minWidth:200}}><label>Email</label><input type="email" value={invForm.email} onChange={e=>setInvForm(f=>({...f,email:e.target.value}))} placeholder="tom@uglydonuts.com" style={{width:'100%',background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:14,outline:'none'}}/></div>
            </div>
            <div className="form-group" style={{maxWidth:320,marginTop:12}}>
              <label>Title / Role</label>
              <select value={['CEO','COO','CMO','CBO','CPO','other'].includes(invForm.title)?invForm.title:'other'} onChange={e=>{if(e.target.value!=='other')setInvForm(f=>({...f,title:e.target.value}));else setInvForm(f=>({...f,title:''}));}} style={{width:'100%',background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:14,outline:'none'}}>
                <option value="CEO">CEO</option>
                <option value="COO">COO</option>
                <option value="CMO">CMO</option>
                <option value="CBO">CBO</option>
                <option value="CPO">CPO</option>
                <option value="other">Other (type below)</option>
              </select>
              {(!['CEO','COO','CMO','CBO','CPO'].includes(invForm.title))&&(
                <input value={invForm.title} onChange={e=>setInvForm(f=>({...f,title:e.target.value}))} placeholder="e.g. VP of Operations" style={{marginTop:8,width:'100%',background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:14,outline:'none'}}/>
              )}
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center',marginTop:12}}>
              <button className="btn btn-primary" onClick={inviteHQ} disabled={invBusy||!invForm.email||!invForm.name}>{invBusy?'Creating...':'Create Account'}</button>
              <button className="btn btn-ghost" onClick={()=>{setShowInvite(false);setInvMsg('');}}>Cancel</button>
            </div>
            {invMsg&&<div style={{marginTop:12,padding:12,background:'rgba(95,184,122,.1)',border:'1px solid rgba(95,184,122,.3)',borderRadius:8,fontSize:13,color:'var(--green)',lineHeight:1.5}}>{invMsg}</div>}
          </div>
        )}
        {/* Pending activation → button opens a popup */}
        {unregistered.length>0&&(
          <button onClick={()=>setShowPending(true)} className="btn btn-ghost"
            style={{marginBottom:16,marginRight:8,display:'inline-flex',alignItems:'center',gap:8,borderColor:'rgba(224,82,82,.35)',color:'var(--red)'}}>
            ⚠ Stores pending approval
            <span style={{background:'var(--red)',color:'#fff',fontSize:11,fontWeight:800,borderRadius:10,minWidth:20,height:20,display:'inline-flex',alignItems:'center',justifyContent:'center',padding:'0 6px'}}>{unregistered.length}</span>
          </button>
        )}
        {/* Mobile app install link: copy & send to any user */}
        <div style={{marginBottom:16,display:'inline-flex'}}><CopyInstallLinkBtn label="📲 App install link"/></div>

        {/* Account list */}
        <input value={acctSearch} onChange={e=>setAcctSearch(e.target.value)} placeholder="Search name, store, role..."
          style={{width:'100%',marginBottom:12,background:'var(--panel)',border:'1px solid var(--border2)',borderRadius:8,padding:'10px 14px',color:'var(--text)',fontFamily:'inherit',fontSize:14,outline:'none'}}/>
        <div style={{display:'flex',gap:8,marginBottom:16,alignItems:'center',flexWrap:'wrap'}}>
          {['franchisee','hq','all'].map(r=>(
            <button key={r} className={`btn btn-sm ${filterRole===r?'btn-primary':'btn-ghost'}`} onClick={()=>setFilterRole(r)}>
              {r==='franchisee'?'Franchisees':r==='hq'?'HQ Team':'All'}
            </button>
          ))}
          <span style={{marginLeft:'auto',fontSize:12,color:'var(--muted)'}}>{filtered.length} accounts</span>
        </div>

        {loading?<div className="loading">Loading...</div>:(
          <div className="table-wrap">
            <table className="acct-table">
              <thead><tr><th>Name</th><th>Store</th><th>Role</th><th>Status</th><th>Action</th></tr></thead>
              <tbody>
                {filtered.length===0&&<tr><td colSpan={5}><div className="empty"><div className="empty-title">No accounts found</div></div></td></tr>}
                {filtered.map(m=>(
                  <tr key={m.id}>
                    <td>{cellTrunc(m.full_name||m.name,{bold:true})}</td>
                    <td>{cellTrunc(m.store,{muted:true})}</td>
                    <td>
                      <div style={{display:'flex',flexDirection:'column',gap:3}}>
                        {m.title&&<span style={{fontSize:11,background:'rgba(95,184,122,.15)',color:'#5FB87A',padding:'2px 8px',borderRadius:4,fontWeight:700,whiteSpace:'nowrap'}}>{m.title}</span>}
                        <span style={{fontSize:10,color:'var(--muted)'}}>{m.role==='hq'?'HQ':'Franchisee'}</span>
                      </div>
                    </td>
                    <td><span className={`badge ${m.is_active!==false?'badge-green':'badge-red'}`}>{m.is_active!==false?'Active':'Inactive'}</span></td>
                    <td>
                      <div style={{display:'flex',gap:6,alignItems:'center'}}>
                        <button className="btn btn-ghost btn-sm" onClick={()=>setEditMember(m)}>Edit</button>
                        {m.role==='franchisee'&&<button className="btn btn-ghost btn-sm" onClick={()=>sendPasswordReset(m)}>Reset PW</button>}
                        <button className="btn btn-ghost btn-sm" onClick={()=>toggleActive(m)}>{m.is_active!==false?'Deactivate':'Reactivate'}</button>
                        <button className="btn btn-danger btn-sm" onClick={()=>deleteAccount(m)}>Delete</button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
      {pop&&(
        <div onClick={()=>setPop(null)} style={{position:'fixed',inset:0,zIndex:1200}}>
          <div onClick={e=>e.stopPropagation()} style={{position:'fixed',left:pop.x,top:pop.y,transform:pop.above?'translateY(-100%)':'none',maxWidth:220,maxHeight:'40vh',overflowY:'auto',background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'8px 12px',fontSize:13,color:'var(--text)',lineHeight:1.4,boxShadow:'0 8px 24px rgba(0,0,0,.5)'}}>{pop.text}</div>
        </div>
      )}
      {editMember&&<EditAccountModal member={editMember} stores={[]} onClose={()=>{setEditMember(null);load();}}/>}
      {showPending&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowPending(false)}>
          <div className="modal">
            <div className="modal-header">
              <div className="modal-title">Stores pending approval</div>
              <button className="close-btn" onClick={()=>setShowPending(false)}>×</button>
            </div>
            <div className="modal-body">
              <div style={{fontSize:12,color:'var(--muted)',marginBottom:14}}>Enter an email and approve to create login access, or delete the pending store.</div>
              {unregistered.length===0&&<div style={{color:'var(--muted)',fontSize:13,padding:'20px 0',textAlign:'center'}}>No stores pending approval.</div>}
              {unregistered.map(s=>(
                <div key={s.id} style={{background:'var(--panel2)',border:'1px solid rgba(224,82,82,.2)',borderRadius:10,padding:14,marginBottom:10}}>
                  <div style={{fontSize:14,fontWeight:700}}>{s.store_name||s.name}</div>
                  <div style={{fontSize:12,color:'var(--muted)',marginTop:2,marginBottom:10}}>{s.name} · {s.territory}</div>
                  <input value={emailInputs[s.id]||s.email||''} onChange={e=>setEmailInputs(ei=>({...ei,[s.id]:e.target.value}))}
                    placeholder="franchisee@email.com" type="email"
                    style={{width:'100%',marginBottom:10,background:'var(--panel)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:14,outline:'none'}}/>
                  <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                    <button className="btn btn-primary btn-sm" disabled={busy===s.id||!(emailInputs[s.id]||s.email)} onClick={()=>approveStore(s)} style={{whiteSpace:'nowrap'}}>
                      {busy===s.id?'Creating...':'Approve & Send Login →'}
                    </button>
                    <button className="btn btn-danger btn-sm" disabled={busy===s.id} onClick={()=>removePending(s)} style={{whiteSpace:'nowrap'}}>Delete</button>
                    <CopyInstallLinkBtn/>
                  </div>
                  {msgs[s.id]&&(
                    <div style={{marginTop:10,fontSize:12,color:msgs[s.id].startsWith('✓')?'var(--green)':'var(--red)',padding:'10px 12px',background:msgs[s.id].startsWith('✓')?'rgba(95,184,122,.08)':'rgba(224,82,82,.08)',borderRadius:6,lineHeight:1.6,whiteSpace:'pre-wrap'}}>
                      {msgs[s.id]}
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </>
  );
}

// ── EDIT ACCOUNT MODAL ────────────────────────────────────
function EditAccountModal({member,stores,onClose}){
  const [form,setForm]=useState({
    name:member.full_name||member.name||'',
    store:member.store||'',
    role:member.role||'franchisee',
    is_active:member.is_active!==false,
    email:'',
  });
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState('');
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  // Load franchisee email if this is a franchisee account
  useEffect(()=>{
    if(member.role==='franchisee'&&member.store){
      sb.from('franchisees').select('email').or(`store_name.eq.${member.store},name.eq.${member.store}`).limit(1).single()
        .then(({data})=>{if(data?.email)set('email',data.email);});
    }
  },[]);

  async function save(){
    setBusy(true);
    // Update profile
    const{error}=await sb.from('profiles').update({
      full_name:form.name,
      name:form.name,
      store:form.store,
      role:form.role,
      is_active:form.is_active,
    }).eq('id',member.id);
    if(error){setMsg('Error: '+error.message);setBusy(false);return;}
    // Update franchisees table email if franchisee
    if(member.role==='franchisee'&&form.store&&form.email){
      await sb.from('franchisees').update({email:form.email})
        .or(`store_name.eq.${form.store},name.eq.${form.store}`);
    }
    setMsg('Saved!');setTimeout(()=>onClose(),800);
    setBusy(false);
  }

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">Edit Account</div>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div className="form-group"><label>Full Name</label><input value={form.name} onChange={e=>set('name',e.target.value)}/></div>
          {member.role==='franchisee'&&<div className="form-group"><label>Franchisee Email (for notifications)</label><input type="email" value={form.email} onChange={e=>set('email',e.target.value)} placeholder="franchisee@email.com"/></div>}
          <div className="form-group">
            <label>Linked Store</label>
            <select value={form.store} onChange={e=>set('store',e.target.value)} style={{background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none',width:'100%'}}>
              <option value="">— No store linked —</option>
              {stores.map(s=><option key={s.id} value={s.store_name||s.name}>{s.store_name||s.name} · {s.territory}</option>)}
            </select>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label>Role</label>
              <select value={form.role} onChange={e=>set('role',e.target.value)} style={{background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none',width:'100%'}}>
                <option value="franchisee">Franchisee</option>
                <option value="hq">HQ</option>
              </select>
            </div>
            <div className="form-group">
              <label>Status</label>
              <select value={form.is_active?'active':'inactive'} onChange={e=>set('is_active',e.target.value==='active')} style={{background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none',width:'100%'}}>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
              </select>
            </div>
          </div>
          <div style={{background:'rgba(91,143,212,.08)',border:'1px solid rgba(91,143,212,.2)',borderRadius:8,padding:12,fontSize:13,color:'var(--muted)'}}>
            <div style={{fontWeight:600,color:'var(--blue)',marginBottom:4,fontSize:12}}>Email / Password changes</div>
            To change email or reset password: Supabase Dashboard → Authentication → Users → find user → edit
          </div>
          {msg&&<div style={{marginTop:10,fontSize:13,color:msg.startsWith('Error')?'var(--red)':'var(--green)'}}>{msg}</div>}
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={save} disabled={busy}>{busy?'Saving...':'Save'}</button>
        </div>
      </div>
    </div>
  );
}


// ── ANNOUNCEMENTS ─────────────────────────────────────────
function Announcements(){
  const [announcements,setAnnouncements]=useState([]);
  const [stores,setStores]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showNew,setShowNew]=useState(false);
  const [selected,setSelected]=useState(null);
  const [form,setForm]=useState({title:'',body:'',category:'general',target:'',link_url:'',link_label:'',due_date:''});
  const [selectedStores,setSelectedStores]=useState([]);
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState('');
  const [attachFile,setAttachFile]=useState(null); // File object
  const [attachPreview,setAttachPreview]=useState(null);
  const [uploadProgress,setUploadProgress]=useState(0);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  function handleFileChange(e){
    const file=e.target.files[0];
    if(!file)return;
    setAttachFile(file);
    // Preview for images/video
    if(file.type.startsWith('image/')||file.type.startsWith('video/')){
      setAttachPreview(URL.createObjectURL(file));
    }else{
      setAttachPreview(null);
    }
  }

  function getAttachType(file){
    if(!file)return null;
    if(file.type.startsWith('image/'))return'image';
    if(file.type.startsWith('video/'))return'video';
    if(file.type==='application/pdf')return'pdf';
    return'file';
  }

  const ANN_CATS=[
    {key:'general',label:'General',color:'#5B8FD4'},
    {key:'urgent',label:'Urgent',color:'#E05252'},
    {key:'menu',label:'Menu Update',color:'#CC9C3A'},
    {key:'policy',label:'Policy',color:'#9B78D4'},
  ];

  async function load(){
    setLoading(true);
    const[aRes,sRes]=await Promise.all([
      sb.from('ops_announcements').select('*').order('created_at',{ascending:false}),
      sb.from('franchisees').select('id,name,store_name,territory,email').in('status',['open','soft_open']).order('name'),
    ]);
    setAnnouncements(aRes.data||[]);
    setStores(sRes.data||[]);
    setLoading(false);
  }
  useEffect(()=>{load();},[]);

  async function sendAnnouncement(){
    if(!form.title||!form.body){setMsg('Title and body required.');return;}
    const hasTarget=(form.target==='all'&&stores.length>0)||(form.target==='select'&&selectedStores.length>0);
    if(!hasTarget){setMsg('Please choose recipient stores before sending.');return;}
    setBusy(true);setMsg('');
    // 0. Upload file if attached
    let attachment_url=null,attachment_name=null,attachment_type=null;
    if(attachFile){
      const ext=attachFile.name.split('.').pop();
      const path=`${Date.now()}-${attachFile.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
      const{data:upload,error:upErr}=await sb.storage.from('announcements').upload(path,attachFile,{contentType:attachFile.type});
      if(upErr){setMsg('File upload failed: '+upErr.message);setBusy(false);return;}
      const{data:urlData}=sb.storage.from('announcements').getPublicUrl(path);
      attachment_url=urlData.publicUrl;
      attachment_name=attachFile.name;
      attachment_type=getAttachType(attachFile);
    }
    // 1. Create announcement
    const{data:ann}=await sb.from('ops_announcements').insert([{
      ...form,
      target:form.target==='all'?'all':selectedStores.join(','),
      attachment_url,attachment_name,attachment_type,
      link_url:form.link_url||null,
      link_label:form.link_label||null,
      due_date:form.due_date||null,
    }]).select().single();
    if(!ann){setBusy(false);setMsg('Error creating announcement.');return;}
    // 2. Create receipt records
    const targetStores=form.target==='all'?stores:stores.filter(s=>selectedStores.includes(s.id));
    if(targetStores.length){
      await sb.from('ops_announcement_receipts').insert(targetStores.map(s=>({announcement_id:ann.id,franchisee_id:s.id,confirmed:false})));
      // 3. Send emails
      const emailTargets=targetStores.filter(s=>s.email).map(s=>({email:s.email,name:s.store_name||s.name}));
      if(emailTargets.length){
        const sent=await sendEmail(
          emailTargets,
          `[${form.category.toUpperCase()}] ${form.title}`,
          announcementEmailHtml(form.title,form.body,form.category,'your store',attachment_url,attachment_name,attachment_type,form.link_url,form.link_label)
        );
        setMsg(`✓ Announcement sent to ${emailTargets.length} store${emailTargets.length>1?'s':''}. ${targetStores.length-emailTargets.length>0?`(${targetStores.length-emailTargets.length} stores have no email on file)`:''}`);
      }else{
        setMsg('Announcement created but no stores have email addresses on file.');
      }
    }
    setForm({title:'',body:'',category:'general',target:'all',link_url:'',link_label:''});
    setSelectedStores([]);setAttachFile(null);setAttachPreview(null);
    setShowNew(false);
    load();
    setBusy(false);
  }

  function catColor(k){return ANN_CATS.find(c=>c.key===k)?.color||'#5B8FD4';}
  function catLabel(k){return ANN_CATS.find(c=>c.key===k)?.label||k;}

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Announcements</div><div className="page-sub">Broadcast messages to open stores</div></div>
        <button className="btn btn-primary" onClick={()=>setShowNew(s=>!s)}>+ New Announcement</button>
      </div>
      <div className="content">
        {showNew&&(
          <div className="card" style={{marginBottom:20}}>
            <div style={{fontWeight:700,marginBottom:14}}>New Announcement</div>
            <div className="form-row">
              <div className="form-group">
                <label>Category</label>
                <select value={form.category} onChange={e=>set('category',e.target.value)} style={{background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none',width:'100%'}}>
                  {ANN_CATS.map(c=><option key={c.key} value={c.key}>{c.label}</option>)}
                </select>
              </div>
              <div className="form-group"><label>Title</label><input value={form.title} onChange={e=>set('title',e.target.value)} placeholder="e.g. Summer Menu Launch Notice"/></div>
            </div>
            <div className="form-group">
              <label>Confirmation Deadline (optional)</label>
              <input type="date" value={form.due_date} onChange={e=>set('due_date',e.target.value)} style={{width:'100%',background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:14,outline:'none'}}/>
              <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>If set, franchisees who haven't confirmed get an automatic reminder email 1 day before.</div>
            </div>
            <div className="form-group">
              <label>Message Body</label>
              <textarea value={form.body} onChange={e=>set('body',e.target.value)} style={{minHeight:120}} placeholder="Write your announcement here..."/>
            </div>

            {/* Attachment */}
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Attachment (optional)</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div>
                  <label style={{display:'block',fontSize:12,color:'var(--muted)',marginBottom:6}}>Upload File (PDF, Image, Video)</label>
                  <label style={{display:'flex',alignItems:'center',gap:8,background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',cursor:'pointer'}}>
                    <span style={{fontSize:18}}>📎</span>
                    <span style={{fontSize:13,color:attachFile?'var(--text)':'var(--muted)'}}>{attachFile?attachFile.name:'Choose file...'}</span>
                    <input type="file" accept="image/*,video/*,.pdf,.doc,.docx" onChange={handleFileChange} style={{display:'none'}}/>
                  </label>
                  {attachFile&&(
                    <div style={{marginTop:6,display:'flex',alignItems:'center',gap:8}}>
                      {attachPreview&&attachFile.type.startsWith('image/')&&<img src={attachPreview} style={{width:60,height:60,objectFit:'cover',borderRadius:4}}/>}
                      {attachPreview&&attachFile.type.startsWith('video/')&&<video src={attachPreview} style={{width:80,height:60,objectFit:'cover',borderRadius:4}}/>}
                      <div>
                        <div style={{fontSize:12,color:'var(--text)'}}>{attachFile.name}</div>
                        <div style={{fontSize:11,color:'var(--muted)'}}>{(attachFile.size/1024/1024).toFixed(1)} MB</div>
                      </div>
                      <button onClick={()=>{setAttachFile(null);setAttachPreview(null);}} style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:16,padding:0,marginLeft:'auto'}}>✕</button>
                    </div>
                  )}
                </div>
                <div>
                  <label style={{display:'block',fontSize:12,color:'var(--muted)',marginBottom:6}}>Or External Link (Google Drive, YouTube, etc.)</label>
                  <input value={form.link_url} onChange={e=>set('link_url',e.target.value)} placeholder="https://..." style={{width:'100%',background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none',marginBottom:6}}/>
                  <input value={form.link_label} onChange={e=>set('link_label',e.target.value)} placeholder="Button label (e.g. 'View Recipe Book')" style={{width:'100%',background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none'}}/>
                </div>
              </div>
            </div>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Send To</div>
              <div style={{display:'flex',gap:8,marginBottom:form.target==='select'?12:0}}>
                <button className={`btn btn-sm ${form.target==='all'?'btn-primary':'btn-ghost'}`} onClick={()=>set('target','all')}>All Open Stores ({stores.length})</button>
                <button className={`btn btn-sm ${form.target==='select'?'btn-primary':'btn-ghost'}`} onClick={()=>set('target','select')}>Select Stores</button>
              </div>
              {form.target==='select'&&(
                <div style={{maxHeight:200,overflowY:'auto',border:'1px solid var(--border)',borderRadius:8,padding:'4px 0'}}>
                  {stores.map(s=>(
                    <div key={s.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 14px',cursor:'pointer',borderBottom:'1px solid var(--border)'}}
                      onClick={()=>setSelectedStores(ss=>ss.includes(s.id)?ss.filter(x=>x!==s.id):[...ss,s.id])}>
                      <div style={{width:16,height:16,borderRadius:4,border:`1.5px solid ${selectedStores.includes(s.id)?'var(--orange)':'var(--border2)'}`,background:selectedStores.includes(s.id)?'var(--orange)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                        {selectedStores.includes(s.id)&&<span style={{fontSize:10,color:'#000',fontWeight:700}}>✓</span>}
                      </div>
                      <div>
                        <div style={{fontSize:13,fontWeight:600}}>{s.store_name||s.name}</div>
                        <div style={{fontSize:11,color:s.email?'var(--muted)':'var(--red)'}}>{s.email||'No email on file'}</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
            {msg&&<div style={{padding:12,background:msg.startsWith('✓')?'rgba(95,184,122,.1)':'rgba(224,82,82,.1)',border:`1px solid ${msg.startsWith('✓')?'rgba(95,184,122,.3)':'rgba(224,82,82,.3)'}`,borderRadius:8,fontSize:13,color:msg.startsWith('✓')?'var(--green)':'var(--red)',marginBottom:12}}>{msg}</div>}
            {!((form.target==='all'&&stores.length>0)||(form.target==='select'&&selectedStores.length>0))&&form.title&&form.body&&(
              <div style={{background:'rgba(224,82,82,.08)',border:'1px solid rgba(224,82,82,.25)',borderRadius:8,padding:'10px 14px',marginBottom:12,fontSize:12,color:'var(--red)'}}>
                ⚠ Choose recipient stores above before sending.
              </div>
            )}
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-primary" onClick={sendAnnouncement} disabled={busy||!form.title||!form.body||
                !((form.target==='all'&&stores.length>0)||(form.target==='select'&&selectedStores.length>0))}>
                {busy?'Sending...':!((form.target==='all'&&stores.length>0)||(form.target==='select'&&selectedStores.length>0))?'Select stores first':form.target==='all'?`Send to All ${stores.length} Stores`:`Send to ${selectedStores.length} Store${selectedStores.length!==1?'s':''}`}
              </button>
              <button className="btn btn-ghost" onClick={()=>{setShowNew(false);setMsg('');}}>Cancel</button>
            </div>
          </div>
        )}

        {loading?<div className="loading">Loading...</div>:announcements.length===0?(
          <div className="empty"><div className="empty-icon">◈</div><div className="empty-title">No announcements yet</div><div style={{fontSize:13,color:'var(--muted)'}}>Create your first announcement to broadcast to stores</div></div>
        ):(
          announcements.map(a=>(
            <AnnouncementCard key={a.id} ann={a} stores={stores} catColor={catColor} catLabel={catLabel} onRefresh={load}/>
          ))
        )}
      </div>
    </>
  );
}

function AnnouncementCard({ann,stores,catColor,catLabel,onRefresh}){
  const [receipts,setReceipts]=useState([]);
  const [expanded,setExpanded]=useState(false);

  useEffect(()=>{
    sb.from('ops_announcement_receipts').select('*,franchisees(name,store_name)').eq('announcement_id',ann.id).then(r=>setReceipts(r.data||[]));
  },[ann.id]);

  const confirmed=receipts.filter(r=>r.confirmed).length;
  const total=receipts.length;
  const pct=total?Math.round(confirmed/total*100):0;
  const color=catColor(ann.category);

  async function archive(){
    if(!window.confirm('Archive this announcement?'))return;
    await sb.from('ops_announcements').update({status:'archived'}).eq('id',ann.id);
    onRefresh();
  }

  return(
    <div style={{background:'var(--panel)',border:`1px solid var(--border)`,borderLeft:`3px solid ${color}`,borderRadius:12,padding:18,marginBottom:12}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontSize:11,fontWeight:700,background:color+'22',color,padding:'2px 8px',borderRadius:999,textTransform:'uppercase'}}>{catLabel(ann.category)}</span>
          {ann.status==='archived'&&<span style={{fontSize:10,color:'var(--muted)',background:'rgba(255,255,255,.05)',padding:'2px 6px',borderRadius:4}}>ARCHIVED</span>}
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontSize:11,color:'var(--muted)'}}>{new Date(ann.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>
          {ann.status!=='archived'&&<button className="btn btn-ghost btn-sm" onClick={archive} style={{fontSize:11}}>Archive</button>}
          <button className="btn btn-danger btn-sm" onClick={async()=>{if(!window.confirm('Permanently delete this announcement?'))return;await sb.from('ops_announcements').delete().eq('id',ann.id);onRefresh();}} style={{fontSize:11}}>Delete</button>
        </div>
      </div>
      <div style={{fontSize:16,fontWeight:700,marginBottom:6}}>{ann.title}</div>
      <div style={{fontSize:13,color:'var(--muted)',marginBottom:12,lineHeight:1.5,whiteSpace:'pre-wrap'}}>{ann.body.length>150&&!expanded?ann.body.slice(0,150)+'...':ann.body}
        {ann.body.length>150&&<button onClick={()=>setExpanded(s=>!s)} style={{background:'none',border:'none',color:'var(--gold)',cursor:'pointer',fontSize:12,padding:'0 4px',fontFamily:'inherit'}}>{expanded?'Less':'More'}</button>}
      </div>

      {/* Attachments */}
      {(ann.attachment_url||ann.link_url)&&(
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
          {ann.attachment_url&&ann.attachment_type==='image'&&(
            <a href={ann.attachment_url} target="_blank" rel="noreferrer">
              <img src={ann.attachment_url} alt={ann.attachment_name} style={{maxHeight:120,maxWidth:200,borderRadius:6,objectFit:'cover',border:'1px solid var(--border)',cursor:'pointer'}}/>
            </a>
          )}
          {ann.attachment_url&&ann.attachment_type==='video'&&(
            <video src={ann.attachment_url} controls style={{maxHeight:160,maxWidth:280,borderRadius:6,border:'1px solid var(--border)'}}/>
          )}
          {ann.attachment_url&&ann.attachment_type==='pdf'&&(
            <a href={ann.attachment_url} target="_blank" rel="noreferrer" style={{display:'flex',alignItems:'center',gap:8,background:'rgba(204,156,58,.1)',border:'1px solid rgba(204,156,58,.3)',borderRadius:8,padding:'8px 14px',textDecoration:'none',color:'var(--gold)',fontSize:13,fontWeight:600}}>
              📄 {ann.attachment_name||'Download PDF'}
            </a>
          )}
          {ann.attachment_url&&ann.attachment_type==='file'&&(
            <a href={ann.attachment_url} target="_blank" rel="noreferrer" style={{display:'flex',alignItems:'center',gap:8,background:'rgba(91,143,212,.1)',border:'1px solid rgba(91,143,212,.3)',borderRadius:8,padding:'8px 14px',textDecoration:'none',color:'var(--blue)',fontSize:13,fontWeight:600}}>
              📎 {ann.attachment_name||'Download File'}
            </a>
          )}
          {ann.link_url&&(
            <a href={ann.link_url} target="_blank" rel="noreferrer" style={{display:'flex',alignItems:'center',gap:8,background:'rgba(155,120,212,.1)',border:'1px solid rgba(155,120,212,.3)',borderRadius:8,padding:'8px 14px',textDecoration:'none',color:'var(--purple)',fontSize:13,fontWeight:600}}>
              🔗 {ann.link_label||ann.link_url.slice(0,40)}
            </a>
          )}
        </div>
      )}
      {total>0&&(
        <>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
            <span style={{color:'var(--muted)'}}>Receipt confirmation</span>
            <span style={{color:pct===100?'var(--green)':pct>50?'var(--gold)':'var(--muted)',fontWeight:600}}>{confirmed}/{total} confirmed · {pct}%</span>
          </div>
          <div className="progress-bar" style={{marginBottom:10}}>
            <div className="progress-fill" style={{width:`${pct}%`,background:pct===100?'var(--green)':'var(--orange)'}}/>
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {receipts.map(r=>(
              <span key={r.id} style={{fontSize:11,padding:'2px 8px',borderRadius:4,background:r.confirmed?'rgba(95,184,122,.15)':'rgba(255,255,255,.05)',color:r.confirmed?'var(--green)':'var(--muted)'}}>
                {r.franchisees?.store_name||r.franchisees?.name||'?'} {r.confirmed?'✓':'○'}
              </span>
            ))}
          </div>
        </>
      )}
    </div>
  );
}


// ── EDIT STORE MODAL (OPS) ────────────────────────────────
function EditStoreModal({store, onClose}){
  const [form,setForm]=useState({
    name:store.name||'',
    store_name:store.store_name||'',
    email:store.email||'',
    phone:store.phone||'',
    territory:store.territory||'',
    entity_name:store.entity_name||'',
  });
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState('');
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  async function save(){
    setBusy(true);
    const{error}=await sb.from('franchisees').update({
      name:form.name,
      store_name:form.store_name,
      email:form.email,
      phone:form.phone,
      territory:form.territory,
      entity_name:form.entity_name,
      updated_at:new Date().toISOString(),
    }).eq('id',store.id);
    if(error){setMsg('Error: '+error.message);setBusy(false);return;}
    setMsg('Saved!');
    setTimeout(()=>onClose(),600);
    setBusy(false);
  }

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">Edit Store Info</div>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10}}>Store</div>
          <div className="form-row">
            <div className="form-group"><label>Store Name</label><input value={form.store_name} onChange={e=>set('store_name',e.target.value)}/></div>
            <div className="form-group"><label>Territory</label><input value={form.territory} onChange={e=>set('territory',e.target.value)}/></div>
          </div>
          <div className="form-group"><label>Legal Entity Name</label><input value={form.entity_name} onChange={e=>set('entity_name',e.target.value)}/></div>
          <div style={{height:1,background:'var(--border)',margin:'16px 0'}}/>
          <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10}}>Franchisee Contact</div>
          <div className="form-group"><label>Full Name</label><input value={form.name} onChange={e=>set('name',e.target.value)}/></div>
          <div className="form-row">
            <div className="form-group"><label>Email</label><input type="email" value={form.email} onChange={e=>set('email',e.target.value)} placeholder="franchisee@email.com"/></div>
            <div className="form-group"><label>Phone</label><input value={form.phone} onChange={e=>set('phone',e.target.value)}/></div>
          </div>
          {msg&&<div style={{fontSize:13,color:msg==='Saved!'?'var(--green)':'var(--red)',marginTop:4}}>{msg}</div>}
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={save} disabled={busy}>{busy?'Saving...':'Save Changes'}</button>
        </div>
      </div>
    </div>
  );
}


// ── CHANGE PASSWORD ───────────────────────────────────────
function ChangePassword({onDone}){
  const [newPass,setNewPass]=useState('');
  const [confirm,setConfirm]=useState('');
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState('');
  const [err,setErr]=useState('');

  async function save(e){
    e.preventDefault();
    if(newPass.length<8){setErr('Password must be at least 8 characters.');return;}
    if(newPass!==confirm){setErr('Passwords do not match.');return;}
    setBusy(true);setErr('');setMsg('');
    const{error}=await sb.auth.updateUser({password:newPass});
    if(error){setErr(error.message);}
    else{setMsg('Password changed successfully.');setNewPass('');setConfirm('');}
    setBusy(false);
  }

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Change Password</div><div className="page-sub">Update your account password</div></div>
      </div>
      <div className="content">
        <div className="card" style={{maxWidth:400}}>
          <form onSubmit={save}>
            <div className="form-group">
              <label>New Password</label>
              <input type="password" value={newPass} onChange={e=>setNewPass(e.target.value)} placeholder="Min. 8 characters" autoFocus/>
            </div>
            <div className="form-group">
              <label>Confirm Password</label>
              <input type="password" value={confirm} onChange={e=>setConfirm(e.target.value)} placeholder="Repeat new password"/>
            </div>
            {err&&<div style={{color:'var(--red)',fontSize:13,marginBottom:12}}>{err}</div>}
            {msg&&<div style={{color:'var(--green)',fontSize:13,marginBottom:12}}>{msg} <button type="button" onClick={onDone} style={{background:'none',border:'none',color:'var(--gold)',cursor:'pointer',fontSize:13,padding:0,fontFamily:'inherit'}}>Go back →</button></div>}
            <div style={{display:'flex',gap:10}}>
              <button type="submit" className="btn btn-primary" disabled={busy||!newPass||!confirm}>{busy?'Saving...':'Save Password'}</button>
              <button type="button" className="btn btn-ghost" onClick={onDone}>Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </>
  );
}

// ── FRANCHISEE PORTAL ────────────────────────────────────
function FranchiseePortal({session, profile}){
  const [portalView,setPortalView]=useState('tasks');
  const [botOpen,setBotOpen]=useState(false);
  const [hqReplyCount,setHqReplyCount]=useState(0);
  const [taskCount,setTaskCount]=useState(0);
  const [announceCount,setAnnounceCount]=useState(0);
  const [warningCount,setWarningCount]=useState(0);
  const [activeWarningCount,setActiveWarningCount]=useState(0);
  const storeName=profile?.store||profile?.full_name||profile?.name||'My Store';

  const resolveFrId=useCallback(async()=>{
    return await resolveFranchiseeId(profile);
  },[profile]);

  const refreshBadges=useCallback(async()=>{
    const frId=await resolveFrId();
    if(!frId){setHqReplyCount(0);setTaskCount(0);setAnnounceCount(0);return;}
    // HQ replies awaiting franchisee
    const{count:hqc}=await sb.from('ops_messages').select('id',{count:'exact',head:true}).eq('franchisee_id',frId).eq('last_sender_role','hq');
    setHqReplyCount(hqc||0);
    // Incomplete tasks (assignments not yet approved, on non-archived tasks)
    const{data:assigns}=await sb.from('ops_assignments').select('status,ops_tasks(status)').eq('franchisee_id',frId);
    // Tasks needing franchisee action: not yet submitted (pending/in_progress) or denied (rejected).
    // submitted (awaiting HQ) and approved do NOT count.
    const needsAction=(assigns||[]).filter(a=>a.ops_tasks?.status!=='archived'&&(a.status==='pending'||a.status==='in_progress'||a.status==='rejected')).length;
    setTaskCount(needsAction);
    // Unconfirmed announcements (active announcements without a confirmed receipt)
    const[aRes,rRes]=await Promise.all([
      sb.from('ops_announcements').select('id').eq('status','active'),
      sb.from('ops_announcement_receipts').select('announcement_id,confirmed').eq('franchisee_id',frId),
    ]);
    const confirmedIds=new Set((rRes.data||[]).filter(r=>r.confirmed).map(r=>r.announcement_id));
    const unconfirmed=(aRes.data||[]).filter(a=>!confirmedIds.has(a.id)).length;
    setAnnounceCount(unconfirmed);
    setAppBadgeCount(needsAction+unconfirmed+(hqc||0));
    // Warning history: My Standing tab only appears if this store has ever received a warning.
    // Tab visibility = ever received (warningCount). Nav badge = active warnings in last 12 months.
    const{data:wRows}=await sb.from('ops_warnings').select('status,issued_at,franchisee_seen_status').eq('franchisee_id',frId);
    const allW=wRows||[];
    setWarningCount(allW.length);
    // Nav badge acts as a notification: count warnings the franchisee hasn't seen at
    // their current status (newly issued, or status changed by HQ e.g. registered/rescinded).
    setActiveWarningCount(allW.filter(w=>(w.franchisee_seen_status||null)!==w.status).length);
  },[resolveFrId]);

  useEffect(()=>{
    refreshBadges();const t=setInterval(refreshBadges,60000);return()=>clearInterval(t);
  },[refreshBadges]);

  // If the My Standing tab is hidden (no warnings) but somehow selected, fall back to tasks.
  useEffect(()=>{
    if(portalView==='warnings'&&warningCount===0)setPortalView('tasks');
  },[portalView,warningCount]);

  const navItems=[
    {key:'tasks',    icon:'▤', label:'My Tasks', badge:taskCount||null},
    {key:'announce', icon:'◈', label:'Announcements', badge:announceCount||null},
    {key:'contact',  icon:'✉', label:'Contact HQ', badge:hqReplyCount||null},
    // My Standing only shows once a store has received a warning — no need to alarm
    // franchisees in good standing who have never been warned.
    ...(warningCount>0?[{key:'warnings', icon:'⚠', label:'My Standing', badge:activeWarningCount||null}]:[]),
    {key:'bot',      icon:'◉', label:'UglyBot'},
    {key:'password', icon:'◎', label:'Settings'},
  ];

  return(
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-logo" style={{paddingBottom:14}}>
          <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAKAAAACgCAYAAACLz2ctAABXsElEQVR4nO2dd5wdVd3/3+fMzG3bd9NDKoQQSigJEFroRUBRuggqKqiIwqPYsDzq409FQQXFBx/gEQuooGIBkc5Dh4QaSG+bstlsr7fNzPn+/jgzdzdL2iabAvLhddnce+fOnDnnO9/+/R7FvwlERAEOgFIq2MQxw4HxwITotScwDqiK3jtABqjbxGU6ga7o36uif68EVkTv66PXeqWU2cj13eifZmPfvxOhdvUAdiRERAOajSyoiIwG9gMOAg4G9gXGYolL78BhtQENwGLg5eg1XylVP2B88QNjAFFKyQ4c0y7DO44A+xFd2H/RRGQkMBs4Mvq7N1C+idMYoP+CKzacq03Nm2zk3/FfxaYJuwAsAZ6JXk9uhCBd3oGc8R1BgBG30FhOYfp9vi/wHuA0YCZQPeCnJnoR/X4goe2Q4Q54xQ9Mf2SBV4GHgPuBl+KHqR9nDN8JXPFtTYAxt+uv04nIFOD9wDnADMDt95OQvkXfGcS2tYiJ0WDH5Az4/nXgr8BflFKvlX4k4jDgoXu7YXdZgEEhIjyllAqj9+XA6cBHgROAZL/DA/rE39vlfmNiFDZ8gAQron8F/EMp1QxvnY+3E94uCwJslPAmAR+JXhP7HRqw+3G57UGsKvQnxibgLuB2pdQbUJof3k4c8W2xOBshvIOAK4EL6DMk4qf/7cTpBouYM0KfmA6AvwE3KaWehLeXaN6tFypWuGMdT0SmA9cCZwNedFjM7Xak62R3hGAfuv5c8V/A9wcQotmdjZXdlgBFxBkgar8EfAxIRIeEvLO53dYi5or95+KPwP9TSs0D68LZlPN9V2O3W7z+eoyI1AKfx4rbquiQdwlv0+g/N0XgduAHSqlVYOd2dxPLu9Ui9n9SReQS4NvApOjrAKv37FZj3k0R0qcjtgLfBX6mlAojh/Zu40PcLRYz4nqilBIRmQbcgHUgw7uEt60YqCO+AHxBKfUM7D7ccJcr7hHXMxHx/QcwB0t8IX2uh3eJb/BQ2LkT7EN8OPCkiPxARFKRiuNu9gw7AbtsYftbuCIyGfgf4MTo6/4i5F0MDeIoiwJeAS5TSr20qy3lXcIB+xkagYhcCLyIJb4A+8RuN/GJCMYYwjAkCALCMERkt1B7dhVi4yTAZv88IyJXKaXCSPrskgd+p3PA2L0iIh7wA6yVC0PE9cLQ+qMd510Guhn0n+u7gM8opTp2hbtmpxJgfIMiMha4EziWIXCrxNyuP9H5fsDSpUtYsWIFnZ2d1FRXc/DBhzBy1EhEBKX+7dXK/kbKfOBCpdS83dlnuF2IFV4ROUJEVomFL9uJIAhK/zYi8thjj8lnPvMZOWC//SSTSGyQ+nTDj663F/W3+7LvJMST0SkiZ0dr9M4SH9JHfOeLSC664WAjk7HVCMNQwjAUEZFisSh3/PrXcthhhw3MtZOqsgrJJMpEay2PP/a4vXCwXZd+J6L/hFwdrZUj1lB8+0JElPQR32f73WS4XbPVj4D+9Kc/yUEHHbQB0bk6KUcdMk1u/e4H5SMfOFSUUlKZKZP6lSvtxcPtuvw7FUb61uW6aM20vF2JUCzxOdG/vxndWBDd6LbNkDEl4luyZImcddZZJaLzlBZAjjtsH/nzTy6VpievlcZHviCTR1YIIONGjZGuzs7Sed7FRmGkTyT/st867jAi3CGOSNnQx3cdNpFguyIaxhi01jiOw//e/r9c88VraG9vpzyRpKdYoLaumq9/8lTOO2UCbuCjpcifHn6D5eu7UUAqnSSZSg3dTb4zETuvfeByESnDJvkaEVE7InIy5AQYEZ+OiO964AvYG/I2/8tNIwxDHMehUChw5Wc+w223344LZBIJeooFTj3qQH549YlMGuXR3pWjNxRqajI8MrevrkcpjXo3oLK18LBr9iEgoZQ6P+aEQ+ }
