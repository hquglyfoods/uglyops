// ── ANNOUNCEMENTS ─────────────────────────────────────────
function Announcements(){
  const [announcements,setAnnouncements]=useState([]);
  const [stores,setStores]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showNew,setShowNew]=useState(false);
  const [selected,setSelected]=useState(null);
  const [form,setForm]=useState({title:'',body:'',category:'general',target:'',link_url:'',link_label:''});
  const [selectedStores,setSelectedStores]=useState([]);
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState('');
  const [attachFile,setAttachFile]=useState(null); // File object
  const [attachPreview,setAttachPreview]=useState(null);
  const [uploadProgress,setUploadProgress]=useState(0);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  function handleFileChange(e){
    const file=e.target.files[0];
    if(!file)return;
    setAttachFile(file);
    // Preview for images/video
    if(file.type.startsWith('image/')||file.type.startsWith('video/')){
      setAttachPreview(URL.createObjectURL(file));
    }else{
      setAttachPreview(null);
    }
  }

  function getAttachType(file){
    if(!file)return null;
    if(file.type.startsWith('image/'))return'image';
    if(file.type.startsWith('video/'))return'video';
    if(file.type==='application/pdf')return'pdf';
    return'file';
  }

  const ANN_CATS=[
    {key:'general',label:'General',color:'#5B8FD4'},
    {key:'urgent',label:'Urgent',color:'#E05252'},
    {key:'menu',label:'Menu Update',color:'#CC9C3A'},
    {key:'policy',label:'Policy',color:'#9B78D4'},
  ];

  async function load(){
    setLoading(true);
    const[aRes,sRes]=await Promise.all([
      sb.from('ops_announcements').select('*').order('created_at',{ascending:false}),
      sb.from('franchisees').select('id,name,store_name,territory,email').eq('status','open').order('name'),
    ]);
    setAnnouncements(aRes.data||[]);
    setStores(sRes.data||[]);
    setLoading(false);
  }
  useEffect(()=>{load();},[]);

  async function sendAnnouncement(){
    if(!form.title||!form.body){setMsg('Title and body required.');return;}
    setBusy(true);setMsg('');
    // 0. Upload file if attached
    let attachment_url=null,attachment_name=null,attachment_type=null;
    if(attachFile){
      const ext=attachFile.name.split('.').pop();
      const path=`${Date.now()}-${attachFile.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
      const{data:upload,error:upErr}=await sb.storage.from('announcements').upload(path,attachFile,{contentType:attachFile.type});
      if(upErr){setMsg('File upload failed: '+upErr.message);setBusy(false);return;}
      const{data:urlData}=sb.storage.from('announcements').getPublicUrl(path);
      attachment_url=urlData.publicUrl;
      attachment_name=attachFile.name;
      attachment_type=getAttachType(attachFile);
    }
    // 1. Create announcement
    const{data:ann}=await sb.from('ops_announcements').insert([{
      ...form,
      target:form.target==='all'?'all':selectedStores.join(','),
      attachment_url,attachment_name,attachment_type,
      link_url:form.link_url||null,
      link_label:form.link_label||null,
    }]).select().single();
    if(!ann){setBusy(false);setMsg('Error creating announcement.');return;}
    // 2. Create receipt records
    const targetStores=form.target==='all'?stores:stores.filter(s=>selectedStores.includes(s.id));
    if(targetStores.length){
      await sb.from('ops_announcement_receipts').insert(targetStores.map(s=>({announcement_id:ann.id,franchisee_id:s.id,confirmed:false})));
      // 3. Send emails
      const emailTargets=targetStores.filter(s=>s.email).map(s=>({email:s.email,name:s.store_name||s.name}));
      if(emailTargets.length){
        const sent=await sendEmail(
          emailTargets,
          `[${form.category.toUpperCase()}] ${form.title}`,
          announcementEmailHtml(form.title,form.body,form.category,'your store',attachment_url,attachment_name,attachment_type,form.link_url,form.link_label)
        );
        setMsg(`✓ Announcement sent to ${emailTargets.length} store${emailTargets.length>1?'s':''}. ${targetStores.length-emailTargets.length>0?`(${targetStores.length-emailTargets.length} stores have no email on file)`:''}`);
      }else{
        setMsg('Announcement created but no stores have email addresses on file.');
      }
    }
    setForm({title:'',body:'',category:'general',target:'all',link_url:'',link_label:''});
    setSelectedStores([]);setAttachFile(null);setAttachPreview(null);
    setShowNew(false);
    load();
    setBusy(false);
  }

  function catColor(k){return ANN_CATS.find(c=>c.key===k)?.color||'#5B8FD4';}
  function catLabel(k){return ANN_CATS.find(c=>c.key===k)?.label||k;}

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Announcements</div><div className="page-sub">Broadcast messages to open stores</div></div>
        <button className="btn btn-primary" onClick={()=>setShowNew(s=>!s)}>+ New Announcement</button>
      </div>
      <div className="content">
        {showNew&&(
          <div className="card" style={{marginBottom:20}}>
            <div style={{fontWeight:700,marginBottom:14}}>New Announcement</div>
            <div className="form-row">
              <div className="form-group">
                <label>Category</label>
                <select value={form.category} onChange={e=>set('category',e.target.value)} style={{background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none',width:'100%'}}>
                  {ANN_CATS.map(c=><option key={c.key} value={c.key}>{c.label}</option>)}
                </select>
              </div>
              <div className="form-group"><label>Title</label><input value={form.title} onChange={e=>set('title',e.target.value)} placeholder="e.g. Summer Menu Launch Notice"/></div>
            </div>
            <div className="form-group">
              <label>Message Body</label>
              <textarea value={form.body} onChange={e=>set('body',e.target.value)} style={{minHeight:120}} placeholder="Write your announcement here..."/>
            </div>

            {/* Attachment */}
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Attachment (optional)</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div>
                  <label style={{display:'block',fontSize:12,color:'var(--muted)',marginBottom:6}}>Upload File (PDF, Image, Video)</label>
                  <label style={{display:'flex',alignItems:'center',gap:8,background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',cursor:'pointer'}}>
                    <span style={{fontSize:18}}>📎</span>
                    <span style={{fontSize:13,color:attachFile?'var(--text)':'var(--muted)'}}>{attachFile?attachFile.name:'Choose file...'}</span>
                    <input type="file" accept="image/*,video/*,.pdf,.doc,.docx" onChange={handleFileChange} style={{display:'none'}}/>
                  </label>
                  {attachFile&&(
                    <div style={{marginTop:6,display:'flex',alignItems:'center',gap:8}}>
                      {attachPreview&&attachFile.type.startsWith('image/')&&<img src={attachPreview} style={{width:60,height:60,objectFit:'cover',borderRadius:4}}/>}
                      {attachPreview&&attachFile.type.startsWith('video/')&&<video src={attachPreview} style={{width:80,height:60,objectFit:'cover',borderRadius:4}}/>}
                      <div>
                        <div style={{fontSize:12,color:'var(--text)'}}>{attachFile.name}</div>
                        <div style={{fontSize:11,color:'var(--muted)'}}>{(attachFile.size/1024/1024).toFixed(1)} MB</div>
                      </div>
                      <button onClick={()=>{setAttachFile(null);setAttachPreview(null);}} style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:16,padding:0,marginLeft:'auto'}}>✕</button>
                    </div>
                  )}
                </div>
                <div>
                  <label style={{display:'block',fontSize:12,color:'var(--muted)',marginBottom:6}}>Or External Link (Google Drive, YouTube, etc.)</label>
                  <input value={form.link_url} onChange={e=>set('link_url',e.target.value)} placeholder="https://..." style={{width:'100%',background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none',marginBottom:6}}/>
                  <input value={form.link_label} onChange={e=>set('link_label',e.target.value)} placeholder="Button label (e.g. 'View Recipe Book')" style={{width:'100%',background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none'}}/>
                </div>
              </div>
            </div>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Send To</div>
              <div style={{display:'flex',gap:8,marginBottom:form.target==='select'?12:0}}>
                <button className={`btn btn-sm ${form.target==='all'?'btn-primary':'btn-ghost'}`} onClick={()=>set('target','all')}>All Open Stores ({stores.length})</button>
                <button className={`btn btn-sm ${form.target==='select'?'btn-primary':'btn-ghost'}`} onClick={()=>set('target','select')}>Select Stores</button>
              </div>
              {form.target==='select'&&(
                <div style={{maxHeight:200,overflowY:'auto',border:'1px solid var(--border)',borderRadius:8,padding:'4px 0'}}>
                  {stores.map(s=>(
                    <div key={s.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 14px',cursor:'pointer',borderBottom:'1px solid var(--border)'}}
                      onClick={()=>setSelectedStores(ss=>ss.includes(s.id)?ss.filter(x=>x!==s.id):[...ss,s.id])}>
                      <div style={{width:16,height:16,borderRadius:4,border:`1.5px solid ${selectedStores.includes(s.id)?'var(--orange)':'var(--border2)'}`,background:selectedStores.includes(s.id)?'var(--orange)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                        {selectedStores.includes(s.id)&&<span style={{fontSize:10,color:'#000',fontWeight:700}}>✓</span>}
                      </div>
                      <div>
                        <div style={{fontSize:13,fontWeight:600}}>{s.store_name||s.name}</div>
                        <div style={{fontSize:11,color:s.email?'var(--muted)':'var(--red)'}}>{s.email||'No email on file'}</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
            {msg&&<div style={{padding:12,background:msg.startsWith('✓')?'rgba(95,184,122,.1)':'rgba(224,82,82,.1)',border:`1px solid ${msg.startsWith('✓')?'rgba(95,184,122,.3)':'rgba(224,82,82,.3)'}`,borderRadius:8,fontSize:13,color:msg.startsWith('✓')?'var(--green)':'var(--red)',marginBottom:12}}>{msg}</div>}
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-primary" onClick={sendAnnouncement} disabled={busy||!form.title||!form.body||
                (form.target==='select'&&selectedStores.length===0)}>
                {busy?'Sending...':form.target==='all'?`Send to All ${stores.length} Stores`:`Send to ${selectedStores.length} Store${selectedStores.length!==1?'s':''}`}
              </button>
              <button className="btn btn-ghost" onClick={()=>{setShowNew(false);setMsg('');}}>Cancel</button>
            </div>
          </div>
        )}

        {loading?<div className="loading">Loading...</div>:announcements.length===0?(
          <div className="empty"><div className="empty-icon">◈</div><div className="empty-title">No announcements yet</div><div style={{fontSize:13,color:'var(--muted)'}}>Create your first announcement to broadcast to stores</div></div>
        ):(
          announcements.map(a=>(
            <AnnouncementCard key={a.id} ann={a} stores={stores} catColor={catColor} catLabel={catLabel} onRefresh={load}/>
          ))
        )}
      </div>
    </>
  );
}

function AnnouncementCard({ann,stores,catColor,catLabel,onRefresh}){
  const [receipts,setReceipts]=useState([]);
  const [expanded,setExpanded]=useState(false);

  useEffect(()=>{
    sb.from('ops_announcement_receipts').select('*,franchisees(name,store_name)').eq('announcement_id',ann.id).then(r=>setReceipts(r.data||[]));
  },[ann.id]);

  const confirmed=receipts.filter(r=>r.confirmed).length;
  const total=receipts.length;
  const pct=total?Math.round(confirmed/total*100):0;
  const color=catColor(ann.category);

  async function archive(){
    if(!window.confirm('Archive this announcement?'))return;
    await sb.from('ops_announcements').update({status:'archived'}).eq('id',ann.id);
    onRefresh();
  }

  return(
    <div style={{background:'var(--panel)',border:`1px solid var(--border)`,borderLeft:`3px solid ${color}`,borderRadius:12,padding:18,marginBottom:12}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontSize:11,fontWeight:700,background:color+'22',color,padding:'2px 8px',borderRadius:999,textTransform:'uppercase'}}>{catLabel(ann.category)}</span>
          {ann.status==='archived'&&<span style={{fontSize:10,color:'var(--muted)',background:'rgba(255,255,255,.05)',padding:'2px 6px',borderRadius:4}}>ARCHIVED</span>}
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontSize:11,color:'var(--muted)'}}>{new Date(ann.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>
          {ann.status!=='archived'&&<button className="btn btn-ghost btn-sm" onClick={archive} style={{fontSize:11}}>Archive</button>}
        </div>
      </div>
      <div style={{fontSize:16,fontWeight:700,marginBottom:6}}>{ann.title}</div>
      <div style={{fontSize:13,color:'var(--muted)',marginBottom:12,lineHeight:1.5,whiteSpace:'pre-wrap'}}>{ann.body.length>150&&!expanded?ann.body.slice(0,150)+'...':ann.body}
        {ann.body.length>150&&<button onClick={()=>setExpanded(s=>!s)} style={{background:'none',border:'none',color:'var(--gold)',cursor:'pointer',fontSize:12,padding:'0 4px',fontFamily:'inherit'}}>{expanded?'Less':'More'}</button>}
      </div>

      {/* Attachments */}
      {(ann.attachment_url||ann.link_url)&&(
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
          {ann.attachment_url&&ann.attachment_type==='image'&&(
            <a href={ann.attachment_url} target="_blank" rel="noreferrer">
              <img src={ann.attachment_url} alt={ann.attachment_name} style={{maxHeight:120,maxWidth:200,borderRadius:6,objectFit:'cover',border:'1px solid var(--border)',cursor:'pointer'}}/>
            </a>
          )}
          {ann.attachment_url&&ann.attachment_type==='video'&&(
            <video src={ann.attachment_url} controls style={{maxHeight:160,maxWidth:280,borderRadius:6,border:'1px solid var(--border)'}}/>
          )}
          {ann.attachment_url&&ann.attachment_type==='pdf'&&(
            <a href={ann.attachment_url} target="_blank" rel="noreferrer" style={{display:'flex',alignItems:'center',gap:8,background:'rgba(204,156,58,.1)',border:'1px solid rgba(204,156,58,.3)',borderRadius:8,padding:'8px 14px',textDecoration:'none',color:'var(--gold)',fontSize:13,fontWeight:600}}>
              📄 {ann.attachment_name||'Download PDF'}
            </a>
          )}
          {ann.attachment_url&&ann.attachment_type==='file'&&(
            <a href={ann.attachment_url} target="_blank" rel="noreferrer" style={{display:'flex',alignItems:'center',gap:8,background:'rgba(91,143,212,.1)',border:'1px solid rgba(91,143,212,.3)',borderRadius:8,padding:'8px 14px',textDecoration:'none',color:'var(--blue)',fontSize:13,fontWeight:600}}>
              📎 {ann.attachment_name||'Download File'}
            </a>
          )}
          {ann.link_url&&(
            <a href={ann.link_url} target="_blank" rel="noreferrer" style={{display:'flex',alignItems:'center',gap:8,background:'rgba(155,120,212,.1)',border:'1px solid rgba(155,120,212,.3)',borderRadius:8,padding:'8px 14px',textDecoration:'none',color:'var(--purple)',fontSize:13,fontWeight:600}}>
              🔗 {ann.link_label||ann.link_url.slice(0,40)}
            </a>
          )}
        </div>
      )}
      {total>0&&(
        <>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
            <span style={{color:'var(--muted)'}}>Receipt confirmation</span>
            <span style={{color:pct===100?'var(--green)':pct>50?'var(--gold)':'var(--muted)',fontWeight:600}}>{confirmed}/{total} confirmed · {pct}%</span>
          </div>
          <div className="progress-bar" style={{marginBottom:10}}>
            <div className="progress-fill" style={{width:`${pct}%`,background:pct===100?'var(--green)':'var(--orange)'}}/>
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {receipts.map(r=>(
              <span key={r.id} style={{fontSize:11,padding:'2px 8px',borderRadius:4,background:r.confirmed?'rgba(95,184,122,.15)':'rgba(255,255,255,.05)',color:r.confirmed?'var(--green)':'var(--muted)'}}>
                {r.franchisees?.store_name||r.franchisees?.name||'?'} {r.confirmed?'✓':'○'}
              </span>
            ))}
          </div>
        </>
      )}
    </div>
  );
}


// ── CHANGE PASSWORD ───────────────────────────────────────
function ChangePassword({onDone}){
  const [newPass,setNewPass]=useState('');
  const [confirm,setConfirm]=useState('');
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState('');
  const [err,setErr]=useState('');

  async function save(e){
    e.preventDefault();
    if(newPass.length<8){setErr('Password must be at least 8 characters.');return;}
    if(newPass!==confirm){setErr('Passwords do not match.');return;}
    setBusy(true);setErr('');setMsg('');
    const{error}=await sb.auth.updateUser({password:newPass});
    if(error){setErr(error.message);}
    else{setMsg('Password changed successfully.');setNewPass('');setConfirm('');}
    setBusy(false);
  }

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Change Password</div><div className="page-sub">Update your account password</div></div>
      </div>
      <div className="content">
        <div className="card" style={{maxWidth:400}}>
          <form onSubmit={save}>
            <div className="form-group">
              <label>New Password</label>
              <input type="password" value={newPass} onChange={e=>setNewPass(e.target.value)} placeholder="Min. 8 characters" autoFocus/>
            </div>
            <div className="form-group">
              <label>Confirm Password</label>
              <input type="password" value={confirm} onChange={e=>setConfirm(e.target.value)} placeholder="Repeat new password"/>
            </div>
            {err&&<div style={{color:'var(--red)',fontSize:13,marginBottom:12}}>{err}</div>}
            {msg&&<div style={{color:'var(--green)',fontSize:13,marginBottom:12}}>{msg} <button type="button" onClick={onDone} style={{background:'none',border:'none',color:'var(--gold)',cursor:'pointer',fontSize:13,padding:0,fontFamily:'inherit'}}>Go back →</button></div>}
            <div style={{display:'flex',gap:10}}>
              <button type="submit" className="btn btn-primary" disabled={busy||!newPass||!confirm}>{busy?'Saving...':'Save Password'}</button>
              <button type="button" className="btn btn-ghost" onClick={onDone}>Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
