                <input type="checkbox" checked={form.require_hq_approval} onChange={e=>set('require_hq_approval',e.target.checked)} style={{width:'auto',margin:0}}/>
                <span style={{fontSize:13,fontWeight:500,color:'var(--text)'}}>Require HQ approval after franchisee submits</span>
              </label>
              <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>If unchecked, submissions are auto-approved</div>
            </div>
            <button className="btn btn-primary" onClick={()=>setStep(2)} disabled={!stepValid[1]}>Next: Add Sub-Tasks →</button>
          </div>
        )}

        {step===2&&(
          <div className="card" style={{maxWidth:680}}>
            <div style={{fontWeight:700,marginBottom:4}}>Sub-Tasks</div>
            <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>Break down what franchisees need to complete and what proof to submit</div>
            {subtasks.map((st,i)=>(
              <div key={i} style={{background:'var(--panel2)',border:'1px solid var(--border)',borderRadius:10,padding:16,marginBottom:12}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                  <span style={{fontSize:12,fontWeight:700,color:'var(--muted)'}}>Sub-task {i+1}</span>
                  {subtasks.length>1&&<button onClick={()=>removeSubtask(i)} style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:16,padding:0}}>✕</button>}
                </div>
                <div className="form-group" style={{marginBottom:10}}>
                  <label>Title</label>
                  <input value={st.title} onChange={e=>updateSubtask(i,'title',e.target.value)} placeholder="e.g. Order new ingredients, Upload setup photo"/>
                </div>
                <div className="form-row">
                  <div className="form-group" style={{marginBottom:0}}>
                    <label>Proof Required</label>
                    <select value={st.proof_type} onChange={e=>updateSubtask(i,'proof_type',e.target.value)}>
                      {PROOF_TYPES.map(p=><option key={p.key} value={p.key}>{p.label}</option>)}
                    </select>
                  </div>
                  <div className="form-group" style={{marginBottom:0}}>
                    <label>Description (optional)</label>
                    <input value={st.description} onChange={e=>updateSubtask(i,'description',e.target.value)} placeholder="Additional context..."/>
                  </div>
                </div>
                <div style={{marginTop:10}}>
                  <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:12,fontWeight:500,color:'var(--muted)'}}>
                    <input type="checkbox" checked={st.is_required} onChange={e=>updateSubtask(i,'is_required',e.target.checked)} style={{width:'auto',margin:0}}/>
                    Required sub-task
                  </label>
                </div>
              </div>
            ))}
            <button className="btn btn-ghost btn-sm" onClick={addSubtask} style={{marginBottom:16}}>+ Add Sub-Task</button>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-ghost" onClick={()=>setStep(1)}>← Back</button>
              <button className="btn btn-primary" onClick={()=>setStep(3)} disabled={!stepValid[2]}>Next: Choose Stores →</button>
            </div>
          </div>
        )}

        {step===3&&(
          <div className="card" style={{maxWidth:600}}>
            <div style={{fontWeight:700,marginBottom:14}}>Target Stores</div>
            <div style={{display:'flex',gap:10,marginBottom:16}}>
              <button className={`btn btn-sm ${form.target==='all'?'btn-primary':'btn-ghost'}`} onClick={()=>set('target','all')}>All Open Stores ({stores.length})</button>
              <button className={`btn btn-sm ${form.target==='select'?'btn-primary':'btn-ghost'}`} onClick={()=>set('target','select')}>Select Stores</button>
            </div>

            {form.target==='select'&&(
              <div style={{marginBottom:20}}>
                {stores.length===0&&<div style={{color:'var(--muted)',fontSize:13}}>No open stores yet.</div>}
                {stores.map(s=>(
                  <div key={s.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:'1px solid var(--border)',cursor:'pointer'}} onClick={()=>toggleStore(s.id)}>
                    <div style={{width:18,height:18,borderRadius:4,border:`1.5px solid ${selectedStores.includes(s.id)?'var(--orange)':'var(--border2)'}`,background:selectedStores.includes(s.id)?'var(--orange)':'var(--panel2)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      {selectedStores.includes(s.id)&&<span style={{fontSize:11,color:'#000',fontWeight:700}}>✓</span>}
                    </div>
                    <div>
                      <div style={{fontSize:13,fontWeight:600}}>{s.name}</div>
                      <div style={{fontSize:11,color:'var(--muted)'}}>{s.territory}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Summary */}
            <div style={{background:'var(--panel2)',borderRadius:10,padding:16,marginBottom:20}}>
              <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',marginBottom:10,textTransform:'uppercase',letterSpacing:'.06em'}}>Task Summary</div>
              <div style={{fontSize:13,marginBottom:4}}><span style={{color:'var(--muted)'}}>Title:</span> {form.title}</div>
              <div style={{fontSize:13,marginBottom:4}}><span style={{color:'var(--muted)'}}>Category:</span> {catLabel(form.category)}</div>
              <div style={{fontSize:13,marginBottom:4}}><span style={{color:'var(--muted)'}}>Due:</span> {fmtDate(form.due_date)||'No date'}</div>
              <div style={{fontSize:13,marginBottom:4}}><span style={{color:'var(--muted)'}}>Sub-tasks:</span> {subtasks.length}</div>
              <div style={{fontSize:13,marginBottom:4}}><span style={{color:'var(--muted)'}}>HQ Approval:</span> {form.require_hq_approval?'Required':'Auto-approve'}</div>
              <div style={{fontSize:13}}><span style={{color:'var(--muted)'}}>Sending to:</span> {form.target==='all'?`All ${stores.length} open stores`:form.target==='select'?`${selectedStores.length} selected stores`:<span style={{color:'var(--red)'}}>Not selected yet</span>}</div>
            </div>

            {!stepValid[3]&&(
              <div style={{background:'rgba(224,82,82,.08)',border:'1px solid rgba(224,82,82,.25)',borderRadius:8,padding:'10px 14px',marginBottom:16,fontSize:12,color:'var(--red)'}}>
                ⚠ You must choose recipient stores above before broadcasting.
              </div>
            )}

            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-ghost" onClick={()=>setStep(2)}>← Back</button>
              <button className="btn btn-primary" onClick={broadcast} disabled={busy||!stepValid[3]}>
                {busy?'Broadcasting...':!stepValid[3]?'Select stores first':`Broadcast to ${form.target==='all'?stores.length:selectedStores.length} Store${(form.target==='all'?stores.length:selectedStores.length)!==1?'s':''} →`}
              </button>
            </div>
          </div>
        )}
      </div>
    </>
  );
}

// ── STORE LIST ────────────────────────────────────────────
function StoreList({setView}){
  const [stores,setStores]=useState([]);
  const [tasks,setTasks]=useState([]);
  const [assignments,setAssignments]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selected,setSelected]=useState(null);
  const [search,setSearch]=useState('');
  const [registeredStores,setRegisteredStores]=useState(new Set());

  useEffect(()=>{
    async function load(){
      setLoading(true);
      const[sRes,tRes,aRes,pRes]=await Promise.all([
        sb.from('franchisees').select('*').in('status',['open','soft_open']).order('store_name'),
        sb.from('ops_tasks').select('id,title,category').eq('status','active'),
        sb.from('ops_assignments').select('*'),
        sb.from('profiles').select('store,full_name,name').eq('role','franchisee'),
      ]);
      setStores(sRes.data||[]);setTasks(tRes.data||[]);setAssignments(aRes.data||[]);
      // Build set of store names that have accounts
      const registeredStores=new Set((pRes.data||[]).map(p=>p.store).filter(Boolean));
      setRegisteredStores(registeredStores);
      setLoading(false);
    }
    load();
  },[]);

  const filtered=useMemo(()=>{
    const q=search.toLowerCase();
    return stores.filter(s=>!q||
      s.store_name?.toLowerCase().includes(q)||
      s.name?.toLowerCase().includes(q)||
      s.territory?.toLowerCase().includes(q)||
      s.email?.toLowerCase().includes(q)
    );
  },[stores,search]);

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Open Stores</div><div className="page-sub">{stores.length} operational franchisees</div></div>
      </div>
      <div className="content">
        <div className="filter-bar" style={{marginBottom:16}}>
          <input placeholder="Search store name, territory, email..." value={search} onChange={e=>setSearch(e.target.value)} style={{minWidth:280}}/>
          <span style={{marginLeft:'auto',fontSize:12,color:'var(--muted)'}}>{filtered.length} stores</span>
        </div>
        {loading?<div className="loading">Loading...</div>:stores.length===0?(
          <div className="empty"><div className="empty-icon">◍</div><div className="empty-title">No open stores yet</div><div style={{fontSize:13,color:'var(--muted)'}}>Stores appear here when marked Open in Franchise OS</div></div>
        ):(()=>{
          const unregistered=filtered.filter(s=>!registeredStores.has(s.store_name||s.name));
          const registered=filtered.filter(s=>registeredStores.has(s.store_name||s.name));
          return(
            <div>
              {/* Unregistered — needs attention */}
              {unregistered.length>0&&(
                <div style={{marginBottom:24}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,padding:'10px 14px',background:'rgba(224,82,82,.08)',border:'1px solid rgba(224,82,82,.25)',borderRadius:10}}>
                    <span style={{fontSize:16}}>⚠</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:700,color:'var(--red)'}}>{unregistered.length} store{unregistered.length>1?'s':''} without Ops account</div>
                      <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>These stores cannot log in to Franchise Ops yet</div>
                    </div>
                  </div>
                  {unregistered.map(s=>{
                    const myAssigns=assignments.filter(a=>a.franchisee_id===s.id);
                    const submitted=myAssigns.filter(a=>a.status==='submitted').length;
                    return(
                      <div key={s.id} style={{background:'var(--panel)',border:'1px solid rgba(224,82,82,.25)',borderRadius:12,padding:18,marginBottom:10,cursor:'pointer',transition:'border-color .2s',position:'relative'}}
                        onClick={()=>setSelected(s)}
                        onMouseEnter={e=>e.currentTarget.style.borderColor='var(--red)'}
                        onMouseLeave={e=>e.currentTarget.style.borderColor='rgba(224,82,82,.25)'}>
                        <div style={{position:'absolute',top:12,right:12}}>
                          <span style={{fontSize:10,fontWeight:700,background:'rgba(224,82,82,.15)',color:'var(--red)',padding:'3px 8px',borderRadius:4}}>NO ACCOUNT</span>
                        </div>
                        <div style={{fontSize:15,fontWeight:700,marginBottom:2}}>{s.store_name||s.name}</div>
                        <div style={{fontSize:12,color:'var(--muted)',marginBottom:8}}>{s.store_name&&<span style={{marginRight:6}}>{s.name} ·</span>}{s.territory}</div>
                        <div style={{display:'flex',gap:10,alignItems:'center'}}>
                          {s.email&&<a href={`mailto:${s.email}`} onClick={e=>e.stopPropagation()} style={{fontSize:12,color:'var(--blue)',textDecoration:'none'}}>✉ {s.email}</a>}
                          {s.phone&&<a href={`tel:${s.phone}`} onClick={e=>e.stopPropagation()} style={{fontSize:12,color:'var(--green)',textDecoration:'none'}}>📞 {s.phone}</a>}
                          {submitted>0&&<span style={{fontSize:12,color:'var(--gold)',fontWeight:600,marginLeft:'auto'}}>{submitted} pending</span>}
                        </div>
                        {s.email&&(
                          <button className="btn btn-primary btn-sm" style={{marginTop:10}} onClick={e=>{e.stopPropagation();setView&&setView('accounts');}}>
                            + Create Ops Account →
                          </button>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}

              {/* Registered stores */}
              {registered.length>0&&(
                <div>
                  {unregistered.length>0&&<div style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:10}}>Active Accounts ({registered.length})</div>}
                  {registered.map(s=>{
                    const myAssigns=assignments.filter(a=>a.franchisee_id===s.id);
                    const submitted=myAssigns.filter(a=>a.status==='submitted').length;
                    return(
                      <div key={s.id} style={{background:'var(--panel)',border:'1px solid var(--border)',borderRadius:12,padding:18,marginBottom:10,cursor:'pointer',transition:'border-color .2s'}}
                        onClick={()=>setSelected(s)}
                        onMouseEnter={e=>e.currentTarget.style.borderColor='var(--orange)'}
                        onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
                        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                          <div>
                            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:2}}>
                              <div style={{fontSize:15,fontWeight:700}}>{s.store_name||s.name}</div>
                              <span style={{fontSize:10,fontWeight:700,background:'rgba(95,184,122,.15)',color:'var(--green)',padding:'2px 6px',borderRadius:4}}>✓ ACTIVE</span>
                            </div>
                            <div style={{fontSize:12,color:'var(--muted)'}}>{s.store_name&&<span style={{marginRight:6}}>{s.name} ·</span>}{s.territory}</div>
                          </div>
                          <div style={{display:'flex',gap:16,alignItems:'center'}}>
                            {submitted>0&&<span style={{fontSize:12,color:'var(--gold)',fontWeight:600}}>{submitted} pending</span>}
                            <div style={{textAlign:'right'}}>
                              {s.email&&<a href={`mailto:${s.email}`} onClick={e=>e.stopPropagation()} style={{fontSize:12,color:'var(--blue)',textDecoration:'none',display:'block'}}>✉ {s.email}</a>}
                              {s.phone&&<a href={`tel:${s.phone}`} onClick={e=>e.stopPropagation()} style={{fontSize:12,color:'var(--green)',textDecoration:'none',marginTop:2,display:'block'}}>📞 {s.phone}</a>}
                            </div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })()}
      </div>
      {selected&&<StoreDetailModal store={selected} tasks={tasks} assignments={assignments} onClose={()=>setSelected(null)}/>}
    </>
  );
}

// ── HQ REVIEW ─────────────────────────────────────────────
// ── HQ WARNINGS (official warnings, 3-strike rule) ────────
const WARN_CATEGORIES=['Missed Deadline','Quality','Compliance','Conduct','Other'];

function HQWarnings(){
  const [stores,setStores]=useState([]);
  const [warnings,setWarnings]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showIssue,setShowIssue]=useState(false);
  const [detail,setDetail]=useState(null);

  async function load(){
    setLoading(true);
    const[sRes,wRes]=await Promise.all([
      sb.from('franchisees').select('id,name,store_name,territory,email').in('status',['open','soft_open']).order('store_name'),
      sb.from('ops_warnings').select('*').order('issued_at',{ascending:false}),
    ]);
    setStores(sRes.data||[]);
    setWarnings(wRes.data||[]);
    setLoading(false);
  }
  useEffect(()=>{load();},[]);

  // Count active warnings within last 365 days per store
  const oneYearAgo=new Date(Date.now()-365*24*60*60*1000);
  function activeCount(frId){
    return warnings.filter(w=>w.franchisee_id===frId&&w.status==='active'&&new Date(w.issued_at)>=oneYearAgo).length;
  }

  // Stores sorted by warning count (most at-risk first)
  const storesWithCounts=stores.map(s=>({...s,count:activeCount(s.id)})).sort((a,b)=>b.count-a.count);
  const atRisk=storesWithCounts.filter(s=>s.count>=3);

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Warnings</div><div className="page-sub">Official warning records · 3 active in 12 months = termination review</div></div>
        <button className="btn btn-primary" onClick={()=>setShowIssue(true)}>+ Issue Warning</button>
      </div>
      <div className="content">
        {/* At-risk alert */}
        {atRisk.length>0&&(
          <div style={{background:'rgba(224,82,82,.1)',border:'1px solid rgba(224,82,82,.35)',borderRadius:12,padding:16,marginBottom:20}}>
            <div style={{fontSize:13,fontWeight:700,color:'var(--red)',marginBottom:8}}>⚠ {atRisk.length} store{atRisk.length>1?'s':''} at termination review threshold (3+ active warnings)</div>
            {atRisk.map(s=>(
              <div key={s.id} style={{fontSize:13,color:'var(--text)',marginTop:4}}>• <strong>{s.store_name||s.name}</strong> — {s.count} active warnings</div>
            ))}
          </div>
        )}

        {/* Store summary grid */}
        <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:12}}>Store Standing</div>
        {loading?<div className="loading">Loading...</div>:(
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:12,marginBottom:28}}>
            {storesWithCounts.map(s=>{
              const c=s.count;
              const color=c>=3?'var(--red)':c===2?'var(--gold)':c===1?'var(--blue)':'var(--green)';
              return(
                <div key={s.id} style={{background:'var(--panel)',border:`1px solid ${c>=3?'rgba(224,82,82,.35)':'var(--border)'}`,borderRadius:10,padding:14}}>
                  <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>{s.store_name||s.name}</div>
                  <div style={{fontSize:11,color:'var(--muted)',marginBottom:10}}>{s.territory}</div>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <div style={{display:'flex',gap:4}}>
                      {[0,1,2].map(i=>(
                        <div key={i} style={{width:22,height:8,borderRadius:4,background:i<c?color:'var(--border2)'}}/>
                      ))}
                    </div>
                    <span style={{fontSize:12,fontWeight:700,color}}>{c}/3</span>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* All warnings log */}
        <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:12}}>Warning Log</div>
        {warnings.length===0?(
          <div style={{color:'var(--muted)',fontSize:13,padding:'10px 0'}}>No warnings issued yet.</div>
        ):warnings.map(w=>{
          const expired=new Date(w.issued_at)<oneYearAgo;
          return(
            <div key={w.id} onClick={()=>setDetail(w)} style={{background:'var(--panel)',border:'1px solid var(--border)',borderLeft:`3px solid ${w.status==='rescinded'?'var(--muted2)':expired?'var(--border2)':'var(--red)'}`,borderRadius:10,padding:14,marginBottom:10,cursor:'pointer',opacity:w.status==='rescinded'||expired?0.65:1}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4,flexWrap:'wrap',gap:6}}>
                <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                  <span style={{fontSize:11,fontWeight:700,background:'rgba(224,82,82,.15)',color:'var(--red)',padding:'2px 8px',borderRadius:999}}>{w.category}</span>
                  <span style={{fontSize:14,fontWeight:700}}>{w.store_name}</span>
                  {w.status==='rescinded'&&<span style={{fontSize:10,color:'var(--muted)',fontWeight:700,textTransform:'uppercase'}}>Rescinded</span>}
                  {expired&&w.status==='active'&&<span style={{fontSize:10,color:'var(--muted)',fontWeight:700,textTransform:'uppercase'}}>Expired (&gt;12mo)</span>}
                </div>
                <span style={{fontSize:11,color:'var(--muted)'}}>{new Date(w.issued_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>
              </div>
              <div style={{fontSize:13,color:'var(--muted)',lineHeight:1.5}}>{w.reason.length>120?w.reason.slice(0,120)+'...':w.reason}</div>
              {w.related_task_title&&<div style={{fontSize:11,color:'var(--muted2)',marginTop:4}}>Related task: {w.related_task_title}</div>}
            </div>
          );
        })}
      </div>
      {showIssue&&<IssueWarningModal stores={stores} onClose={()=>{setShowIssue(false);load();}}/>}
      {detail&&<WarningDetailModal warning={detail} onClose={()=>{setDetail(null);load();}}/>}
    </>
  );
}

function IssueWarningModal({stores,onClose}){
  const [frId,setFrId]=useState('');
  const [category,setCategory]=useState('');
  const [reason,setReason]=useState('');
  const [severity,setSeverity]=useState('standard');
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState('');

  async function issue(){
    if(!frId){setMsg('Please select a store.');return;}
    if(!category){setMsg('Please select a category.');return;}
    if(!reason.trim()){setMsg('Reason is required (official record).');return;}
    setBusy(true);setMsg('');
    const store=stores.find(s=>s.id===frId);
    const storeName=store?.store_name||store?.name||'';
    const{error}=await sb.from('ops_warnings').insert([{
      franchisee_id:frId,store_name:storeName,category,reason:reason.trim(),
      severity,status:'active',issued_by:'HQ',
    }]);
    if(error){setMsg('Error: '+error.message);setBusy(false);return;}
    // Official email notification to franchisee
    if(store?.email){
      try{
        await fetch(EMAIL_FN,{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            to:store.email,
            subject:`OFFICIAL WARNING — Ugly Donuts & Corn Dogs Franchise`,
            html:`<div style="font-family:sans-serif;max-width:600px;margin:0 auto;background:#0E0E0E;color:#F0EDE8;padding:32px;border-radius:12px;"><div style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#E05252;margin-bottom:8px;font-weight:700;">Official Warning Notice</div><h1 style="font-size:20px;margin:0 0 6px;">Franchise Compliance Warning</h1><p style="color:#8A8480;font-size:13px;margin:0 0 20px;">Issued to <strong style="color:#F0EDE8;">${storeName}</strong> on ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</p><div style="background:#1E1E1E;border:1px solid #E05252;border-radius:10px;padding:18px;margin-bottom:18px;"><div style="font-size:11px;color:#E05252;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;font-weight:700;">Category: ${category}</div><div style="font-size:14px;line-height:1.6;white-space:pre-wrap;">${reason.trim().replace(/</g,'&lt;')}</div></div><div style="background:rgba(224,82,82,.08);border:1px solid rgba(224,82,82,.25);border-radius:8px;padding:14px;margin-bottom:20px;"><p style="color:#E05252;font-size:13px;margin:0;line-height:1.5;"><strong>Important:</strong> Per the Franchise Agreement, three (3) active warnings within a twelve (12) month period may result in termination review. Please address this matter promptly.</p></div><a href="https://uglyops.netlify.app" style="display:inline-block;background:#14B8A6;color:#04201C;padding:11px 22px;border-radius:8px;text-decoration:none;font-weight:700;font-size:14px;">View in Franchise Ops →</a><p style="color:#5A5654;font-size:11px;margin-top:24px;">Ugly Donuts & Corn Dogs Franchising LLC · This is an official notice.</p></div>`,
          }),
        });
      }catch(e){/* best-effort */}
    }
    setMsg('✓ Warning issued'+(store?.email?' and emailed to franchisee.':' (no email on file).'));
    setTimeout(()=>onClose(),900);
    setBusy(false);
  }

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title" style={{color:'var(--red)'}}>⚠ Issue Official Warning</div>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div style={{background:'rgba(224,82,82,.08)',border:'1px solid rgba(224,82,82,.2)',borderRadius:8,padding:12,marginBottom:16,fontSize:12,color:'var(--muted)',lineHeight:1.5}}>
            This creates a permanent official record and sends a formal notice to the franchisee. Use carefully.
          </div>
          <div className="form-group">
            <label>Store</label>
            <select value={frId} onChange={e=>setFrId(e.target.value)} style={{width:'100%',background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:14,outline:'none'}}>
              <option value="">— Select store —</option>
              {stores.map(s=><option key={s.id} value={s.id}>{s.store_name||s.name} · {s.territory}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label>Category</label>
            <div style={{display:'flex',flexWrap:'wrap',gap:8,marginTop:4}}>
              {WARN_CATEGORIES.map(cat=>(
                <button key={cat} onClick={()=>setCategory(cat)} className="btn btn-sm"
                  style={{background:category===cat?'var(--red)':'var(--panel2)',color:category===cat?'#fff':'var(--text)',border:`1px solid ${category===cat?'var(--red)':'var(--border2)'}`,fontWeight:category===cat?700:500}}>
                  {cat}
                </button>
              ))}
            </div>
          </div>
          <div className="form-group">
            <label>Reason (official record)</label>
            <textarea value={reason} onChange={e=>setReason(e.target.value)} rows={5} placeholder="Describe the violation in detail. This becomes a permanent record." style={{resize:'vertical'}}/>
          </div>
          {msg&&<div style={{fontSize:13,color:msg.startsWith('✓')?'var(--green)':'var(--red)',marginBottom:8}}>{msg}</div>}
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-danger" onClick={issue} disabled={busy||!frId||!category||!reason.trim()}>{busy?'Issuing...':'Issue Warning'}</button>
        </div>
      </div>
    </div>
  );
}

function WarningDetailModal({warning,onClose}){
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState('');
  const [rescindMode,setRescindMode]=useState(false);
  const [rescindReason,setRescindReason]=useState('');

  async function rescind(){
    if(!rescindReason.trim()){setMsg('Please provide a reason for rescinding.');return;}
    setBusy(true);setMsg('');
    const{error}=await sb.from('ops_warnings').update({
      status:'rescinded',rescinded_reason:rescindReason.trim(),rescinded_at:new Date().toISOString(),
    }).eq('id',warning.id);
    setBusy(false);
    if(error){setMsg('Error: '+error.message);return;}
    onClose();
  }

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div>
            <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:4}}>
              <span style={{fontSize:11,fontWeight:700,background:'rgba(224,82,82,.15)',color:'var(--red)',padding:'2px 8px',borderRadius:999}}>{warning.category}</span>
              {warning.status==='rescinded'&&<span style={{fontSize:10,color:'var(--muted)',fontWeight:700,textTransform:'uppercase'}}>Rescinded</span>}
            </div>
            <div className="modal-title" style={{margin:0}}>{warning.store_name}</div>
          </div>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div style={{fontSize:11,color:'var(--muted)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.06em',fontWeight:700}}>Reason</div>
          <div style={{background:'var(--panel2)',borderRadius:10,padding:16,fontSize:14,lineHeight:1.6,whiteSpace:'pre-wrap',marginBottom:16}}>{warning.reason}</div>
          {warning.related_task_title&&<div style={{fontSize:12,color:'var(--muted)',marginBottom:12}}>Related task: <strong style={{color:'var(--text)'}}>{warning.related_task_title}</strong></div>}
          <div style={{fontSize:11,color:'var(--muted2)',marginBottom:4}}>Issued by {warning.issued_by||'HQ'} on {new Date(warning.issued_at).toLocaleString('en-US',{month:'long',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'})}</div>
          {warning.status==='rescinded'&&(
            <div style={{background:'rgba(134,148,144,.1)',borderRadius:8,padding:12,marginTop:12}}>
              <div style={{fontSize:10,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',marginBottom:4}}>Rescinded {warning.rescinded_at?`· ${new Date(warning.rescinded_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`:''}</div>
              <div style={{fontSize:13,color:'var(--text)',lineHeight:1.5}}>{warning.rescinded_reason}</div>
            </div>
          )}
          {warning.status==='active'&&rescindMode&&(
            <div style={{marginTop:16}}>
              <div className="form-group">
                <label>Rescind Reason</label>
                <textarea value={rescindReason} onChange={e=>setRescindReason(e.target.value)} rows={3} placeholder="Why is this warning being rescinded? (kept on record)" style={{resize:'vertical'}}/>
              </div>
            </div>
          )}
          {msg&&<div style={{fontSize:13,color:msg.startsWith('✓')?'var(--green)':'var(--red)',marginTop:8}}>{msg}</div>}
        </div>
        <div className="modal-footer">
          {warning.status==='active'&&!rescindMode&&<button className="btn btn-ghost btn-sm" style={{marginRight:'auto',color:'var(--muted)'}} onClick={()=>setRescindMode(true)}>Rescind Warning</button>}
          {rescindMode?(
            <>
              <button className="btn btn-ghost" onClick={()=>setRescindMode(false)}>Cancel</button>
              <button className="btn btn-danger" onClick={rescind} disabled={busy||!rescindReason.trim()}>{busy?'...':'Confirm Rescind'}</button>
            </>
          ):(
            <button className="btn btn-ghost" onClick={onClose}>Close</button>
          )}
        </div>
      </div>
    </div>
  );
}

// ── HQ MESSAGES (inbox from franchisees) ──────────────────
function HQMessages({onBadgeRefresh}){
  const [messages,setMessages]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filter,setFilter]=useState('all'); // all, open, replied
  const [topicFilter,setTopicFilter]=useState('all');
  const [selected,setSelected]=useState(null);

  async function load(){
    setLoading(true);
    const{data}=await sb.from('ops_messages').select('*').order('created_at',{ascending:false});
    setMessages(data||[]);
    setLoading(false);
    if(onBadgeRefresh)onBadgeRefresh();
  }
  useEffect(()=>{load();},[]);

  async function openMessage(m){
    if(!m.is_read){
      await sb.from('ops_messages').update({is_read:true}).eq('id',m.id);
    }
    setSelected(m);
    load();
  }

  const filtered=messages.filter(m=>{
    if(filter==='open'&&m.status!=='open')return false;
    if(filter==='replied'&&m.status!=='replied')return false;
    if(topicFilter!=='all'&&m.topic!==topicFilter)return false;
    return true;
  });
  const openCount=messages.filter(m=>m.status==='open').length;
  const [showCompose,setShowCompose]=useState(false);

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Messages</div><div className="page-sub">{openCount} awaiting reply · {messages.length} total</div></div>
        <button className="btn btn-primary" onClick={()=>setShowCompose(true)}>+ New Message</button>
      </div>
      <div className="content">
        <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
          {['all','open','replied'].map(f=>(
            <button key={f} className={`btn btn-sm ${filter===f?'btn-primary':'btn-ghost'}`} onClick={()=>setFilter(f)}>
              {f==='all'?'All':f==='open'?'Awaiting Reply':'Replied'}
            </button>
          ))}
          <select value={topicFilter} onChange={e=>setTopicFilter(e.target.value)} style={{marginLeft:'auto',background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'7px 12px',color:'var(--text)',fontSize:13,fontFamily:'inherit',outline:'none'}}>
            <option value="all">All Topics</option>
            {MSG_TOPICS.map(t=><option key={t} value={t}>{t}</option>)}
          </select>
        </div>
        {loading?<div className="loading">Loading...</div>:filtered.length===0?(
          <div className="empty"><div className="empty-icon">✉</div><div className="empty-title">No messages</div></div>
        ):filtered.map(m=>(
          <div key={m.id} onClick={()=>openMessage(m)} style={{background:'var(--panel)',border:`1px solid ${!m.is_read?'var(--teal)':'var(--border)'}`,borderLeft:`3px solid ${TOPIC_COLORS[m.topic]||'#869490'}`,borderRadius:10,padding:16,marginBottom:10,cursor:'pointer',transition:'border-color .15s'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
              <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                {!m.is_read&&<span style={{width:8,height:8,borderRadius:'50%',background:'var(--teal)',flexShrink:0}}/>}
                <span style={{fontSize:11,fontWeight:700,background:(TOPIC_COLORS[m.topic]||'#869490')+'22',color:TOPIC_COLORS[m.topic]||'#869490',padding:'2px 8px',borderRadius:999}}>{m.topic}</span>
                <span style={{fontSize:14,fontWeight:700}}>{m.subject}</span>
              </div>
              <span style={{fontSize:11,color:m.status==='replied'?'var(--green)':'var(--gold)'}}>{m.status==='replied'?'✓ Replied':'Open'}</span>
            </div>
            <div style={{fontSize:12,color:'var(--text)',fontWeight:600,marginBottom:2}}>{m.store_name}</div>
            <div style={{fontSize:13,color:'var(--muted)',lineHeight:1.5,whiteSpace:'pre-wrap'}}>{m.body.length>140?m.body.slice(0,140)+'...':m.body}</div>

// Build a unified thread array from a message + its replies
function buildThread(message,replies){
  const thread=[];
  // First bubble: the original message. Usually from the franchisee, but HQ can
  // also start a thread (sender_name is exactly 'HQ'), so infer the side from that.
  const firstRole=message.sender_name==='HQ'?'hq':'franchisee';
  thread.push({role:firstRole,name:message.sender_name||message.store_name,body:message.body,at:message.created_at});
  // Legacy single HQ reply (if exists and pre-dates the replies table)
  if(message.hq_reply&&message.hq_reply.trim()){
    thread.push({role:'hq',name:message.replied_by||'HQ',body:message.hq_reply,at:message.replied_at||message.created_at,legacy:true});
  }
  // Threaded replies. Guard against a missing/blank sender_role (older rows):
  // infer from sender_name so bubbles still align to the correct side.
  (replies||[]).forEach(r=>{
    let role=r.sender_role;
    if(role!=='hq'&&role!=='franchisee'){
      role=r.sender_name==='HQ'?'hq':'franchisee';
    }
    thread.push({role,name:r.sender_name,body:r.body,at:r.created_at});
  });
  // Sort by time
  thread.sort((a,b)=>new Date(a.at)-new Date(b.at));
  return thread;
}

function HQMessageDetail({message,onClose}){
  const [reply,setReply]=useState('');
  const [replies,setReplies]=useState([]);
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState('');
  const [loading,setLoading]=useState(true);

  async function loadReplies(){
    const{data}=await sb.from('ops_message_replies').select('*').eq('message_id',message.id).order('created_at',{ascending:true});
    setReplies(data||[]);
    setLoading(false);
  }
  useEffect(()=>{
    loadReplies();
    // Opening the thread marks it read
    if(!message.is_read){sb.from('ops_messages').update({is_read:true}).eq('id',message.id);}
  },[]);

  async function deleteConversation(){
    if(!window.confirm('Delete this entire conversation? This permanently removes the message and all replies for both HQ and the franchisee. This cannot be undone.'))return;
    setBusy(true);
    // Delete replies first (cascade should handle it, but be explicit)
    await sb.from('ops_message_replies').delete().eq('message_id',message.id);
    const{error}=await sb.from('ops_messages').delete().eq('id',message.id);
    if(error){setMsg('Error deleting: '+error.message);setBusy(false);return;}
    onClose();
  }

  async function sendReply(){
    if(!reply.trim()){setMsg('Reply cannot be empty.');return;}
    setBusy(true);setMsg('');
    const{error}=await sb.from('ops_message_replies').insert([{
      message_id:message.id,sender_role:'hq',sender_name:'HQ',body:reply.trim(),
    }]);
    if(error){setMsg('Error: '+error.message);setBusy(false);return;}
    // Mark message as replied + read; last sender = hq
    await sb.from('ops_messages').update({
      status:'replied',is_read:true,last_sender_role:'hq',replied_at:new Date().toISOString(),replied_by:'HQ',
    }).eq('id',message.id);
    // Notify franchisee via email
    try{
      let frEmail=null;
      if(message.franchisee_id){
        const{data:fr}=await sb.from('franchisees').select('email').eq('id',message.franchisee_id).maybeSingle();
        frEmail=fr?.email;
      }
      if(frEmail){
        await fetch(EMAIL_FN,{

            to:frEmail,
            subject:`HQ replied to your message: ${message.subject}`,
            html:`<div style="font-family:sans-serif;max-width:600px;margin:0 auto;background:#0E0E0E;color:#F0EDE8;padding:28px;border-radius:12px;"><div style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#14B8A6;margin-bottom:8px;">Franchise Ops · HQ Reply</div><h2 style="margin:0 0 12px;font-size:18px;">Re: ${message.subject}</h2><div style="background:#1A2A28;border:1px solid #243634;border-radius:10px;padding:16px;font-size:14px;line-height:1.6;white-space:pre-wrap;margin-bottom:16px;">${reply.trim().replace(/</g,'&lt;')}</div><a href="https://uglyops.netlify.app" style="display:inline-block;background:#14B8A6;color:#04201C;padding:11px 22px;border-radius:8px;text-decoration:none;font-weight:700;font-size:14px;">View in Franchise Ops →</a></div>`,
          }),
        });
      }
    }catch(e){/* best-effort */}
    setReply('');
    await loadReplies();
    setMsg('✓ Reply sent.');
    setBusy(false);
  }

  const thread=buildThread(message,replies);

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-lg">
        <div className="modal-header">
          <div>
            <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:4}}>
              <span style={{fontSize:11,fontWeight:700,background:(TOPIC_COLORS[message.topic]||'#869490')+'22',color:TOPIC_COLORS[message.topic]||'#869490',padding:'2px 8px',borderRadius:999}}>{message.topic}</span>

          </div>
          <button className="close-btn" onClick={onClose}>×</button>

          {loading?<div className="loading">Loading...</div>:(
            <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:18}}>

          </div>

        </div>
        <div className="modal-footer">

          <button className="btn btn-ghost" onClick={onClose}>Close</button>

  );

function AccountManager({onBadgeRefresh}){
  const [accounts,setAccounts]=useState([]);
  const [unregistered,setUnregistered]=useState([]);
  const [loading,setLoading]=useState(true);
  const [editMember,setEditMember]=useState(null);
  const [busy,setBusy]=useState(null);
  const [msgs,setMsgs]=useState({});
  const [emailInputs,setEmailInputs]=useState({});
  const [filterRole,setFilterRole]=useState('all');
  const [showInvite,setShowInvite]=useState(false);
  const [invForm,setInvForm]=useState({email:'',name:'',title:'COO'});
  const [invBusy,setInvBusy]=useState(false);
  const [invMsg,setInvMsg]=useState('');

  async function inviteHQ(){
    if(!invForm.email||!invForm.name)return;
    setInvBusy(true);setInvMsg('');
    const tempPass=Math.random().toString(36).slice(-10)+'A1!';
    const{data:user,error}=await sb.auth.signUp({email:invForm.email,password:tempPass,options:{data:{name:invForm.name}}});
    if(user?.user){
      const{error:upsertErr}=await sb.from('profiles').upsert([{id:user.user.id,full_name:invForm.name,name:invForm.name,title:invForm.title||'Team',role:'hq',is_active:true}],{onConflict:'id'});
      if(upsertErr){setInvMsg('Account auth created, but profile save failed: '+upsertErr.message);}
      else{setInvMsg(`Account created for ${invForm.name}. Temp password: ${tempPass} — share this securely and ask them to change it on first login.`);}
      setInvForm({email:'',name:'',title:'COO'});
      load();
    }else{setInvMsg(error?.message||'Error creating account.');}
    setInvBusy(false);
  }

  async function load(){
    setLoading(true);
    const[pRes,sRes]=await Promise.all([
      sb.from('profiles').select('id,full_name,name,title,role,store,is_active,created_at').order('full_name'),
      sb.from('franchisees').select('id,name,store_name,territory,email').in('status',['open','soft_open']).order('store_name'),
    ]);
    const profiles=pRes.data||[];
    const allStores=sRes.data||[];
    // Map store_name -> email so we can send password resets to franchisee accounts
    const emailByStore={};
    allStores.forEach(s=>{ if(s.store_name)emailByStore[s.store_name]=s.email; if(s.name)emailByStore[s.name]=emailByStore[s.name]||s.email; });
    const profilesWithEmail=profiles.map(p=>({...p,_email:p.role==='franchisee'?emailByStore[p.store]:null}));
    const registeredNames=new Set(profiles.filter(p=>p.role==='franchisee').map(p=>p.store).filter(Boolean));
    setAccounts(profilesWithEmail);
    setUnregistered(allStores.filter(s=>!registeredNames.has(s.store_name||s.name)));
    setLoading(false);
    if(onBadgeRefresh)onBadgeRefresh();
  }
  useEffect(()=>{load();},[]);

  async function sendPasswordReset(m){
    // Resolve email: prefer the mapped _email, then look it up directly by store match.
    let email=m._email;
    if(!email){
      const{data:frs}=await sb.from('franchisees').select('store_name,name,email').in('status',['open','soft_open']);
      const match=(frs||[]).find(f=>f.store_name===m.store||f.name===m.store);
      email=match?.email||null;
    }
    if(!email){
      window.alert('No email on file for this franchisee.\n\nAdd their email in OS → CRM Franchisees (Edit Info), then try again.\n\nNote: the store name on the account must match the franchisee record exactly.');
      return;
    }
    if(!window.confirm(`Send a password reset email to ${email}?\nThe franchisee will get a link to set a new password.`))return;
    // Send via Resend (reliable). Fall back to Supabase built-in mailer if the function fails.
    try{
      const res=await fetch(RESET_PW_FN,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email,name:m.full_name||m.name||''}),
      });
      const data=await res.json().catch(()=>({}));
      if(res.ok&&data.ok){
        window.alert(`Password reset link sent to ${email}.`);
        return;
      }
      const fnReason=data.error||(`status ${res.status}`);
      const{error:fbErr}=await sb.auth.resetPasswordForEmail(email,{redirectTo:'https://uglyops.netlify.app'});
      if(!fbErr){window.alert(`Password reset link sent to ${email}.`);return;}
      window.alert('Could not send reset email.\n\nResend reason: '+fnReason+'\nBuilt-in mailer reason: '+(fbErr.message||JSON.stringify(fbErr))+'\n\nThe franchisee can also use "Forgot password?" on the login screen.');
    }catch(e){
      const{error:fbErr}=await sb.auth.resetPasswordForEmail(email,{redirectTo:'https://uglyops.netlify.app'});
      if(!fbErr){window.alert(`Password reset link sent to ${email}.`);return;}
      window.alert('Could not send reset email.\n\nReason: '+(e.message||String(e))+'\n\nThe franchisee can also use "Forgot password?" on the login screen.');
    }
  }

  async function approveStore(s){
    const email=emailInputs[s.id]||s.email;
    if(!email){setMsgs(m=>({...m,[s.id]:'Please enter an email address.'}));return;}
    setBusy(s.id);
    const storeName=s.store_name||s.name||'';
    try{
      const res=await fetch(CREATE_ACCOUNT_FN,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email,storeName,franchiseeId:s.id}),
      });
      const data=await res.json();
      if(!res.ok||data.error){
        setMsgs(m=>({...m,[s.id]:'Error: '+(data.error||'Unknown error')}));
      }else{
        setMsgs(m=>({...m,[s.id]:data.emailSent
          ?`✓ Account created and login email sent to ${email}\nTemp password: ${data.tempPass}  (also emailed — share securely)`
          :`✓ Account created — but email did NOT send.\n${data.emailError?'Reason: '+data.emailError+'\n':''}Give the franchisee these login details manually:\nURL: https://uglyops.netlify.app\nEmail: ${email}\nTemp password: ${data.tempPass}`
        }));
        load();
      }
    }catch(e){
      setMsgs(m=>({...m,[s.id]:'Error: '+e.message}));
    }
    setBusy(null);
  }

  async function removePending(s){
    if(!window.confirm(`Remove ${s.store_name||s.name} from the activation list?\n\nThis deletes the franchisee record from Ops. (It does NOT affect the OS Franchisees section unless this store was pushed from there.)`))return;
    setBusy(s.id);
    await sb.from('franchisees').delete().eq('id',s.id);
    setBusy(null);
    load();
  }

  async function toggleActive(m){await sb.from('profiles').update({is_active:!m.is_active}).eq('id',m.id);load();}
  async function deleteAccount(m){
    if(!window.confirm(`Delete ${m.full_name||m.name||'this account'}? Cannot be undone.`))return;
    await sb.from('profiles').delete().eq('id',m.id);load();
  }

  const filtered=accounts.filter(a=>filterRole==='all'||a.role===filterRole);

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Accounts</div><div className="page-sub">Franchisee and HQ account management</div></div>
        <button className="btn btn-primary" onClick={()=>setShowInvite(s=>!s)}>+ Add HQ Member</button>
      </div>
      <div className="content">
        {showInvite&&(
          <div className="card" style={{marginBottom:20}}>
            <div style={{fontWeight:700,marginBottom:12}}>Add HQ Team Member</div>
            <div className="form-row" style={{display:'flex',gap:12,flexWrap:'wrap'}}>

// ── EDIT ACCOUNT MODAL ────────────────────────────────────
function EditAccountModal({member,stores,onClose}){
  const [form,setForm]=useState({
    name:member.full_name||member.name||'',
    store:member.store||'',
    role:member.role||'franchisee',
    is_active:member.is_active!==false,
    email:'',
  });
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState('');
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  // Load franchisee email if this is a franchisee account
  useEffect(()=>{
    if(member.role==='franchisee'&&member.store){
      sb.from('franchisees').select('email').or(`store_name.eq.${member.store},name.eq.${member.store}`).limit(1).single()
        .then(({data})=>{if(data?.email)set('email',data.email);});
    }
  },[]);

  async function save(){
    setBusy(true);
    // Update profile
    const{error}=await sb.from('profiles').update({
      full_name:form.name,
      name:form.name,
      store:form.store,
      role:form.role,
      is_active:form.is_active,
    }).eq('id',member.id);
    if(error){setMsg('Error: '+error.message);setBusy(false);return;}
    // Update franchisees table email if franchisee
    if(member.role==='franchisee'&&form.store&&form.email){
      await sb.from('franchisees').update({email:form.email})
        .or(`store_name.eq.${form.store},name.eq.${form.store}`);
    }
    setMsg('Saved!');setTimeout(()=>onClose(),800);
    setBusy(false);
  }

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">Edit Account</div>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div className="form-group"><label>Full Name</label><input value={form.name} onChange={e=>set('name',e.target.value)}/></div>
          {member.role==='franchisee'&&<div className="form-group"><label>Franchisee Email (for notifications)</label><input type="email" value={form.email} onChange={e=>set('email',e.target.value)} placeholder="franchisee@email.com"/></div>}
          <div className="form-group">
            <label>Linked Store</label>
            <select value={form.store} onChange={e=>set('store',e.target.value)} style={{background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none',width:'100%'}}>
              <option value="">— No store linked —</option>
              {stores.map(s=><option key={s.id} value={s.store_name||s.name}>{s.store_name||s.name} · {s.territory}</option>)}
            </select>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label>Role</label>
              <select value={form.role} onChange={e=>set('role',e.target.value)} style={{background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none',width:'100%'}}>
                <option value="franchisee">Franchisee</option>
                <option value="hq">HQ</option>
              </select>
            </div>
            <div className="form-group">
              <label>Status</label>
              <select value={form.is_active?'active':'inactive'} onChange={e=>set('is_active',e.target.value==='active')} style={{background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none',width:'100%'}}>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
              </select>
            </div>
          </div>
          <div style={{background:'rgba(91,143,212,.08)',border:'1px solid rgba(91,143,212,.2)',borderRadius:8,padding:12,fontSize:13,color:'var(--muted)'}}>
            <div style={{fontWeight:600,color:'var(--blue)',marginBottom:4,fontSize:12}}>Email / Password changes</div>
            To change email or reset password: Supabase Dashboard → Authentication → Users → find user → edit
          </div>
          {msg&&<div style={{marginTop:10,fontSize:13,color:msg.startsWith('Error')?'var(--red)':'var(--green)'}}>{msg}</div>}
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={save} disabled={busy}>{busy?'Saving...':'Save'}</button>
        </div>
      </div>
    </div>
  );
}


// ── ANNOUNCEMENTS ─────────────────────────────────────────
function Announcements(){
  const [announcements,setAnnouncements]=useState([]);
  const [stores,setStores]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showNew,setShowNew]=useState(false);
  const [selected,setSelected]=useState(null);
  const [form,setForm]=useState({title:'',body:'',category:'general',target:'',link_url:'',link_label:'',due_date:''});
  const [selectedStores,setSelectedStores]=useState([]);
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState('');
  const [attachFile,setAttachFile]=useState(null); // File object
  const [attachPreview,setAttachPreview]=useState(null);
  const [uploadProgress,setUploadProgress]=useState(0);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  function handleFileChange(e){
    const file=e.target.files[0];
    if(!file)return;
    setAttachFile(file);
    // Preview for images/video
    if(file.type.startsWith('image/')||file.type.startsWith('video/')){
      setAttachPreview(URL.createObjectURL(file));
    }else{
      setAttachPreview(null);
    }
  }

  function getAttachType(file){
    if(!file)return null;
    if(file.type.startsWith('image/'))return'image';
    if(file.type.startsWith('video/'))return'video';
    if(file.type==='application/pdf')return'pdf';
    return'file';
  }

  const ANN_CATS=[
    {key:'general',label:'General',color:'#5B8FD4'},
    {key:'urgent',label:'Urgent',color:'#E05252'},
    {key:'menu',label:'Menu Update',color:'#CC9C3A'},
    {key:'policy',label:'Policy',color:'#9B78D4'},
  ];

  async function load(){
    setLoading(true);
    const[aRes,sRes]=await Promise.all([
      sb.from('ops_announcements').select('*').order('created_at',{ascending:false}),
      sb.from('franchisees').select('id,name,store_name,territory,email').in('status',['open','soft_open']).order('name'),
    ]);
    setAnnouncements(aRes.data||[]);
    setStores(sRes.data||[]);
    setLoading(false);
  }
  useEffect(()=>{load();},[]);

  async function sendAnnouncement(){
    if(!form.title||!form.body){setMsg('Title and body required.');return;}
    const hasTarget=(form.target==='all'&&stores.length>0)||(form.target==='select'&&selectedStores.length>0);
    if(!hasTarget){setMsg('Please choose recipient stores before sending.');return;}
    setBusy(true);setMsg('');
    // 0. Upload file if attached
    let attachment_url=null,attachment_name=null,attachment_type=null;
    if(attachFile){
      const ext=attachFile.name.split('.').pop();
      const path=`${Date.now()}-${attachFile.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
      const{data:upload,error:upErr}=await sb.storage.from('announcements').upload(path,attachFile,{contentType:attachFile.type});
      if(upErr){setMsg('File upload failed: '+upErr.message);setBusy(false);return;}
      const{data:urlData}=sb.storage.from('announcements').getPublicUrl(path);
      attachment_url=urlData.publicUrl;
      attachment_name=attachFile.name;
      attachment_type=getAttachType(attachFile);
    }
    // 1. Create announcement
    const{data:ann}=await sb.from('ops_announcements').insert([{
      ...form,
      target:form.target==='all'?'all':selectedStores.join(','),
      attachment_url,attachment_name,attachment_type,
      link_url:form.link_url||null,
      link_label:form.link_label||null,
      due_date:form.due_date||null,
    }]).select().single();
    if(!ann){setBusy(false);setMsg('Error creating announcement.');return;}
    // 2. Create receipt records
    const targetStores=form.target==='all'?stores:stores.filter(s=>selectedStores.includes(s.id));
    if(targetStores.length){
      await sb.from('ops_announcement_receipts').insert(targetStores.map(s=>({announcement_id:ann.id,franchisee_id:s.id,confirmed:false})));
      // 3. Send emails
      const emailTargets=targetStores.filter(s=>s.email).map(s=>({email:s.email,name:s.store_name||s.name}));
      if(emailTargets.length){
        const sent=await sendEmail(
          emailTargets,
          `[${form.category.toUpperCase()}] ${form.title}`,
          announcementEmailHtml(form.title,form.body,form.category,'your store',attachment_url,attachment_name,attachment_type,form.link_url,form.link_label)
        );
        setMsg(`✓ Announcement sent to ${emailTargets.length} store${emailTargets.length>1?'s':''}. ${targetStores.length-emailTargets.length>0?`(${targetStores.length-emailTargets.length} stores have no email on file)`:''}`);
      }else{
        setMsg('Announcement created but no stores have email addresses on file.');
      }
    }
    setForm({title:'',body:'',category:'general',target:'all',link_url:'',link_label:''});
    setSelectedStores([]);setAttachFile(null);setAttachPreview(null);
    setShowNew(false);
    load();
    setBusy(false);
  }

  function catColor(k){return ANN_CATS.find(c=>c.key===k)?.color||'#5B8FD4';}
  function catLabel(k){return ANN_CATS.find(c=>c.key===k)?.label||k;}

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Announcements</div><div className="page-sub">Broadcast messages to open stores</div></div>
        <button className="btn btn-primary" onClick={()=>setShowNew(s=>!s)}>+ New Announcement</button>
      </div>
      <div className="content">
        {showNew&&(
          <div className="card" style={{marginBottom:20}}>
            <div style={{fontWeight:700,marginBottom:14}}>New Announcement</div>
            <div className="form-row">
              <div className="form-group">
                <label>Category</label>
                <select value={form.category} onChange={e=>set('category',e.target.value)} style={{background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none',width:'100%'}}>
                  {ANN_CATS.map(c=><option key={c.key} value={c.key}>{c.label}</option>)}
                </select>
              </div>
              <div className="form-group"><label>Title</label><input value={form.title} onChange={e=>set('title',e.target.value)} placeholder="e.g. Summer Menu Launch Notice"/></div>
            </div>
            <div className="form-group">
              <label>Confirmation Deadline (optional)</label>
              <input type="date" value={form.due_date} onChange={e=>set('due_date',e.target.value)} style={{width:'100%',background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:14,outline:'none'}}/>
              <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>If set, franchisees who haven't confirmed get an automatic reminder email 1 day before.</div>
            </div>
            <div className="form-group">
              <label>Message Body</label>
              <textarea value={form.body} onChange={e=>set('body',e.target.value)} style={{minHeight:120}} placeholder="Write your announcement here..."/>
            </div>

            {/* Attachment */}
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Attachment (optional)</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div>
                  <label style={{display:'block',fontSize:12,color:'var(--muted)',marginBottom:6}}>Upload File (PDF, Image, Video)</label>
                  <label style={{display:'flex',alignItems:'center',gap:8,background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',cursor:'pointer'}}>
                    <span style={{fontSize:18}}>📎</span>
                    <span style={{fontSize:13,color:attachFile?'var(--text)':'var(--muted)'}}>{attachFile?attachFile.name:'Choose file...'}</span>
                    <input type="file" accept="image/*,video/*,.pdf,.doc,.docx" onChange={handleFileChange} style={{display:'none'}}/>
                  </label>
                  {attachFile&&(
                    <div style={{marginTop:6,display:'flex',alignItems:'center',gap:8}}>
                      {attachPreview&&attachFile.type.startsWith('image/')&&<img src={attachPreview} style={{width:60,height:60,objectFit:'cover',borderRadius:4}}/>}
                      {attachPreview&&attachFile.type.startsWith('video/')&&<video src={attachPreview} style={{width:80,height:60,objectFit:'cover',borderRadius:4}}/>}
                      <div>
                        <div style={{fontSize:12,color:'var(--text)'}}>{attachFile.name}</div>
                        <div style={{fontSize:11,color:'var(--muted)'}}>{(attachFile.size/1024/1024).toFixed(1)} MB</div>
                      </div>
                      <button onClick={()=>{setAttachFile(null);setAttachPreview(null);}} style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:16,padding:0,marginLeft:'auto'}}>✕</button>
                    </div>
                  )}
                </div>
                <div>
                  <label style={{display:'block',fontSize:12,color:'var(--muted)',marginBottom:6}}>Or External Link (Google Drive, YouTube, etc.)</label>
                  <input value={form.link_url} onChange={e=>set('link_url',e.target.value)} placeholder="https://..." style={{width:'100%',background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none',marginBottom:6}}/>
                  <input value={form.link_label} onChange={e=>set('link_label',e.target.value)} placeholder="Button label (e.g. 'View Recipe Book')" style={{width:'100%',background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none'}}/>
                </div>
              </div>
            </div>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Send To</div>
              <div style={{display:'flex',gap:8,marginBottom:form.target==='select'?12:0}}>
                <button className={`btn btn-sm ${form.target==='all'?'btn-primary':'btn-ghost'}`} onClick={()=>set('target','all')}>All Open Stores ({stores.length})</button>
                <button className={`btn btn-sm ${form.target==='select'?'btn-primary':'btn-ghost'}`} onClick={()=>set('target','select')}>Select Stores</button>
              </div>
              {form.target==='select'&&(
                <div style={{maxHeight:200,overflowY:'auto',border:'1px solid var(--border)',borderRadius:8,padding:'4px 0'}}>
                  {stores.map(s=>(
                    <div key={s.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 14px',cursor:'pointer',borderBottom:'1px solid var(--border)'}}
                      onClick={()=>setSelectedStores(ss=>ss.includes(s.id)?ss.filter(x=>x!==s.id):[...ss,s.id])}>
                      <div style={{width:16,height:16,borderRadius:4,border:`1.5px solid ${selectedStores.includes(s.id)?'var(--orange)':'var(--border2)'}`,background:selectedStores.includes(s.id)?'var(--orange)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                        {selectedStores.includes(s.id)&&<span style={{fontSize:10,color:'#000',fontWeight:700}}>✓</span>}
                      </div>
                      <div>
                        <div style={{fontSize:13,fontWeight:600}}>{s.store_name||s.name}</div>
                        <div style={{fontSize:11,color:s.email?'var(--muted)':'var(--red)'}}>{s.email||'No email on file'}</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
            {msg&&<div style={{padding:12,background:msg.startsWith('✓')?'rgba(95,184,122,.1)':'rgba(224,82,82,.1)',border:`1px solid ${msg.startsWith('✓')?'rgba(95,184,122,.3)':'rgba(224,82,82,.3)'}`,borderRadius:8,fontSize:13,color:msg.startsWith('✓')?'var(--green)':'var(--red)',marginBottom:12}}>{msg}</div>}
            {!((form.target==='all'&&stores.length>0)||(form.target==='select'&&selectedStores.length>0))&&form.title&&form.body&&(
              <div style={{background:'rgba(224,82,82,.08)',border:'1px solid rgba(224,82,82,.25)',borderRadius:8,padding:'10px 14px',marginBottom:12,fontSize:12,color:'var(--red)'}}>
                ⚠ Choose recipient stores above before sending.
              </div>
            )}
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-primary" onClick={sendAnnouncement} disabled={busy||!form.title||!form.body||
                !((form.target==='all'&&stores.length>0)||(form.target==='select'&&selectedStores.length>0))}>
                {busy?'Sending...':!((form.target==='all'&&stores.length>0)||(form.target==='select'&&selectedStores.length>0))?'Select stores first':form.target==='all'?`Send to All ${stores.length} Stores`:`Send to ${selectedStores.length} Store${selectedStores.length!==1?'s':''}`}
              </button>
              <button className="btn btn-ghost" onClick={()=>{setShowNew(false);setMsg('');}}>Cancel</button>
            </div>
          </div>
        )}

        {loading?<div className="loading">Loading...</div>:announcements.length===0?(
          <div className="empty"><div className="empty-icon">◈</div><div className="empty-title">No announcements yet</div><div style={{fontSize:13,color:'var(--muted)'}}>Create your first announcement to broadcast to stores</div></div>
        ):(
          announcements.map(a=>(
            <AnnouncementCard key={a.id} ann={a} stores={stores} catColor={catColor} catLabel={catLabel} onRefresh={load}/>
          ))
        )}
      </div>
    </>
  );
}

function AnnouncementCard({ann,stores,catColor,catLabel,onRefresh}){
  const [receipts,setReceipts]=useState([]);
  const [expanded,setExpanded]=useState(false);

  useEffect(()=>{
    sb.from('ops_announcement_receipts').select('*,franchisees(name,store_name)').eq('announcement_id',ann.id).then(r=>setReceipts(r.data||[]));
  },[ann.id]);

  const confirmed=receipts.filter(r=>r.confirmed).length;
  const total=receipts.length;
  const pct=total?Math.round(confirmed/total*100):0;
  const color=catColor(ann.category);

  async function archive(){
    if(!window.confirm('Archive this announcement?'))return;
    await sb.from('ops_announcements').update({status:'archived'}).eq('id',ann.id);
    onRefresh();
  }

  return(
    <div style={{background:'var(--panel)',border:`1px solid var(--border)`,borderLeft:`3px solid ${color}`,borderRadius:12,padding:18,marginBottom:12}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontSize:11,fontWeight:700,background:color+'22',color,padding:'2px 8px',borderRadius:999,textTransform:'uppercase'}}>{catLabel(ann.category)}</span>
          {ann.status==='archived'&&<span style={{fontSize:10,color:'var(--muted)',background:'rgba(255,255,255,.05)',padding:'2px 6px',borderRadius:4}}>ARCHIVED</span>}
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontSize:11,color:'var(--muted)'}}>{new Date(ann.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>
          {ann.status!=='archived'&&<button className="btn btn-ghost btn-sm" onClick={archive} style={{fontSize:11}}>Archive</button>}
          <button className="btn btn-danger btn-sm" onClick={async()=>{if(!window.confirm('Permanently delete this announcement?'))return;await sb.from('ops_announcements').delete().eq('id',ann.id);onRefresh();}} style={{fontSize:11}}>Delete</button>
        </div>
      </div>
      <div style={{fontSize:16,fontWeight:700,marginBottom:6}}>{ann.title}</div>
      <div style={{fontSize:13,color:'var(--muted)',marginBottom:12,lineHeight:1.5,whiteSpace:'pre-wrap'}}>{ann.body.length>150&&!expanded?ann.body.slice(0,150)+'...':ann.body}
        {ann.body.length>150&&<button onClick={()=>setExpanded(s=>!s)} style={{background:'none',border:'none',color:'var(--gold)',cursor:'pointer',fontSize:12,padding:'0 4px',fontFamily:'inherit'}}>{expanded?'Less':'More'}</button>}
      </div>

      {/* Attachments */}
      {(ann.attachment_url||ann.link_url)&&(
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
          {ann.attachment_url&&ann.attachment_type==='image'&&(
            <a href={ann.attachment_url} target="_blank" rel="noreferrer">
              <img src={ann.attachment_url} alt={ann.attachment_name} style={{maxHeight:120,maxWidth:200,borderRadius:6,objectFit:'cover',border:'1px solid var(--border)',cursor:'pointer'}}/>
            </a>
          )}
          {ann.attachment_url&&ann.attachment_type==='video'&&(
            <video src={ann.attachment_url} controls style={{maxHeight:160,maxWidth:280,borderRadius:6,border:'1px solid var(--border)'}}/>
          )}
          {ann.attachment_url&&ann.attachment_type==='pdf'&&(
            <a href={ann.attachment_url} target="_blank" rel="noreferrer" style={{display:'flex',alignItems:'center',gap:8,background:'rgba(204,156,58,.1)',border:'1px solid rgba(204,156,58,.3)',borderRadius:8,padding:'8px 14px',textDecoration:'none',color:'var(--gold)',fontSize:13,fontWeight:600}}>
              📄 {ann.attachment_name||'Download PDF'}
            </a>
          )}
          {ann.attachment_url&&ann.attachment_type==='file'&&(
            <a href={ann.attachment_url} target="_blank" rel="noreferrer" style={{display:'flex',alignItems:'center',gap:8,background:'rgba(91,143,212,.1)',border:'1px solid rgba(91,143,212,.3)',borderRadius:8,padding:'8px 14px',textDecoration:'none',color:'var(--blue)',fontSize:13,fontWeight:600}}>
              📎 {ann.attachment_name||'Download File'}
            </a>
          )}
          {ann.link_url&&(
            <a href={ann.link_url} target="_blank" rel="noreferrer" style={{display:'flex',alignItems:'center',gap:8,background:'rgba(155,120,212,.1)',border:'1px solid rgba(155,120,212,.3)',borderRadius:8,padding:'8px 14px',textDecoration:'none',color:'var(--purple)',fontSize:13,fontWeight:600}}>
              🔗 {ann.link_label||ann.link_url.slice(0,40)}
            </a>
          )}
        </div>
      )}
      {total>0&&(
        <>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
            <span style={{color:'var(--muted)'}}>Receipt confirmation</span>
            <span style={{color:pct===100?'var(--green)':pct>50?'var(--gold)':'var(--muted)',fontWeight:600}}>{confirmed}/{total} confirmed · {pct}%</span>
          </div>
          <div className="progress-bar" style={{marginBottom:10}}>
            <div className="progress-fill" style={{width:`${pct}%`,background:pct===100?'var(--green)':'var(--orange)'}}/>
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {receipts.map(r=>(
              <span key={r.id} style={{fontSize:11,padding:'2px 8px',borderRadius:4,background:r.confirmed?'rgba(95,184,122,.15)':'rgba(255,255,255,.05)',color:r.confirmed?'var(--green)':'var(--muted)'}}>
                {r.franchisees?.store_name||r.franchisees?.name||'?'} {r.confirmed?'✓':'○'}
              </span>
            ))}
          </div>
        </>
      )}
    </div>
  );
}
