// ── ANNOUNCEMENTS ─────────────────────────────────────────
function Announcements(){
  const [announcements,setAnnouncements]=useState([]);
  const [stores,setStores]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showNew,setShowNew]=useState(false);
  const [selected,setSelected]=useState(null);
  const [form,setForm]=useState({title:'',body:'',category:'general',target:'',link_url:'',link_label:''});
  const [selectedStores,setSelectedStores]=useState([]);
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState('');
  const [attachFile,setAttachFile]=useState(null); // File object
  const [attachPreview,setAttachPreview]=useState(null);
  const [uploadProgress,setUploadProgress]=useState(0);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  function handleFileChange(e){
    const file=e.target.files[0];
    if(!file)return;
    setAttachFile(file);
    // Preview for images/video
    if(file.type.startsWith('image/')||file.type.startsWith('video/')){
      setAttachPreview(URL.createObjectURL(file));
    }else{
      setAttachPreview(null);
    }
  }

  function getAttachType(file){
    if(!file)return null;
    if(file.type.startsWith('image/'))return'image';
    if(file.type.startsWith('video/'))return'video';
    if(file.type==='application/pdf')return'pdf';
    return'file';
  }

  const ANN_CATS=[
    {key:'general',label:'General',color:'#5B8FD4'},
    {key:'urgent',label:'Urgent',color:'#E05252'},
    {key:'menu',label:'Menu Update',color:'#CC9C3A'},
    {key:'policy',label:'Policy',color:'#9B78D4'},
  ];

  async function load(){
    setLoading(true);
    const[aRes,sRes]=await Promise.all([
      sb.from('ops_announcements').select('*').order('created_at',{ascending:false}),
      sb.from('franchisees').select('id,name,store_name,territory,email').eq('status','open').order('name'),
    ]);
    setAnnouncements(aRes.data||[]);
    setStores(sRes.data||[]);
    setLoading(false);
  }
  useEffect(()=>{load();},[]);

  async function sendAnnouncement(){
    if(!form.title||!form.body){setMsg('Title and body required.');return;}
    setBusy(true);setMsg('');
    // 0. Upload file if attached
    let attachment_url=null,attachment_name=null,attachment_type=null;
    if(attachFile){
      const ext=attachFile.name.split('.').pop();
      const path=`${Date.now()}-${attachFile.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
      const{data:upload,error:upErr}=await sb.storage.from('announcements').upload(path,attachFile,{contentType:attachFile.type});
      if(upErr){setMsg('File upload failed: '+upErr.message);setBusy(false);return;}
      const{data:urlData}=sb.storage.from('announcements').getPublicUrl(path);
      attachment_url=urlData.publicUrl;
      attachment_name=attachFile.name;
      attachment_type=getAttachType(attachFile);
    }
    // 1. Create announcement
    const{data:ann}=await sb.from('ops_announcements').insert([{
      ...form,
      target:form.target==='all'?'all':selectedStores.join(','),
      attachment_url,attachment_name,attachment_type,
      link_url:form.link_url||null,
      link_label:form.link_label||null,
    }]).select().single();
    if(!ann){setBusy(false);setMsg('Error creating announcement.');return;}
    // 2. Create receipt records
    const targetStores=form.target==='all'?stores:stores.filter(s=>selectedStores.includes(s.id));
    if(targetStores.length){
      await sb.from('ops_announcement_receipts').insert(targetStores.map(s=>({announcement_id:ann.id,franchisee_id:s.id,confirmed:false})));
      // 3. Send emails
      const emailTargets=targetStores.filter(s=>s.email).map(s=>({email:s.email,name:s.store_name||s.name}));
      if(emailTargets.length){
        const sent=await sendEmail(
          emailTargets,
          `[${form.category.toUpperCase()}] ${form.title}`,
          announcementEmailHtml(form.title,form.body,form.category,'your store',attachment_url,attachment_name,attachment_type,form.link_url,form.link_label)
        );
        setMsg(`✓ Announcement sent to ${emailTargets.length} store${emailTargets.length>1?'s':''}. ${targetStores.length-emailTargets.length>0?`(${targetStores.length-emailTargets.length} stores have no email on file)`:''}`);
      }else{
        setMsg('Announcement created but no stores have email addresses on file.');
      }
    }
    setForm({title:'',body:'',category:'general',target:'all',link_url:'',link_label:''});
    setSelectedStores([]);setAttachFile(null);setAttachPreview(null);
    setShowNew(false);
    load();
    setBusy(false);
  }

  function catColor(k){return ANN_CATS.find(c=>c.key===k)?.color||'#5B8FD4';}
  function catLabel(k){return ANN_CATS.find(c=>c.key===k)?.label||k;}

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Announcements</div><div className="page-sub">Broadcast messages to open stores</div></div>
        <button className="btn btn-primary" onClick={()=>setShowNew(s=>!s)}>+ New Announcement</button>
      </div>
      <div className="content">
        {showNew&&(
          <div className="card" style={{marginBottom:20}}>
            <div style={{fontWeight:700,marginBottom:14}}>New Announcement</div>
            <div className="form-row">
              <div className="form-group">
                <label>Category</label>
                <select value={form.category} onChange={e=>set('category',e.target.value)} style={{background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none',width:'100%'}}>
                  {ANN_CATS.map(c=><option key={c.key} value={c.key}>{c.label}</option>)}
                </select>
              </div>
              <div className="form-group"><label>Title</label><input value={form.title} onChange={e=>set('title',e.target.value)} placeholder="e.g. Summer Menu Launch Notice"/></div>
            </div>
            <div className="form-group">
              <label>Message Body</label>
              <textarea value={form.body} onChange={e=>set('body',e.target.value)} style={{minHeight:120}} placeholder="Write your announcement here..."/>
            </div>

            {/* Attachment */}
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Attachment (optional)</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div>
                  <label style={{display:'block',fontSize:12,color:'var(--muted)',marginBottom:6}}>Upload File (PDF, Image, Video)</label>
                  <label style={{display:'flex',alignItems:'center',gap:8,background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',cursor:'pointer'}}>
                    <span style={{fontSize:18}}>📎</span>
                    <span style={{fontSize:13,color:attachFile?'var(--text)':'var(--muted)'}}>{attachFile?attachFile.name:'Choose file...'}</span>
                    <input type="file" accept="image/*,video/*,.pdf,.doc,.docx" onChange={handleFileChange} style={{display:'none'}}/>
                  </label>
                  {attachFile&&(
                    <div style={{marginTop:6,display:'flex',alignItems:'center',gap:8}}>
                      {attachPreview&&attachFile.type.startsWith('image/')&&<img src={attachPreview} style={{width:60,height:60,objectFit:'cover',borderRadius:4}}/>}
                      {attachPreview&&attachFile.type.startsWith('video/')&&<video src={attachPreview} style={{width:80,height:60,objectFit:'cover',borderRadius:4}}/>}
                      <div>
                        <div style={{fontSize:12,color:'var(--text)'}}>{attachFile.name}</div>
                        <div style={{fontSize:11,color:'var(--muted)'}}>{(attachFile.size/1024/1024).toFixed(1)} MB</div>
                      </div>
                      <button onClick={()=>{setAttachFile(null);setAttachPreview(null);}} style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:16,padding:0,marginLeft:'auto'}}>✕</button>
                    </div>
                  )}
                </div>
                <div>
                  <label style={{display:'block',fontSize:12,color:'var(--muted)',marginBottom:6}}>Or External Link (Google Drive, YouTube, etc.)</label>
                  <input value={form.link_url} onChange={e=>set('link_url',e.target.value)} placeholder="https://..." style={{width:'100%',background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none',marginBottom:6}}/>
                  <input value={form.link_label} onChange={e=>set('link_label',e.target.value)} placeholder="Button label (e.g. 'View Recipe Book')" style={{width:'100%',background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none'}}/>
                </div>
              </div>
            </div>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Send To</div>

                <button className={`btn btn-sm ${form.target==='all'?'btn-primary':'btn-ghost'}`} onClick={()=>set('target','all')}>All Open Stores ({stores.length})</button>
                <button className={`btn btn-sm ${form.target==='select'?'btn-primary':'btn-ghost'}`} onClick={()=>set('target','select')}>Select Stores</button>
              </div>

                <div style={{maxHeight:200,overflowY:'auto',border:'1px solid var(--border)',borderRadius:8,padding:'4px 0'}}>

                      </div>
                      <div>
                        <div style={{fontSize:13,fontWeight:600}}>{s.store_name||s.name}</div>

                      </div>
                    </div>
                  ))}

              )}
            </div>
            {msg&&<div style={{padding:12,background:msg.startsWith('✓')?'rgba(95,184,122,.1)':'rgba(224,82,82,.1)',border:`1px solid ${msg.startsWith('✓')?'rgba(95,184,122,.3)':'rgba(224,82,82,.3)'}`,borderRadius:8,fontSize:13,color:msg.startsWith('✓')?'var(--green)':'var(--red)',marginBottom:12}}>{msg}</div>}

            </div>

        )}

        )}
      </div>
    </>
  );
}

function AnnouncementCard({ann,stores,catColor,catLabel,onRefresh}){
  const [receipts,setReceipts]=useState([]);
  const [expanded,setExpanded]=useState(false);

  useEffect(()=>{
    sb.from('ops_announcement_receipts').select('*,franchisees(name,store_name)').eq('announcement_id',ann.id).then(r=>setReceipts(r.data||[]));
  },[ann.id]);

  const confirmed=receipts.filter(r=>r.confirmed).length;
  const total=receipts.length;
  const pct=total?Math.round(confirmed/total*100):0;
  const color=catColor(ann.category);

  async function archive(){
    if(!window.confirm('Archive this announcement?'))return;
    await sb.from('ops_announcements').update({status:'archived'}).eq('id',ann.id);
    onRefresh();
  }

  return(
    <div style={{background:'var(--panel)',border:`1px solid var(--border)`,borderLeft:`3px solid ${color}`,borderRadius:12,padding:18,marginBottom:12}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontSize:11,fontWeight:700,background:color+'22',color,padding:'2px 8px',borderRadius:999,textTransform:'uppercase'}}>{catLabel(ann.category)}</span>
          {ann.status==='archived'&&<span style={{fontSize:10,color:'var(--muted)',background:'rgba(255,255,255,.05)',padding:'2px 6px',borderRadius:4}}>ARCHIVED</span>}
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontSize:11,color:'var(--muted)'}}>{new Date(ann.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>
          {ann.status!=='archived'&&<button className="btn btn-ghost btn-sm" onClick={archive} style={{fontSize:11}}>Archive</button>}
        </div>
      </div>
      <div style={{fontSize:16,fontWeight:700,marginBottom:6}}>{ann.title}</div>
      <div style={{fontSize:13,color:'var(--muted)',marginBottom:12,lineHeight:1.5,whiteSpace:'pre-wrap'}}>{ann.body.length>150&&!expanded?ann.body.slice(0,150)+'...':ann.body}
        {ann.body.length>150&&<button onClick={()=>setExpanded(s=>!s)} style={{background:'none',border:'none',color:'var(--gold)',cursor:'pointer',fontSize:12,padding:'0 4px',fontFamily:'inherit'}}>{expanded?'Less':'More'}</button>}
      </div>

      {/* Attachments */}
      {(ann.attachment_url||ann.link_url)&&(
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
          {ann.attachment_url&&ann.attachment_type==='image'&&(
            <a href={ann.attachment_url} target="_blank" rel="noreferrer">
              <img src={ann.attachment_url} alt={ann.attachment_name} style={{maxHeight:120,maxWidth:200,borderRadius:6,objectFit:'cover',border:'1px solid var(--border)',cursor:'pointer'}}/>
            </a>
          )}
          {ann.attachment_url&&ann.attachment_type==='video'&&(
            <video src={ann.attachment_url} controls style={{maxHeight:160,maxWidth:280,borderRadius:6,border:'1px solid var(--border)'}}/>
          )}
          {ann.attachment_url&&ann.attachment_type==='pdf'&&(
            <a href={ann.attachment_url} target="_blank" rel="noreferrer" style={{display:'flex',alignItems:'center',gap:8,background:'rgba(204,156,58,.1)',border:'1px solid rgba(204,156,58,.3)',borderRadius:8,padding:'8px 14px',textDecoration:'none',color:'var(--gold)',fontSize:13,fontWeight:600}}>
              📄 {ann.attachment_name||'Download PDF'}
            </a>
          )}
          {ann.attachment_url&&ann.attachment_type==='file'&&(
            <a href={ann.attachment_url} target="_blank" rel="noreferrer" style={{display:'flex',alignItems:'center',gap:8,background:'rgba(91,143,212,.1)',border:'1px solid rgba(91,143,212,.3)',borderRadius:8,padding:'8px 14px',textDecoration:'none',color:'var(--blue)',fontSize:13,fontWeight:600}}>
              📎 {ann.attachment_name||'Download File'}
            </a>
          )}
          {ann.link_url&&(
            <a href={ann.link_url} target="_blank" rel="noreferrer" style={{display:'flex',alignItems:'center',gap:8,background:'rgba(155,120,212,.1)',border:'1px solid rgba(155,120,212,.3)',borderRadius:8,padding:'8px 14px',textDecoration:'none',color:'var(--purple)',fontSize:13,fontWeight:600}}>
              🔗 {ann.link_label||ann.link_url.slice(0,40)}
            </a>
          )}
        </div>
      )}
      {total>0&&(
        <>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
            <span style={{color:'var(--muted)'}}>Receipt confirmation</span>
            <span style={{color:pct===100?'var(--green)':pct>50?'var(--gold)':'var(--muted)',fontWeight:600}}>{confirmed}/{total} confirmed · {pct}%</span>
          </div>
          <div className="progress-bar" style={{marginBottom:10}}>
            <div className="progress-fill" style={{width:`${pct}%`,background:pct===100?'var(--green)':'var(--orange)'}}/>
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {receipts.map(r=>(
              <span key={r.id} style={{fontSize:11,padding:'2px 8px',borderRadius:4,background:r.confirmed?'rgba(95,184,122,.15)':'rgba(255,255,255,.05)',color:r.confirmed?'var(--green)':'var(--muted)'}}>
                {r.franchisees?.store_name||r.franchisees?.name||'?'} {r.confirmed?'✓':'○'}
              </span>
            ))}
          </div>
        </>
      )}
    </div>
  );
}


// ── CHANGE PASSWORD ───────────────────────────────────────
function ChangePassword({onDone}){
  const [newPass,setNewPass]=useState('');
  const [confirm,setConfirm]=useState('');
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState('');
  const [err,setErr]=useState('');

  async function save(e){
    e.preventDefault();
    if(newPass.length<8){setErr('Password must be at least 8 characters.');return;}
    if(newPass!==confirm){setErr('Passwords do not match.');return;}
    setBusy(true);setErr('');setMsg('');
    const{error}=await sb.auth.updateUser({password:newPass});
    if(error){setErr(error.message);}
    else{setMsg('Password changed successfully.');setNewPass('');setConfirm('');}
    setBusy(false);
  }

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Change Password</div><div className="page-sub">Update your account password</div></div>
      </div>
      <div className="content">
        <div className="card" style={{maxWidth:400}}>
          <form onSubmit={save}>
            <div className="form-group">
              <label>New Password</label>
              <input type="password" value={newPass} onChange={e=>setNewPass(e.target.value)} placeholder="Min. 8 characters" autoFocus/>
            </div>
            <div className="form-group">
              <label>Confirm Password</label>
              <input type="password" value={confirm} onChange={e=>setConfirm(e.target.value)} placeholder="Repeat new password"/>
            </div>
            {err&&<div style={{color:'var(--red)',fontSize:13,marginBottom:12}}>{err}</div>}
            {msg&&<div style={{color:'var(--green)',fontSize:13,marginBottom:12}}>{msg} <button type="button" onClick={onDone} style={{background:'none',border:'none',color:'var(--gold)',cursor:'pointer',fontSize:13,padding:0,fontFamily:'inherit'}}>Go back →</button></div>}
            <div style={{display:'flex',gap:10}}>
              <button type="submit" className="btn btn-primary" disabled={busy||!newPass||!confirm}>{busy?'Saving...':'Save Password'}</button>
              <button type="button" className="btn btn-ghost" onClick={onDone}>Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </>
  );
}

// ── FRANCHISEE TASKS ──────────────────────────────────────
function FranchiseeTasks({profile}){
  const [assignments,setAssignments]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selected,setSelected]=useState(null);
  const [subtasksMap,setSubtasksMap]=useState({});
  const [completionsMap,setCompletionsMap]=useState({});

  async function load(){
    setLoading(true);
    // Find franchisee record by store name or email
    const{data:fr}=await sb.from('franchisees').select('id,name,store_name').eq('status','open')
      .or(`name.ilike.%${profile?.full_name||''}%,store_name.ilike.%${profile?.store||''}%`)
      .limit(1).single();

    if(!fr){setLoading(false);return;}

    const{data:assigns}=await sb.from('ops_assignments')
      .select('*,ops_tasks(title,description,category,due_date,require_hq_approval)')
      .eq('franchisee_id',fr.id)
      .neq('ops_tasks.status','archived')
      .order('created_at',{ascending:false});

    setAssignments(assigns||[]);

    // Load subtasks and completions for each assignment
    const stMap={},cMap={};
    await Promise.all((assigns||[]).map(async a=>{
      const[stRes,cRes]=await Promise.all([
        sb.from('ops_subtasks').select('*').eq('ops_task_id',a.ops_task_id).order('sort_order'),
        sb.from('ops_completions').select('*').eq('ops_assignment_id',a.id),
      ]);
      stMap[a.id]=stRes.data||[];
      cMap[a.id]=cRes.data||[];
    }));
    setSubtasksMap(stMap);setCompletionsMap(cMap);
    setLoading(false);
  }
  useEffect(()=>{load();},[]);

  const statusColors={pending:'var(--muted)',in_progress:'var(--blue)',submitted:'var(--gold)',approved:'var(--green)',rejected:'var(--red)'};

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">My Tasks</div><div className="page-sub">Tasks assigned by HQ</div></div>
      </div>
      <div className="content">
        {loading?<div className="loading">Loading...</div>:assignments.length===0?(
          <div className="empty"><div className="empty-icon">▤</div><div className="empty-title">No tasks yet</div><div style={{fontSize:13,color:'var(--muted)'}}>HQ will assign tasks here</div></div>
        ):(
          assignments.map(a=>(
            <div key={a.id} style={{background:'var(--panel)',border:`1px solid ${a.status==='rejected'?'rgba(224,82,82,.3)':'var(--border)'}`,borderRadius:12,padding:18,marginBottom:12,cursor:'pointer',transition:'border-color .2s'}}
              onClick={()=>setSelected(a)}
              onMouseEnter={e=>e.currentTarget.style.borderColor='var(--orange)'}
              onMouseLeave={e=>e.currentTarget.style.borderColor=a.status==='rejected'?'rgba(224,82,82,.3)':'var(--border)'}>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <span className={`cat-badge cat-${a.ops_tasks?.category}`}>{catLabel(a.ops_tasks?.category)}</span>
                  <span style={{fontSize:15,fontWeight:700}}>{a.ops_tasks?.title}</span>
                </div>
                <span style={{fontSize:12,fontWeight:700,color:statusColors[a.status],background:statusColors[a.status]+'22',padding:'2px 10px',borderRadius:999,whiteSpace:'nowrap'}}>
                  {STATUS_LABELS[a.status]||a.status}
                </span>
              </div>
              {a.ops_tasks?.description&&<div style={{fontSize:13,color:'var(--muted)',marginBottom:8}}>{a.ops_tasks.description}</div>}
              {a.ops_tasks?.due_date&&<div style={{fontSize:12,color:daysUntil(a.ops_tasks.due_date)<0?'var(--red)':daysUntil(a.ops_tasks.due_date)<=3?'var(--orange)':'var(--muted)'}}>
                Due: {fmtDate(a.ops_tasks.due_date)} {daysUntil(a.ops_tasks.due_date)<0&&'· OVERDUE'}
              </div>}
              {a.status==='rejected'&&a.hq_notes&&(
                <div style={{marginTop:8,padding:10,background:'rgba(224,82,82,.08)',border:'1px solid rgba(224,82,82,.2)',borderRadius:6,fontSize:12,color:'var(--red)'}}>
                  HQ Feedback: {a.hq_notes}
                </div>
              )}
              {(subtasksMap[a.id]||[]).length>0&&(
                <div style={{marginTop:8,fontSize:12,color:'var(--muted)'}}>
                  {(completionsMap[a.id]||[]).filter(c=>c.completed).length}/{(subtasksMap[a.id]||[]).length} sub-tasks complete
                </div>
              )}
            </div>
          ))
        )}
      </div>
      {selected&&<FranchiseeTaskModal assignment={selected} subtasks={subtasksMap[selected.id]||[]} completions={completionsMap[selected.id]||[]} onClose={()=>{setSelected(null);load();}}/>}
    </>
  );
}

// ── FRANCHISEE TASK MODAL ─────────────────────────────────
function FranchiseeTaskModal({assignment,subtasks,completions,onClose}){
  const [comps,setComps]=useState(completions);
  const [busy,setBusy]=useState(false);
  const [uploadingId,setUploadingId]=useState(null);
  const [textInputs,setTextInputs]=useState({});

  async function toggleSubtask(st){
    const existing=comps.find(c=>c.ops_subtask_id===st.id);
    if(existing?.completed)return; // can't uncheck
    setBusy(true);
    if(existing){
      await sb.from('ops_completions').update({completed:true,completed_at:new Date().toISOString()}).eq('id',existing.id);
    }else{
      await sb.from('ops_completions').insert([{ops_assignment_id:assignment.id,ops_subtask_id:st.id,completed:true,completed_at:new Date().toISOString()}]);
    }
    const{data}=await sb.from('ops_completions').select('*').eq('ops_assignment_id',assignment.id);
    setComps(data||[]);
    setBusy(false);
  }

  async function uploadProof(st, file){
    setUploadingId(st.id);
    const path=`proofs/${Date.now()}-${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
    const{error}=await sb.storage.from('ops-proofs').upload(path,file,{contentType:file.type});
    if(error){alert('Upload failed: '+error.message);setUploadingId(null);return;}
    const{data:urlData}=sb.storage.from('ops-proofs').getPublicUrl(path);
    // Save completion with proof
    const existing=comps.find(c=>c.ops_subtask_id===st.id);
    if(existing){
      await sb.from('ops_completions').update({completed:true,completed_at:new Date().toISOString(),proof_image_url:urlData.publicUrl,proof_text:textInputs[st.id]||null}).eq('id',existing.id);
    }else{
      await sb.from('ops_completions').insert([{ops_assignment_id:assignment.id,ops_subtask_id:st.id,completed:true,completed_at:new Date().toISOString(),proof_image_url:urlData.publicUrl,proof_text:textInputs[st.id]||null}]);
    }
    const{data}=await sb.from('ops_completions').select('*').eq('ops_assignment_id',assignment.id);
    setComps(data||[]);
    setUploadingId(null);
  }

  async function saveTextProof(st){
    const text=textInputs[st.id];
    if(!text?.trim())return;
    setBusy(true);
    const existing=comps.find(c=>c.ops_subtask_id===st.id);
    if(existing){
      await sb.from('ops_completions').update({completed:true,completed_at:new Date().toISOString(),proof_text:text}).eq('id',existing.id);
    }else{
      await sb.from('ops_completions').insert([{ops_assignment_id:assignment.id,ops_subtask_id:st.id,completed:true,completed_at:new Date().toISOString(),proof_text:text}]);
    }
    const{data}=await sb.from('ops_completions').select('*').eq('ops_assignment_id',assignment.id);
    setComps(data||[]);
    setBusy(false);
  }

  async function submitToHQ(){
    if(!window.confirm('Submit all completed tasks to HQ for review?'))return;
    setBusy(true);
    await sb.from('ops_assignments').update({status:assignment.ops_tasks?.require_hq_approval?'submitted':'approved',updated_at:new Date().toISOString()}).eq('id',assignment.id);
    setBusy(false);onClose();
  }

  const allRequired=subtasks.filter(s=>s.is_required);
  const allRequiredDone=allRequired.every(s=>comps.find(c=>c.ops_subtask_id===s.id&&c.completed));
  const totalDone=comps.filter(c=>c.completed).length;
  const pct=subtasks.length?Math.round(totalDone/subtasks.length*100):0;
  const canSubmit=assignment.status==='pending'||assignment.status==='in_progress'||assignment.status==='rejected';

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-lg">
        <div className="modal-header">
          <div>
            <div style={{display:'flex',gap:8,marginBottom:4}}>
              <span className={`cat-badge cat-${assignment.ops_tasks?.category}`}>{catLabel(assignment.ops_tasks?.category)}</span>
            </div>
            <div className="modal-title">{assignment.ops_tasks?.title}</div>
            {assignment.ops_tasks?.description&&<div style={{fontSize:12,color:'var(--muted)',marginTop:3}}>{assignment.ops_tasks.description}</div>}
          </div>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          {assignment.status==='rejected'&&assignment.hq_notes&&(
            <div style={{marginBottom:16,padding:12,background:'rgba(224,82,82,.08)',border:'1px solid rgba(224,82,82,.2)',borderRadius:8,fontSize:13,color:'var(--red)'}}>
              <strong>HQ Feedback:</strong> {assignment.hq_notes}
            </div>
          )}
          {assignment.status==='approved'&&(
            <div style={{marginBottom:16,padding:12,background:'rgba(95,184,122,.08)',border:'1px solid rgba(95,184,122,.2)',borderRadius:8,fontSize:13,color:'var(--green)',textAlign:'center',fontWeight:700}}>
              ✓ Approved by HQ
            </div>
          )}

          <div style={{marginBottom:16}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
              <span style={{color:'var(--muted)'}}>{totalDone}/{subtasks.length} complete</span>
              <span style={{fontWeight:700,color:pct===100?'var(--green)':'var(--orange)'}}>{pct}%</span>
            </div>
            <div className="progress-bar"><div className="progress-fill" style={{width:`${pct}%`,background:pct===100?'var(--green)':'var(--orange)'}}/></div>
          </div>

          {subtasks.map(st=>{
            const comp=comps.find(c=>c.ops_subtask_id===st.id);
            const done=comp?.completed;
            return(
              <div key={st.id} style={{padding:'14px 0',borderBottom:'1px solid var(--border)'}}>
                <div style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:done?8:12}}>
                  <div style={{width:22,height:22,borderRadius:5,background:done?'var(--green)':'var(--panel2)',border:`2px solid ${done?'var(--green)':'var(--border2)'}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}>
                    {done&&<span style={{fontSize:13,color:'#000',fontWeight:700}}>✓</span>}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:done?'var(--muted)':'var(--text)',textDecoration:done?'line-through':'none'}}>{st.title}</div>
                    {st.description&&<div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{st.description}</div>}
                    <div style={{fontSize:10,color:'var(--muted2)',marginTop:2}}>{PROOF_TYPES.find(p=>p.key===st.proof_type)?.label}{st.is_required&&<span style={{color:'var(--red)',marginLeft:4}}>*Required</span>}</div>
                  </div>
                </div>

                {/* Proof area */}
                {!done&&canSubmit&&(
                  <div style={{paddingLeft:32}}>
                    {st.proof_type==='photo'&&(
                      <label style={{display:'inline-flex',alignItems:'center',gap:8,background:'var(--panel2)',border:'1px dashed var(--border2)',borderRadius:8,padding:'8px 14px',cursor:'pointer',fontSize:13,color:'var(--muted)'}}>
                        {uploadingId===st.id?'Uploading...':'📷 Upload Photo'}
                        <input type="file" accept="image/*" onChange={e=>e.target.files[0]&&uploadProof(st,e.target.files[0])} style={{display:'none'}} disabled={uploadingId===st.id}/>
                      </label>
                    )}
                    {st.proof_type==='text'&&(
                      <div style={{display:'flex',gap:8}}>
                        <input value={textInputs[st.id]||''} onChange={e=>setTextInputs(t=>({...t,[st.id]:e.target.value}))} placeholder="Enter confirmation..." style={{flex:1,background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'8px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none'}}/>
                        <button className="btn btn-primary btn-sm" onClick={()=>saveTextProof(st)} disabled={busy}>Submit</button>
                      </div>
                    )}
                    {st.proof_type==='checkbox'&&(
                      <button className="btn btn-ghost btn-sm" onClick={()=>toggleSubtask(st)} disabled={busy}>Mark Complete</button>
                    )}
                  </div>
                )}

                {/* Show proof */}
                {done&&(
                  <div style={{paddingLeft:32}}>
                    {comp.proof_image_url&&<img src={comp.proof_image_url} alt="proof" style={{maxWidth:200,maxHeight:150,borderRadius:6,objectFit:'cover',border:'1px solid var(--border)'}}/>}
                    {comp.proof_text&&<div style={{fontSize:12,color:'var(--muted)',fontStyle:'italic'}}>{comp.proof_text}</div>}
                    {!comp.proof_image_url&&!comp.proof_text&&<div style={{fontSize:11,color:'var(--muted)'}}>Marked complete</div>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Close</button>
          {canSubmit&&(
            <button className="btn btn-primary" onClick={submitToHQ} disabled={busy||!allRequiredDone}>
              {busy?'Submitting...':assignment.ops_tasks?.require_hq_approval?'Submit to HQ for Approval →':'Mark as Complete →'}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// ── FRANCHISEE ANNOUNCEMENTS ──────────────────────────────
function FranchiseeAnnouncements({profile}){
  const [announcements,setAnnouncements]=useState([]);
  const [receipts,setReceipts]=useState([]);
  const [loading,setLoading]=useState(true);
  const [franchiseeId,setFranchiseeId]=useState(null);

  useEffect(()=>{
    async function load(){
      setLoading(true);
      const{data:fr}=await sb.from('franchisees').select('id').eq('status','open')
        .or(`name.ilike.%${profile?.full_name||''}%,store_name.ilike.%${profile?.store||''}%`)
        .limit(1).single();
      const frId=fr?.id;
      setFranchiseeId(frId);

      const[aRes,rRes]=await Promise.all([
        sb.from('ops_announcements').select('*').eq('status','active').order('created_at',{ascending:false}),
        frId?sb.from('ops_announcement_receipts').select('*').eq('franchisee_id',frId):{data:[]},
      ]);
      setAnnouncements(aRes.data||[]);
      setReceipts(rRes.data||[]);
      setLoading(false);
    }
    load();
  },[]);

  async function confirm(annId){
    if(!franchiseeId)return;
    const existing=receipts.find(r=>r.announcement_id===annId);
    if(existing?.confirmed)return;
    if(existing){
      await sb.from('ops_announcement_receipts').update({confirmed:true,confirmed_at:new Date().toISOString()}).eq('id',existing.id);
    }else{
      await sb.from('ops_announcement_receipts').insert([{announcement_id:annId,franchisee_id:franchiseeId,confirmed:true,confirmed_at:new Date().toISOString()}]);
    }
    const{data}=await sb.from('ops_announcement_receipts').select('*').eq('franchisee_id',franchiseeId);
    setReceipts(data||[]);
  }

  const ANN_CATS=[
    {key:'general',label:'General',color:'#5B8FD4'},
    {key:'urgent',label:'Urgent',color:'#E05252'},
    {key:'menu',label:'Menu Update',color:'#CC9C3A'},
    {key:'policy',label:'Policy',color:'#9B78D4'},
  ];
  function catColor(k){return ANN_CATS.find(c=>c.key===k)?.color||'#5B8FD4';}
  function catLbl(k){return ANN_CATS.find(c=>c.key===k)?.label||k;}

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Announcements</div><div className="page-sub">Messages from HQ</div></div>
      </div>
      <div className="content">
        {loading?<div className="loading">Loading...</div>:announcements.length===0?(
          <div className="empty"><div className="empty-icon">◈</div><div className="empty-title">No announcements</div></div>
        ):(
          announcements.map(ann=>{
            const receipt=receipts.find(r=>r.announcement_id===ann.id);
            const confirmed=receipt?.confirmed;
            const color=catColor(ann.category);
            return(
              <div key={ann.id} style={{background:'var(--panel)',border:`1px solid ${confirmed?'rgba(95,184,122,.3)':'var(--border)'}`,borderLeft:`3px solid ${color}`,borderRadius:12,padding:18,marginBottom:12}}>
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <span style={{fontSize:11,fontWeight:700,background:color+'22',color,padding:'2px 8px',borderRadius:999,textTransform:'uppercase'}}>{catLbl(ann.category)}</span>
                    <span style={{fontSize:11,color:'var(--muted)'}}>{fmtDate(ann.created_at)}</span>
                  </div>
                  {confirmed
                    ?<span style={{fontSize:12,color:'var(--green)',fontWeight:700}}>✓ Received</span>
                    :<button className="btn btn-primary btn-sm" onClick={()=>confirm(ann.id)}>Confirm Receipt</button>
                  }
                </div>
                <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>{ann.title}</div>
                <div style={{fontSize:13,color:'var(--muted)',lineHeight:1.6,whiteSpace:'pre-wrap',marginBottom:12}}>{ann.body}</div>
                {/* Attachments */}
                {(ann.attachment_url||ann.link_url)&&(
                  <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:8}}>
                    {ann.attachment_url&&ann.attachment_type==='image'&&(
                      <a href={ann.attachment_url} target="_blank" rel="noreferrer">
                        <img src={ann.attachment_url} alt={ann.attachment_name} style={{maxHeight:160,maxWidth:260,borderRadius:6,objectFit:'cover',border:'1px solid var(--border)',cursor:'pointer'}}/>
                      </a>
                    )}
                    {ann.attachment_url&&ann.attachment_type==='video'&&(
                      <video src={ann.attachment_url} controls style={{maxHeight:200,maxWidth:320,borderRadius:6,border:'1px solid var(--border)'}}/>
                    )}
                    {ann.attachment_url&&(ann.attachment_type==='pdf'||ann.attachment_type==='file')&&(
                      <a href={ann.attachment_url} target="_blank" rel="noreferrer" style={{display:'flex',alignItems:'center',gap:8,background:'rgba(204,156,58,.1)',border:'1px solid rgba(204,156,58,.3)',borderRadius:8,padding:'10px 16px',textDecoration:'none',color:'var(--gold)',fontSize:13,fontWeight:600}}>
                        {ann.attachment_type==='pdf'?'📄':'📎'} {ann.attachment_name||'Download File'}
                      </a>
                    )}
                    {ann.link_url&&(
                      <a href={ann.link_url} target="_blank" rel="noreferrer" style={{display:'flex',alignItems:'center',gap:8,background:'rgba(155,120,212,.1)',border:'1px solid rgba(155,120,212,.3)',borderRadius:8,padding:'10px 16px',textDecoration:'none',color:'var(--purple)',fontSize:13,fontWeight:600}}>
                        🔗 {ann.link_label||'View Link'}
                      </a>
                    )}
                  </div>
                )}
              </div>
            );
          })
        )}
      </div>
    </>
  );
}

// ── UGLYBOT PORTAL ────────────────────────────────────────
function UglyBotPortal({storeName}){
  const [messages,setMessages]=useState([
    {role:'assistant',content:`Hi! I'm UglyBot, your AI assistant for Ugly Donuts & Corn Dogs. How can I help you today?`}
  ]);
  const [input,setInput]=useState('');
  const [busy,setBusy]=useState(false);
  const [photoFile,setPhotoFile]=useState(null);
  const [photoPreview,setPhotoPreview]=useState(null);
  const messagesEndRef=React.useRef(null);

  React.useEffect(()=>{
    messagesEndRef.current?.scrollIntoView({behavior:'smooth'});
  },[messages]);

  async function send(){
    if((!input.trim()&&!photoFile)||busy)return;
    const userContent=input.trim()||(photoFile?'Please review this photo:':'');
    const userMsg={role:'user',content:userContent,photo:photoPreview||null};
    setMessages(m=>[...m,userMsg]);
    setInput('');
    const currentPhoto=photoFile;
    const currentPhotoPreview=photoPreview;
    setPhotoFile(null);setPhotoPreview(null);
    setBusy(true);

    try{
      // Convert photo to base64 if present
      let photoBase64=null;
      if(currentPhoto){
        photoBase64=await new Promise((res,rej)=>{
          const r=new FileReader();
          r.onload=()=>res(r.result.split(',')[1]);
          r.onerror=rej;
          r.readAsDataURL(currentPhoto);
        });
      }

      const res=await fetch(AI_FN,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          messages:[...messages,userMsg].map(m=>({role:m.role,content:m.content})),
          store:storeName,
          photoBase64,
          photoType:currentPhoto?.type||null,
        }),
      });
      const data=await res.json();
      const reply=data.content||data.error||'Sorry, something went wrong.';
      setMessages(m=>[...m,{role:'assistant',content:reply}]);
    }catch(e){
      setMessages(m=>[...m,{role:'assistant',content:'Connection error. Please try again.'}]);
    }
    setBusy(false);
  }

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">UglyBot</div><div className="page-sub">AI assistant for operations, recipes, and support</div></div>
      </div>
      <div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 89px)'}}>
        {/* Messages */}
        <div style={{flex:1,overflowY:'auto',padding:'20px 32px'}}>
          {messages.map((m,i)=>(
            <div key={i} style={{display:'flex',gap:12,marginBottom:16,justifyContent:m.role==='user'?'flex-end':'flex-start'}}>

              <img src={photoPreview} style={{width:60,height:60,objectFit:'cover',borderRadius:6,border:'1px solid var(--border2)'}}/>
              <div>
                <div style={{fontSize:12,color:'var(--text)'}}>{photoFile?.name}</div>
                <button onClick={()=>{setPhotoFile(null);setPhotoPreview(null);}} style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:12,padding:0}}>Remove ✕</button>
              </div>
            </div>
          )}
          <div style={{display:'flex',gap:10}}>
            <label style={{display:'flex',alignItems:'center',justifyContent:'center',width:42,height:42,background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:10,cursor:'pointer',flexShrink:0}}>
              <span style={{fontSize:18}}>📷</span>
              <input type="file" accept="image/*" onChange={e=>{const f=e.target.files[0];if(f){setPhotoFile(f);setPhotoPreview(URL.createObjectURL(f));}}} style={{display:'none'}}/>
            </label>
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send()}
              placeholder="Ask about recipes, operations, or upload a photo for review..." disabled={busy}
              style={{flex:1,background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:10,padding:'12px 16px',color:'var(--text)',fontFamily:'inherit',fontSize:14,outline:'none'}}/>
            <button className="btn btn-primary" onClick={send} disabled={busy||(!input.trim()&&!photoFile)} style={{borderRadius:10,padding:'12px 20px',whiteSpace:'nowrap'}}>
              Send →
            </button>
          </div>
        </div>
      </div>
    </>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
