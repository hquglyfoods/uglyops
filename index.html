<script>
// PWA: register service worker (no caching inside; push + badge only)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(function(reg){
    // Check for a newer service worker on every load so notification taps and
    // relaunches don't open a stale build.
    try{ reg.update(); }catch(e){}
    setInterval(function(){ try{ reg.update(); }catch(e){} }, 60*60*1000);
  }).catch(function(){});
  // When a new worker takes control, reload once to pick up the fresh app.
  var __reloadedForSW=false;
  navigator.serviceWorker.addEventListener('controllerchange', function(){
    if(__reloadedForSW) return; __reloadedForSW=true; window.location.reload();
  });
}
// PWA: intercept the install prompt so we can offer our own Install button
window._pwaPrompt = null;
window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault(); window._pwaPrompt = e;
  window.dispatchEvent(new CustomEvent('pwa-ready'));
});
window.addEventListener('appinstalled', function(){ window._pwaPrompt = null; window.dispatchEvent(new CustomEvent('pwa-ready')); });
</script>
<style>
:root{
  /* Hybrid: light workspace tokens (sidebar/auth re-scope to dark below) */
  --gold:#B8860B;--gold-dim:#8A6614;--black:#F5F1E8;--panel:#FFFFFF;--panel2:#FAF7F0;
  --border:#E9E2D2;--border2:#D9D0BA;--text:#202623;--muted:#635D4E;--muted2:#8B8470;
  --red:#BE4A3E;--green:#2E7D4F;--blue:#2C5F9E;--orange:#0E8074;--purple:#6B4FA3;
  --teal:#0E8074;--teal-bright:#0B6B60;
  --cat-operations:#2C5F9E;--cat-marketing:#B05A75;--cat-qa:#BE4A3E;
  --cat-training:#8A6614;--cat-seasonal:#6B4FA3;
  --ink:#14201E;--ink-gold:#F0D68A;--shadow:0 1px 3px rgba(30,25,15,.06);
}
/* auth: gold CTA on dark */
.auth-wrap .btn-gold{background:var(--gold);color:#0A1413;}
/* Dark chrome scopes: sidebar + login keep the brand green-black */
.sidebar,.auth-wrap{
  --gold:#E3BE64;--gold-dim:#7A5C1E;--panel:#13201F;--panel2:#1A2A28;
  --border:#243634;--border2:#2F423F;--text:#F0EDE8;--muted:#93A19A;--muted2:#5E6B66;
  --red:#E05252;--green:#5FB87A;--teal:#14B8A6;--teal-bright:#2DD4BF;
background:linear-gradient(180deg,#0C1A19,#0A1514);}
*{box-sizing:border-box;margin:0;padding:0;}
*{-webkit-tap-highlight-color:transparent;}
@media (hover:none){.task-card:active,.more-item:active{transform:scale(.988);transition:transform .08s;}}
.tabbar{display:none;}
.more-sheet-backdrop{position:fixed;inset:0;background:rgba(15,25,20,.45);z-index:55;}
.more-sheet{position:fixed;left:10px;right:10px;bottom:calc(64px + env(safe-area-inset-bottom));background:#fff;border:1px solid var(--border);border-radius:16px;box-shadow:0 12px 40px rgba(20,15,5,.25);padding:8px;z-index:56;display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.more-item{display:flex;align-items:center;gap:10px;border:none;background:none;font-family:inherit;font-size:13px;font-weight:700;color:var(--text);padding:13px 12px;border-radius:10px;cursor:pointer;text-align:left;}
.more-item:hover{background:var(--panel2);}
.more-item svg{color:var(--gold-dim);flex:none;}
.create-overlay{position:fixed;inset:0;z-index:80;background:#F5F1E8;overflow:auto;padding-top:env(safe-area-inset-top);padding-bottom:40px;}
.create-close{position:fixed;top:calc(12px + env(safe-area-inset-top));right:14px;z-index:81;border:1px solid var(--border2);background:#fff;color:var(--text);font-family:inherit;font-size:12.5px;font-weight:800;border-radius:999px;padding:8px 14px;cursor:pointer;box-shadow:0 3px 12px rgba(20,15,5,.15);}
.create-overlay .page-header{padding-right:112px;}
@media(max-width:768px){
  .create-overlay .page-header{padding-right:96px;}
  /* the fixed Close already exits the popup; hide the inner header's own Cancel to avoid overlap */
  .create-overlay .page-header .btn-ghost{display:none!important;}
}
body{font-family:'Inter',sans-serif;background:#F5F1E8;color:var(--text);min-height:100vh;font-size:14px;}
/* AUTH */
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 16px;}
.auth-card{width:380px;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:40px;}
.auth-logo{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);margin-bottom:2px;}
.auth-app{font-size:12px;color:var(--teal-bright);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:28px;}
.auth-card label{display:block;color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.auth-card input{width:100%;background:var(--panel2);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none;margin-bottom:14px;transition:border-color .2s;}
.auth-card input:focus{border-color:var(--teal);}
.btn-gold{width:100%;background:var(--ink);color:var(--ink-gold);border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;}
.btn-gold:hover{opacity:.88;}
.auth-err{color:var(--red);font-size:12px;margin-top:10px;text-align:center;}
/* LAYOUT */
.app{display:flex;min-height:100vh;}
.sidebar{width:220px;background:linear-gradient(180deg,#0C1A19 0%,#0A1514 100%);border-right:none;box-shadow:4px 0 18px rgba(15,25,20,.10);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;}
.sidebar-logo{padding:16px 20px 14px;border-bottom:1px solid var(--border);}
.sidebar-logo img.brand-logo{width:36px;height:36px;object-fit:contain;border-radius:6px;}
.sidebar-logo img.brand-wordmark{width:120px;height:auto;object-fit:contain;margin-top:6px;display:block;}
.sidebar-logo .brand{font-family:'Playfair Display',serif;font-size:15px;color:var(--gold);}
.sidebar-logo .app-tag{font-size:10px;color:var(--teal-bright);letter-spacing:.12em;text-transform:uppercase;margin-top:3px;font-weight:700;}
.sidebar-logo .switch-link{font-size:11px;color:var(--muted);margin-top:8px;cursor:pointer;text-decoration:none;display:block;}
.portal-switch{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:7px 13px;border:1px solid rgba(242,100,25,.45);background:rgba(242,100,25,.1);color:#F26419;font-size:12px;font-weight:700;border-radius:8px;text-decoration:none;transition:all .15s;white-space:nowrap;}
.portal-switch:hover{background:rgba(242,100,25,.18);border-color:rgba(242,100,25,.75);}
.portal-switch-arrow{font-size:13px;font-weight:800;}
.sidebar-logo .switch-link:hover{color:var(--text);}
.nav{padding:12px 8px;flex:1;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px;background:none;border:none;width:100%;text-align:left;font-family:inherit;}
.nav-item:hover{background:var(--panel2);color:var(--text);}
.nav-item.active{background:rgba(20,184,166,.12);color:var(--teal-bright);}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:999px;font-size:10px;font-weight:700;padding:1px 6px;}
.sidebar-footer{padding:14px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);}
/* Notification bell + panel */
.notif-wrap{position:relative;display:inline-flex;}
.notif-bell{position:relative;background:none;border:none;color:var(--text);cursor:pointer;padding:6px;display:inline-flex;align-items:center;justify-content:center;border-radius:8px;transition:background .15s;}
.notif-bell:hover{background:rgba(255,255,255,.06);}
.notif-dot{position:absolute;top:0;right:0;min-width:16px;height:16px;padding:0 4px;background:var(--red);color:#fff;font-size:10px;font-weight:800;border-radius:8px;display:flex;align-items:center;justify-content:center;line-height:1;}
.notif-backdrop{position:fixed;inset:0;z-index:1400;}
@keyframes spin{to{transform:rotate(360deg)}}
.notif-panel{position:absolute;top:calc(100% + 8px);right:0;width:320px;max-width:86vw;max-height:70vh;background:var(--panel);border:1px solid var(--border2);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.4);z-index:1401;display:flex;flex-direction:column;overflow:hidden;}
.notif-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border);font-weight:800;font-size:14px;color:var(--text);}
.notif-list{overflow-y:auto;}
.notif-empty{padding:30px 16px;text-align:center;color:var(--muted);font-size:13px;}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--line-soft);cursor:pointer;transition:background .15s;}
.notif-item:hover{background:var(--panel2);}
.notif-item.notif-new{background:rgba(204,156,58,.06);}
.notif-item-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;}
.notif-new-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.notif-item-body{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4;}
.notif-item-time{font-size:11px;color:var(--muted2);margin-top:4px;}
/* header right cluster: bell + account menu */
.header-actions{display:flex;align-items:center;gap:6px;}
.acct-menu-wrap{position:relative;display:inline-flex;}
.acct-menu-btn{background:none;border:none;color:var(--text);cursor:pointer;padding:6px;display:inline-flex;align-items:center;justify-content:center;border-radius:8px;transition:background .15s;}
.acct-menu-btn:hover{background:rgba(255,255,255,.06);}
.acct-menu-backdrop{position:fixed;inset:0;z-index:1400;}
.acct-menu-panel{position:absolute;top:calc(100% + 8px);right:0;min-width:200px;background:var(--panel);border:1px solid var(--border2);border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.4);z-index:1401;overflow:hidden;padding:6px;}
/* On desktop the bell + account menu sit at the bottom-left of the sidebar.
   Anchoring the popup inside the narrow sidebar clips it, so pin it to the
   viewport (fixed) at the bottom-left, floating above the main content. */
@media (min-width:769px){
  /* Bell + account menu live at the bottom of the sidebar. Pin their popups to
     the viewport (fixed) so the sidebar's own overflow can't clip them, and
     float them just above the buttons at the lower-left of the screen. */
  .sidebar-footer .notif-panel{position:fixed;left:14px;bottom:64px;top:auto;right:auto;width:340px;max-width:calc(100vw - 28px);max-height:calc(100vh - 96px);}
  .sidebar-footer .acct-menu-panel{position:fixed;left:14px;bottom:64px;top:auto;right:auto;min-width:220px;max-height:calc(100vh - 96px);overflow-y:auto;}
}
.acct-menu-email{padding:8px 12px 10px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.acct-menu-item{display:block;width:100%;text-align:left;background:none;border:none;color:var(--text);font-family:inherit;font-size:13px;font-weight:600;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .15s;}
.acct-menu-item:hover{background:var(--panel2);}
.acct-menu-item.danger{color:var(--red);}
/* Install-time "turn on notifications" popup */
.notif-prompt-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1600;display:flex;align-items:center;justify-content:center;padding:24px;}
.notif-prompt{width:100%;max-width:340px;background:var(--panel);border:1px solid var(--border2);border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.5);padding:24px 22px;text-align:center;}
.notif-prompt-icon{font-size:38px;line-height:1;margin-bottom:10px;}
.notif-prompt-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:8px;}
.notif-prompt-body{font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:16px;}
.notif-prompt-later{display:block;width:100%;margin-top:10px;background:none;border:none;color:var(--muted);font-family:inherit;font-size:13px;font-weight:600;padding:8px;cursor:pointer;}
.notif-prompt-later:hover{color:var(--text);}
.sidebar-footer button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;font-family:inherit;}
.sidebar-footer button:hover{color:var(--red);}
.main{flex:1;min-width:0;}
.page-header{padding:26px 32px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--panel);position:sticky;top:0;z-index:10;}
.page-header>div:first-child{flex:1;min-width:0;}
.page-title{font-size:20px;font-weight:800;}
.page-sub{font-size:13px;color:var(--muted);margin-top:2px;}
.content{padding:26px 34px;max-width:1120px;}
.bot-shell{display:flex;flex-direction:column;height:calc(100vh - 89px);}
.bot-msgs{flex:1;overflow-y:auto;min-height:0;padding:20px 32px;}
.bot-input{padding:16px 32px;border-top:1px solid var(--border);background:var(--panel);display:flex;gap:10px;}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all .15s;}
.btn-primary{background:var(--ink);color:var(--ink-gold);font-weight:700;box-shadow:var(--shadow);}
.btn-primary:hover{opacity:.88;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--panel2);color:var(--text);border-color:var(--border2);}
.btn-danger{background:rgba(224,82,82,.15);color:var(--red);border:1px solid rgba(224,82,82,.3);}
.btn-green{background:rgba(95,184,122,.15);color:var(--green);border:1px solid rgba(95,184,122,.3);}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px;}
/* CARDS */
.card{background:var(--panel);border:1px solid var(--border);border-radius:13px;padding:20px;box-shadow:var(--shadow);}
.card[style*="cursor:pointer"]:hover,.card[style*="cursor: pointer"]:hover{border-color:var(--border2);box-shadow:0 3px 10px rgba(30,25,15,.09);}
.card-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.card-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.stat-label{font-size:10.5px;color:var(--muted2);text-transform:uppercase;letter-spacing:.09em;font-weight:700;margin-bottom:8px;}
.stat-value{font-size:30px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1;}
.stat-sub{font-size:11.5px;color:var(--muted2);margin-top:7px;}
.stat-chev{position:absolute;top:10px;right:13px;color:var(--muted2);font-size:16px;font-weight:700;line-height:1;}
.stat-tap:active{transform:scale(.985);}
/* CATEGORY */
.cat-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.cat-operations{background:rgba(91,143,212,.15);color:var(--cat-operations);}
.cat-marketing{background:rgba(217,138,160,.15);color:var(--cat-marketing);}
.cat-qa{background:rgba(224,82,82,.15);color:var(--cat-qa);}
.cat-training{background:rgba(204,156,58,.15);color:var(--cat-training);}
.cat-seasonal{background:rgba(155,120,212,.15);color:var(--cat-seasonal);}
/* STATUS */
.status-pending{background:rgba(138,132,128,.12);color:var(--muted);}
.status-in_progress{background:rgba(91,143,212,.15);color:var(--blue);}
.status-submitted{background:rgba(204,156,58,.15);color:var(--gold);}
.status-approved{background:rgba(95,184,122,.15);color:var(--green);}
.status-rejected{background:rgba(224,82,82,.15);color:var(--red);}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;overscroll-behavior:contain;}
.bot-modal{height:100vh;height:100dvh;}
@media(max-width:768px){.bot-modal{height:100dvh;}}
body.modal-open{overflow:hidden;}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;}
.modal-lg{max-width:820px;}
.modal-xl{max-width:1000px;}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:16px;font-weight:700;}
.modal-body{padding:20px 24px;}
.modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
.msg-footer{flex-wrap:wrap;}
.msg-footer-secondary{display:flex;gap:8px;margin-right:auto;}
.msg-footer-primary{display:flex;gap:8px;}
.msg-footer-row{display:flex;gap:8px;align-items:center;width:100%;}
@media(max-width:768px){
  .msg-footer{flex-direction:column;gap:8px;}
  .msg-footer-secondary,.msg-footer-primary{width:100%;margin:0;}
  .msg-footer-secondary .btn,.msg-footer-primary .btn{flex:1;}
  .msg-footer-row{flex-wrap:wrap;}
}
.close-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;}
.close-btn:hover{color:var(--text);}
/* FORM */
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--panel2);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--orange);}
.form-group textarea{resize:vertical;min-height:80px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
/* PROGRESS */
.progress-bar{height:6px;background:var(--border);border-radius:999px;overflow:hidden;}
.progress-fill{height:100%;border-radius:999px;transition:width .3s;}
/* TAB */
.tab-bar{display:flex;border-bottom:1px solid var(--border);padding:0 24px;}
.tab-btn{background:none;border:none;padding:11px 16px;cursor:pointer;font-family:inherit;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
.tab-btn.active{color:var(--orange);font-weight:700;border-bottom-color:var(--orange);}
/* SUBTASK */
.subtask-row{display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);}
.subtask-row:last-child{border-bottom:none;}
.subtask-check{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border2);background:var(--panel2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;margin-top:1px;}
.subtask-check.done{background:var(--green);border-color:var(--green);}
.subtask-check.done::after{content:'✓';font-size:12px;color:#000;font-weight:700;}
/* PROOF */
.proof-box{background:var(--panel2);border:1px solid var(--border2);border-radius:8px;padding:12px;margin-top:8px;}
/* TASK CARD */
.task-card{background:var(--panel);border:1px solid var(--border);border-radius:13px;padding:18px;cursor:pointer;transition:all .15s;margin-bottom:12px;box-shadow:var(--shadow);}
.task-card:hover{border-color:var(--border2);box-shadow:0 3px 10px rgba(30,25,15,.09);}
.task-card-title{font-size:15.5px;font-weight:800;margin-bottom:4px;letter-spacing:-.01em;}
.kebab{border:none;background:none;color:var(--muted2);font-size:18px;line-height:1;cursor:pointer;padding:2px 8px;border-radius:6px;font-family:inherit;}
.kebab:hover{background:var(--panel2);color:var(--text);}
.kmenu{position:absolute;right:0;top:26px;z-index:30;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(30,25,15,.14);overflow:hidden;min-width:130px;}
.kmenu button{display:block;width:100%;text-align:left;border:none;background:none;font-family:inherit;font-size:12.5px;font-weight:600;padding:9px 14px;cursor:pointer;color:var(--text);}
.kmenu button:hover{background:var(--panel2);}
.kmenu button.danger{color:var(--red);}
/* STORE ROW */
.store-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.store-row-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-left:auto;}
.review-card{display:flex;flex-direction:column;gap:12px;}
.review-card-top{display:flex;align-items:center;gap:12px;}
.review-card-actions{display:flex;gap:8px;}
.review-card-actions .btn{flex:1;min-width:0;}
@media (max-width:520px){
  .store-row-actions{margin-left:0;width:100%;}
  .store-row-actions .btn{flex:1;min-width:0;}
}
.store-row:last-child{border-bottom:none;}
/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:36px;margin-bottom:10px;}
.empty-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px;}
/* FILTER */
.filter-bar{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap;}
.seg{display:inline-flex;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:3px;gap:2px;}
.seg button{appearance:none;border:none;background:transparent;color:var(--muted);font:700 13px inherit;font-family:inherit;padding:7px 16px;border-radius:8px;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;transition:background .12s,color .12s;}
.seg button.on{background:var(--panel);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.12);}
.seg .seg-count{font-size:11px;font-weight:800;background:var(--border2);color:var(--muted);border-radius:999px;padding:1px 7px;min-width:18px;text-align:center;}
.seg button.on .seg-count{background:var(--gold);color:#1A1408;}
@media(max-width:768px){.seg{width:100%;}.seg button{flex:1;justify-content:center;}}
.filter-bar input,.filter-bar select{background:var(--panel);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--orange);}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--muted);}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
/* TABLE */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px;}
.table-wrap table{width:100%;border-collapse:collapse;font-size:13px;}
.table-wrap th{background:var(--panel2);padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border);}
.table-wrap td{padding:12px 14px;border-bottom:1px solid #F2EDE1;vertical-align:middle;}
.acct-table th,.acct-table td{white-space:nowrap;vertical-align:middle;}
.acct-cards-mobile{display:none;}
.acct-card{background:var(--panel);border:1px solid var(--border);border-radius:13px;padding:14px;margin-bottom:10px;}
.acct-card-top{display:flex;align-items:flex-start;gap:11px;}
.acct-card-name{font-size:15px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.acct-card-sub{font-size:12px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.acct-card-sub .dot{color:var(--muted2);}
.acct-card-sub .stat-on{color:var(--green);font-weight:700;}
.acct-card-sub .stat-off{color:var(--red);font-weight:700;}
.acct-card-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.acct-card-actions .btn{flex:1 1 auto;min-width:0;justify-content:center;text-align:center;padding-left:6px;padding-right:6px;}
.table-wrap tr:last-child td{border-bottom:none;}
.table-wrap tr:hover td{background:#FBF8F1;}
/* BADGE */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;}
.badge-green{background:#E8F4EC;color:var(--green);}
.badge-red{background:#F9E9E7;color:var(--red);}
.badge-gold{background:#F7EEDA;color:var(--gold-dim);}
/* people cell */
.pcell{display:flex;align-items:center;gap:10px;}
.pava{width:30px;height:30px;border-radius:50%;font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex:none;}
.pava-0{background:#E8F0FA;color:#2C5F9E;}.pava-1{background:#F7EEDA;color:#8A6614;}.pava-2{background:#E8F4EC;color:#2E7D4F;}.pava-3{background:#F4E8F0;color:#8A4A6E;}
/* page header refinement */
.page-title{letter-spacing:-.01em;}

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width:768px){
  /* notification + account popups: fixed near the top so they never clip off-screen */
  .notif-panel{position:fixed;top:calc(58px + env(safe-area-inset-top));right:8px;left:8px;width:auto;max-width:none;max-height:64vh;}
  .acct-menu-panel{position:fixed;top:calc(58px + env(safe-area-inset-top));right:8px;left:auto;min-width:190px;}
  /* ===== app-shell mobile: table -> cards + bottom tab bar ===== */
  .main{padding-bottom:74px;}
  .page-header{background:var(--ink);border-bottom:none;}
  .page-header .page-title{color:#F2EFE7;}
  .page-header .page-sub{color:#93A19A;}
  .table-wrap{overflow:visible;border:none;background:none;}
  .table-wrap table{min-width:0;}
  .table-wrap table,.table-wrap thead,.table-wrap tbody,.table-wrap tr,.table-wrap td,.table-wrap th{display:block;}
  .table-wrap thead{display:none;}
  .table-wrap tbody tr{background:var(--panel);border:1px solid var(--border);border-radius:13px;box-shadow:var(--shadow);padding:14px;margin-bottom:10px;}
  .table-wrap tbody tr:hover td{background:none;}
  .table-wrap td{border:none!important;padding:0;display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:30px;text-align:right;overflow-wrap:anywhere;word-break:break-word;}
  .table-wrap td:not(:first-child){margin-top:8px;padding-top:8px;border-top:1px solid var(--line-soft)!important;}
  .table-wrap td::before{content:attr(data-label);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted2);font-weight:700;flex:none;text-align:left;}
  .table-wrap td:empty{display:none;}
  /* hide rows whose only value is an em-dash placeholder (e.g. HQ members have no store) */
  .table-wrap td:has(>.cell-empty:only-child){display:none;}
  .table-wrap tbody tr{padding:12px 14px;}
  .table-wrap td{min-height:26px;}
  .table-wrap td:not(:first-child){margin-top:6px;padding-top:6px;}
  .table-wrap td .pcell{width:100%;}
  /* Accounts: use compact cards on mobile instead of the table-as-cards hack */
  .acct-table-desktop{display:none!important;}
  .acct-cards-mobile{display:block;}
  .tabbar{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--border);padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:60;}
  .tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted2);font-size:9.5px;font-weight:700;border:none;background:none;font-family:inherit;position:relative;cursor:pointer;padding:2px 0;min-width:0;}
  .tb svg{width:22px;height:22px;}
  .tb.on{color:var(--text);}
  .tb.on svg{color:var(--gold-dim);}
  .tb .tbadge{position:absolute;top:-2px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:8.5px;font-weight:800;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;}
  /* mobile: tabbar + More sheet cover the full HQ nav */
  .hq-nav{display:none!important;}
  .portal-nav{display:none!important;}
  body{overscroll-behavior-y:contain;}
  .btn-sm{min-height:38px;}
  .progress-bar{height:10px;border-radius:6px;}
  .stat-value{font-size:26px;}
  .stat-chev{top:12px;}
  /* mobile layout sweep */
  .content{padding:14px;max-width:100%;}
  .content input,.content select,.content textarea{max-width:100%;width:100%;box-sizing:border-box;min-width:0;}
  .card input,.card select,.card textarea{max-width:100%;box-sizing:border-box;min-width:0;}
  .modal input,.modal select,.modal textarea,.form-group input,.form-group select,.form-group textarea{max-width:100%;box-sizing:border-box;min-width:0;}
  /* date/time inputs on iOS default to an intrinsic width that overflows narrow cards */
  input[type="date"],input[type="time"],input[type="datetime-local"]{width:100%;max-width:100%;box-sizing:border-box;min-height:44px;-webkit-appearance:none;appearance:none;display:block;}
  /* iOS renders an empty date field with no intrinsic height; force it to align like other inputs */
  input[type="date"]::-webkit-date-and-time-value,input[type="datetime-local"]::-webkit-date-and-time-value{text-align:left;min-height:1.2em;}
  input[type="date"]::-webkit-datetime-edit,input[type="datetime-local"]::-webkit-datetime-edit{min-height:1.2em;line-height:1.2;}
  /* two-column attachment grid collapses to one column so inputs don't overflow */
  .card [style*="grid-template-columns:1fr 1fr"],.card [style*="grid-template-columns: 1fr 1fr"]{grid-template-columns:1fr!important;}
  .filter-bar input{flex:1 1 100%;min-width:0!important;width:100%;}
  .page-header{flex-wrap:wrap;gap:10px;}
  .page-header .btn{padding:9px 12px;font-size:12px;}
  .card{padding:15px;}
  .create-overlay .content{padding:14px;padding-top:56px;}
  .create-overlay .page-header{padding-top:calc(8px + env(safe-area-inset-top));}
  /* review rows: action buttons drop to their own right-aligned line */
  .task-card>span[style*="flex-shrink: 0"]:last-child,.task-card>span:last-child{margin-left:auto;}
  /* Tasks & Announcements mobile */
  .filter-bar{display:flex;gap:8px;flex-wrap:wrap;}
  .filter-bar select{flex:1 1 45%;min-width:0;font-size:13px;}
  .task-card{padding:14px;}
  .task-card-title{font-size:15px;}
  .kmenu{right:0;}

  html,body{overflow-x:hidden;max-width:100%;}
  .auth-wrap{padding:16px;}
  .auth-card{width:100%!important;max-width:400px;padding:28px 22px;}
  .bot-msgs{padding:14px 16px!important;}
  .bot-input{padding:12px 16px!important;}
  .app{flex-direction:column;}
  .sidebar{width:100%;height:auto;position:static;border-right:none;border-bottom:none;padding:env(safe-area-inset-top) 12px 0 12px;flex-direction:row;align-items:center;justify-content:space-between;gap:8px;}
  .sidebar-logo{padding:8px 4px;border-bottom:none;}
  .sidebar-logo img{width:34px!important;height:34px!important;margin:0!important;}
  .sidebar-logo .switch-link{font-size:10px!important;margin-top:2px!important;}
  .sidebar-logo .portal-switch{margin-top:5px!important;padding:5px 10px!important;font-size:11px!important;}
  /* footer inline: store chip + Sign out in one slim row, email hidden (too narrow) */
  .sidebar .sidebar-footer{border-top:none;margin-top:0;padding:6px 0;flex-direction:row;align-items:center;gap:12px;overflow:visible;}
  .sidebar .sidebar-footer .sf-id{margin:0!important;flex:1;min-width:0;max-width:44vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px!important;font-weight:600!important;}
  .sidebar .sidebar-footer .sf-actions{margin-left:auto;flex-shrink:0;display:flex;gap:10px;}
  .sidebar .sidebar-footer button{white-space:nowrap;font-size:12px;}
  .sidebar .sidebar-footer .build-stamp,.sidebar .sidebar-footer [data-hide-mobile]{display:none!important;}
  /* nav becomes a button grid: franchisee (<=6 items) = 2 rows, HQ (9 items) = 3 rows */
  .sidebar .nav{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:8px 12px;}
  .nav-item{position:relative;display:flex;align-items:center;justify-content:center;text-align:center;white-space:normal;line-height:1.15;width:auto!important;min-height:34px;padding:5px 6px;font-size:12px;font-weight:600;border:1px solid var(--border2)!important;border-radius:9px;background:var(--panel2);}
  .nav-item:hover{background:var(--panel2);}
  .nav-item.active{background:rgba(20,184,166,.15);border-color:var(--teal)!important;color:var(--teal-bright);}
  .nav-icon{display:none!important;}
  .nav-badge{position:absolute;top:3px;right:5px;margin:0!important;min-width:16px;text-align:center;}
  /* prevent iOS auto-zoom on input focus (font-size must be >=16px) */
  input,textarea,select{font-size:16px!important;}
  .sidebar-bottom{flex-direction:row;overflow-x:auto;}
  .main{width:100%;}
  /* mobile: drop the per-screen title/subtitle boxes (they only waste vertical space);
     keep any action controls (buttons, links, search/inputs). Headers with no control
     collapse entirely. Applies to both HQ and franchisee portals. */
  .page-header{padding:8px 16px;min-height:0;flex-wrap:wrap;gap:8px;position:static;}
  .page-header .page-title,.page-header .page-sub{display:none!important;}
  .page-header:not(:has(button)):not(:has(a)):not(:has(input)):not(:has(select)):not(:has(.btn)):not(:has([role="button"])){display:none!important;padding:0!important;border:none!important;}
  /* franchisee top banner box removed on mobile */
  .portal-banner{display:none!important;}
  .content{padding:16px;}
  .card-grid-4{grid-template-columns:repeat(2,1fr);gap:10px;}
  .card-grid-2{grid-template-columns:1fr;gap:12px;}
  .form-row{grid-template-columns:1fr;}
  .card{padding:16px!important;}
  .modal-overlay{padding:14px;align-items:center;}
  .modal{max-width:100%!important;width:100%!important;max-height:88vh!important;border-radius:16px;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;}
  .modal-overlay{overflow:hidden;touch-action:none;}
  /* UglyBot stays full-screen, not a centered card */
  .modal-overlay.bot-modal{padding:0;align-items:stretch;}
  .modal{touch-action:pan-y;}
  .modal-header{padding:16px;padding-top:calc(16px + env(safe-area-inset-top));}
  /* task wizard step indicator: drop the connector lines and allow wrap so it never cuts off */
  /* store cards: stack vertically so the email never overlaps the ACTIVE badge or runs off-screen */
  .store-card-row{flex-direction:column;align-items:flex-start!important;gap:8px;}
  .store-card-contact{width:100%;justify-content:flex-start!important;}
  .store-card-contact>div{text-align:left!important;}
  .wizard-steps{flex-wrap:wrap!important;gap:8px 14px!important;margin-bottom:18px!important;}
  .wizard-steps .wizard-conn{display:none!important;}
  .wizard-steps span{font-size:12px!important;}
  .modal-body{padding:16px!important;overflow-x:hidden;}
  .modal-footer{padding:12px 16px;flex-wrap:wrap;}
  .modal-footer .btn{flex:1;min-width:0;}
  .tab-bar{padding:0 16px;overflow-x:auto;}
  .filter-bar{gap:8px;}
  .filter-bar input,.filter-bar select{min-width:0!important;width:100%;flex:1 1 100%;}
  /* keep every screen inside the viewport so content does not bleed off the right edge */
  .main,.content{max-width:100%;overflow-x:hidden;}
  .card,.modal-body{max-width:100%;}
  /* tables scroll horizontally inside their own wrapper */
  .table-wrap{overflow-x:auto;max-width:100%;}
  .table-wrap table{min-width:520px;}
  /* inline column grids: collapse so they fit a phone instead of overflowing */
  [style*="repeat(4,1fr)"],[style*="repeat(4, 1fr)"]{grid-template-columns:repeat(2,1fr)!important;}
  [style*="repeat(3,1fr)"],[style*="repeat(3, 1fr)"]{grid-template-columns:1fr!important;}
  [style*="repeat(5,1fr)"],[style*="repeat(6,1fr)"]{grid-template-columns:repeat(2,1fr)!important;}
  [style*="minmax("]{grid-template-columns:1fr!important;}
  /* let flex rows shrink/wrap their text instead of pushing it off-screen or squishing it
     (buttons keep their natural width) */
  .content [style*="display:flex"]>*:not(button):not(.btn),
  .content [style*="display: flex"]>*:not(button):not(.btn){min-width:0;}
}
@media (max-width:420px){
  .card-grid-4{grid-template-columns:1fr;}
  [style*="repeat(4,1fr)"]{grid-template-columns:1fr!important;}
}
</style>

<body>
<div id="root"><div id="splash" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#F5F1E8;z-index:9999;">
  <div style="font-family:Georgia,serif;font-size:26px;font-weight:700;color:#14201E;letter-spacing:.01em;">Ugly Donuts</div>
  <div style="font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#8B8470;font-weight:700;">Franchise Ops</div>
  <div style="width:26px;height:26px;border:3px solid #E4DCC8;border-top-color:#CC9C3A;border-radius:50%;animation:spl .8s linear infinite;margin-top:6px;"></div>
  <div id="splash-msg" style="font-size:12px;color:#8B8470;min-height:16px;margin-top:2px;">Starting up</div>
  <div id="splash-help" style="display:none;flex-direction:column;align-items:center;gap:10px;margin-top:8px;">
    <div style="font-size:12px;color:#B4553E;text-align:center;max-width:240px;line-height:1.5;">This is taking longer than usual.</div>
    <button onclick="location.reload(true)" style="font-family:inherit;font-size:13px;font-weight:700;color:#14201E;background:#E4DCC8;border:none;border-radius:8px;padding:9px 18px;cursor:pointer;">Reload app</button>
  </div>
  <style>@keyframes spl{to{transform:rotate(360deg)}}</style>
  <script>
    (function(){
      var msgs=['Starting up','Loading your data','Almost there'],i=0;
      var el=document.getElementById('splash-msg');
      // Rotate the message so the screen never looks dead, even if the spinner
      // animation stalls while the main thread parses the app bundle.
      window.__splashTimer=setInterval(function(){
        i=(i+1)%msgs.length; if(el)el.textContent=msgs[i];
      },1400);
      // If the app hasn't mounted (splash still present) after 12s, offer a reload.
      window.__splashStall=setTimeout(function(){
        var h=document.getElementById('splash-help'); if(h)h.style.display='flex';
        if(el)el.style.display='none';
      },12000);
    })();
  </script>
</div></div>
