if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').catch(function(){}); }
// PWA: intercept the install prompt so we can offer our own Install button
window._pwaPrompt = null;
window.addEventListener('beforeinstallprompt', function(e){

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap');
:root{
  --gold:#CC9C3A;--gold-dim:#7A5C1E;--black:#0A1413;--panel:#13201F;--panel2:#1A2A28;
  --border:#243634;--border2:#2F423F;--text:#F0EDE8;--muted:#869490;--muted2:#566460;
  --red:#E05252;--green:#5FB87A;--blue:#5B8FD4;--orange:#14B8A6;--purple:#9B78D4;
  --teal:#14B8A6;--teal-bright:#2DD4BF;
  --cat-operations:#5B8FD4;--cat-marketing:#D98AA0;--cat-qa:#E05252;
  --cat-training:#CC9C3A;--cat-seasonal:#9B78D4;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--black);color:var(--text);min-height:100vh;font-size:14px;}
/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;}
.auth-card{width:380px;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:40px;}
.auth-logo{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);margin-bottom:2px;}
.auth-app{font-size:12px;color:var(--teal-bright);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:28px;}
.auth-card label{display:block;color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.auth-card input{width:100%;background:var(--panel2);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none;margin-bottom:14px;transition:border-color .2s;}
.auth-card input:focus{border-color:var(--teal);}
.btn-gold{width:100%;background:var(--teal);color:#04201C;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;}
.btn-gold:hover{opacity:.88;}
.auth-err{color:var(--red);font-size:12px;margin-top:10px;text-align:center;}
/* LAYOUT */
.app{display:flex;min-height:100vh;}
.sidebar{width:220px;background:linear-gradient(180deg,#0C1A19 0%,#0A1514 100%);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;}
.sidebar-logo{padding:16px 20px 14px;border-bottom:1px solid var(--border);}
.sidebar-logo img.brand-logo{width:36px;height:36px;object-fit:contain;border-radius:6px;}
.sidebar-logo img.brand-wordmark{width:120px;height:auto;object-fit:contain;margin-top:6px;display:block;}
.sidebar-logo .brand{font-family:'Playfair Display',serif;font-size:15px;color:var(--gold);}
.sidebar-logo .app-tag{font-size:10px;color:var(--teal-bright);letter-spacing:.12em;text-transform:uppercase;margin-top:3px;font-weight:700;}
.sidebar-logo .switch-link{font-size:11px;color:var(--muted);margin-top:8px;cursor:pointer;text-decoration:none;display:block;}
.sidebar-logo .switch-link:hover{color:var(--text);}
.nav{padding:12px 8px;flex:1;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px;background:none;border:none;width:100%;text-align:left;font-family:inherit;}
.nav-item:hover{background:var(--panel2);color:var(--text);}
.nav-item.active{background:rgba(20,184,166,.12);color:var(--teal-bright);}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:999px;font-size:10px;font-weight:700;padding:1px 6px;}
.sidebar-footer{padding:14px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);}
.sidebar-footer button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;font-family:inherit;}
.sidebar-footer button:hover{color:var(--red);}
.main{flex:1;min-width:0;}
.page-header{padding:26px 32px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--panel);position:sticky;top:0;z-index:10;}
.page-title{font-size:20px;font-weight:700;}
.page-sub{font-size:13px;color:var(--muted);margin-top:2px;}
.content{padding:24px 32px;}
.bot-shell{display:flex;flex-direction:column;height:calc(100vh - 89px);}
.bot-msgs{flex:1;overflow-y:auto;min-height:0;padding:20px 32px;}
.bot-input{padding:16px 32px;border-top:1px solid var(--border);background:var(--panel);display:flex;gap:10px;}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all .15s;}
.btn-primary{background:var(--teal);color:#04201C;font-weight:700;}
.btn-primary:hover{opacity:.88;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--panel2);color:var(--text);}
.btn-danger{background:rgba(224,82,82,.15);color:var(--red);border:1px solid rgba(224,82,82,.3);}
.btn-green{background:rgba(95,184,122,.15);color:var(--green);border:1px solid rgba(95,184,122,.3);}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px;}
/* CARDS */
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;}
.card-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.card-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.stat-value{font-size:26px;font-weight:700;}
.stat-sub{font-size:12px;color:var(--muted);margin-top:4px;}
/* CATEGORY */
.cat-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.cat-operations{background:rgba(91,143,212,.15);color:var(--cat-operations);}
.cat-marketing{background:rgba(217,138,160,.15);color:var(--cat-marketing);}
.cat-qa{background:rgba(224,82,82,.15);color:var(--cat-qa);}
.cat-training{background:rgba(204,156,58,.15);color:var(--cat-training);}
.cat-seasonal{background:rgba(155,120,212,.15);color:var(--cat-seasonal);}
/* STATUS */
.status-pending{background:rgba(138,132,128,.12);color:var(--muted);}
.status-in_progress{background:rgba(91,143,212,.15);color:var(--blue);}
.status-submitted{background:rgba(204,156,58,.15);color:var(--gold);}
.status-approved{background:rgba(95,184,122,.15);color:var(--green);}
.status-rejected{background:rgba(224,82,82,.15);color:var(--red);}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;overscroll-behavior:contain;}
body.modal-open{overflow:hidden;}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;}
.modal-lg{max-width:820px;}
.modal-xl{max-width:1000px;}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:16px;font-weight:700;}
.modal-body{padding:20px 24px;}
.modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
.close-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;}
.close-btn:hover{color:var(--text);}
/* FORM */
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--panel2);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--orange);}
.form-group textarea{resize:vertical;min-height:80px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
/* PROGRESS */
.progress-bar{height:6px;background:var(--border);border-radius:999px;overflow:hidden;}
.progress-fill{height:100%;border-radius:999px;transition:width .3s;}
/* TAB */
.tab-bar{display:flex;border-bottom:1px solid var(--border);padding:0 24px;}
.tab-btn{background:none;border:none;padding:11px 16px;cursor:pointer;font-family:inherit;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
.tab-btn.active{color:var(--orange);font-weight:700;border-bottom-color:var(--orange);}
/* SUBTASK */
.subtask-row{display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);}
.subtask-row:last-child{border-bottom:none;}
.subtask-check{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border2);background:var(--panel2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;margin-top:1px;}
.subtask-check.done{background:var(--green);border-color:var(--green);}
.subtask-check.done::after{content:'✓';font-size:12px;color:#000;font-weight:700;}
/* PROOF */
.proof-box{background:var(--panel2);border:1px solid var(--border2);border-radius:8px;padding:12px;margin-top:8px;}
/* TASK CARD */
.task-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:border-color .2s;margin-bottom:12px;}
.task-card:hover{border-color:var(--orange);}
.task-card-title{font-size:15px;font-weight:700;margin-bottom:6px;}
/* STORE ROW */
.store-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.store-row:last-child{border-bottom:none;}
/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:36px;margin-bottom:10px;}
.empty-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px;}
/* FILTER */
.filter-bar{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap;}
.filter-bar input,.filter-bar select{background:var(--panel);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--orange);}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--muted);}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
/* TABLE */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px;}
.table-wrap table{width:100%;border-collapse:collapse;font-size:13px;}
.table-wrap th{background:var(--panel2);padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border);}
.table-wrap td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
.acct-table th,.acct-table td{white-space:nowrap;vertical-align:middle;}
.table-wrap tr:last-child td{border-bottom:none;}
.table-wrap tr:hover td{background:rgba(255,255,255,.02);}
/* BADGE */
.badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:700;}
.badge-green{background:rgba(95,184,122,.15);color:var(--green);}
.badge-red{background:rgba(224,82,82,.15);color:var(--red);}

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width:768px){
  html,body{overflow-x:hidden;max-width:100%;}
  .auth-wrap{padding:16px;}
  .auth-card{width:100%!important;max-width:400px;padding:28px 22px;}
  .bot-msgs{padding:14px 16px!important;}
  .bot-input{padding:12px 16px!important;}
  .app{flex-direction:column;}
  .sidebar{width:100%;height:auto;position:static;flex-direction:column;border-right:none;border-bottom:1px solid var(--border);padding-top:env(safe-area-inset-top);}
  .sidebar-logo{padding:14px 16px 10px;}
  /* nav becomes a button grid: franchisee (<=6 items) = 2 rows, HQ (9 items) = 3 rows */
  .sidebar .nav{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:8px 12px;}
  .nav-item{position:relative;display:flex;align-items:center;justify-content:center;text-align:center;white-space:normal;line-height:1.15;width:auto!important;min-height:34px;padding:5px 6px;font-size:12px;font-weight:600;border:1px solid var(--border2)!important;border-radius:9px;background:var(--panel2);}
  .nav-item:hover{background:var(--panel2);}
  .nav-item.active{background:rgba(20,184,166,.15);border-color:var(--teal)!important;color:var(--teal-bright);}
  .nav-icon{display:none!important;}
  .nav-badge{position:absolute;top:3px;right:5px;margin:0!important;min-width:16px;text-align:center;}
  /* prevent iOS auto-zoom on input focus (font-size must be >=16px) */
  input,textarea,select{font-size:16px!important;}
  .sidebar .sidebar-footer, .sidebar-bottom{flex-direction:row;overflow-x:auto;}
  .main{width:100%;}
  /* mobile: drop the per-screen title/subtitle boxes (they only waste vertical space);
     keep any action controls (buttons, links, search/inputs). Headers with no control
     collapse entirely. Applies to both HQ and franchisee portals. */
  .page-header{padding:8px 16px;min-height:0;flex-wrap:wrap;gap:8px;position:static;}
  .page-header .page-title,.page-header .page-sub{display:none!important;}
  .page-header:not(:has(button)):not(:has(a)):not(:has(input)):not(:has(select)):not(:has(.btn)):not(:has([role="button"])){display:none!important;padding:0!important;border:none!important;}
  /* franchisee top banner box removed on mobile */
  .portal-banner{display:none!important;}
  .content{padding:16px;}
  .card-grid-4{grid-template-columns:repeat(2,1fr);gap:10px;}
  .card-grid-2{grid-template-columns:1fr;gap:12px;}
  .form-row{grid-template-columns:1fr;}
  .card{padding:16px!important;}
  .modal-overlay{padding:0;align-items:flex-end;}
  .modal{max-width:100%!important;width:100%!important;max-height:100%!important;border-radius:16px 16px 0 0;}
  .modal-header{padding:16px;padding-top:calc(16px + env(safe-area-inset-top));}
  /* task wizard step indicator: drop the connector lines and allow wrap so it never cuts off */
  /* store cards: stack vertically so the email never overlaps the ACTIVE badge or runs off-screen */
  .store-card-row{flex-direction:column;align-items:flex-start!important;gap:8px;}
  .store-card-contact{width:100%;justify-content:flex-start!important;}
  .store-card-contact>div{text-align:left!important;}
  .wizard-steps{flex-wrap:wrap!important;gap:8px 14px!important;margin-bottom:18px!important;}
  .wizard-steps .wizard-conn{display:none!important;}
  .wizard-steps span{font-size:12px!important;}
  .modal-body{padding:16px!important;}
  .modal-footer{padding:12px 16px;flex-wrap:wrap;}
  .modal-footer .btn{flex:1;min-width:0;}
  .tab-bar{padding:0 16px;overflow-x:auto;}
  .filter-bar{gap:8px;}
  .filter-bar input,.filter-bar select{min-width:0!important;width:100%;flex:1 1 100%;}
  /* keep every screen inside the viewport so content does not bleed off the right edge */
  .main,.content{max-width:100%;overflow-x:hidden;}
  .card,.modal-body{max-width:100%;}
  /* tables scroll horizontally inside their own wrapper */
  .table-wrap{overflow-x:auto;max-width:100%;}
  .table-wrap table{min-width:520px;}
  /* inline column grids: collapse so they fit a phone instead of overflowing */
  [style*="repeat(4,1fr)"],[style*="repeat(4, 1fr)"]{grid-template-columns:repeat(2,1fr)!important;}
  [style*="repeat(3,1fr)"],[style*="repeat(3, 1fr)"]{grid-template-columns:1fr!important;}
  [style*="repeat(5,1fr)"],[style*="repeat(6,1fr)"]{grid-template-columns:repeat(2,1fr)!important;}
  [style*="minmax("]{grid-template-columns:1fr!important;}
  /* let flex rows shrink/wrap their text instead of pushing it off-screen or squishing it
     (buttons keep their natural width) */
  .content [style*="display:flex"]>*:not(button):not(.btn),
  .content [style*="display: flex"]>*:not(button):not(.btn){min-width:0;}
}
@media (max-width:420px){
  .card-grid-4{grid-template-columns:1fr;}
  [style*="repeat(4,1fr)"]{grid-template-columns:1fr!important;}
}
</style>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

const SUPA_URL = "https://ciufbbdzekqlqdzodnrr.supabase.co";
const SUPA_KEY = "sb_publishable_26hdkwY53clveH7bDPf21w_JGtrY1NP";
const sb = supabase.createClient(SUPA_URL, SUPA_KEY, {
  auth: { detectSessionInUrl: true, persistSession: true, autoRefreshToken: true },
});
const EMAIL_FN = '/.netlify/functions/send-email';
const AI_FN = '/.netlify/functions/chat';
const CREATE_ACCOUNT_FN = '/.netlify/functions/create-account';
const RESET_PW_FN = '/.netlify/functions/reset-password';

// Privileged Netlify functions require the caller's session token so they can
// verify the caller is a logged-in HQ user. This injects it on every call.
async function authFetch(url, opts={}){
  let token = SUPA_KEY;
  try{ const {data}=await sb.auth.getSession(); if(data&&data.session&&data.session.access_token) token=data.session.access_token; }catch(e){}
  const headers = Object.assign({}, opts.headers||{}, {'Authorization':'Bearer '+token});
  return fetch(url, Object.assign({}, opts, {headers}));
}

// ── PWA: push + badge helpers ─────────────────────────────
const VAPID_PUBLIC='BJQDQGS170xaZiTZ4F9MY0T6ARodRW6Jv2RIi-XJO9jGxz6CwteRBkSoFSBFL7kS99fkQffGst4ZuuSxyee9Jpc';
function b64ToU8(b64){const p='='.repeat((4-b64.length%4)%4);const s=(b64+p).replace(/-/g,'+').replace(/_/g,'/');const r=atob(s);const a=new Uint8Array(r.length);for(let i=0;i<r.length;i++)a[i]=r.charCodeAt(i);return a;}
const isStandalone=()=>window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;
const isIOS=()=>/iphone|ipad|ipod/i.test(navigator.userAgent);

// App icon badge (Android/desktop; iOS 16.4+ installed PWAs). Fails silently if unsupported.
function setAppBadgeCount(n){
  try{
    if(!navigator.setAppBadge)return;
    if(n>0)navigator.setAppBadge(n);else navigator.clearAppBadge();
  }catch(e){}
}

// Install + Notifications cards (shown on the Settings page for both roles)
function PwaCards({profile}){
  const[,force]=React.useReducer(x=>x+1,0);
  const[perm,setPerm]=React.useState(typeof Notification!=='undefined'?Notification.permission:'unsupported');
  const[subOn,setSubOn]=React.useState(null);
  const[busy,setBusy]=React.useState(false);
  const[msg,setMsg]=React.useState('');
  const[iosGuide,setIosGuide]=React.useState(false);
  const[linkCopied,setLinkCopied]=React.useState(false);
  React.useEffect(()=>{const f=()=>force();window.addEventListener('pwa-ready',f);return()=>window.removeEventListener('pwa-ready',f);},[]);
  React.useEffect(()=>{(async()=>{
    if(!('serviceWorker'in navigator)||typeof Notification==='undefined'){setSubOn(false);return;}
    try{const reg=await navigator.serviceWorker.ready;const s=await reg.pushManager.getSubscription();setSubOn(!!s);}catch(e){setSubOn(false);}
  })();},[]);
  async function enable(){
    setBusy(true);setMsg('');
    try{
      const p=await Notification.requestPermission();setPerm(p);
      if(p!=='granted'){setMsg('Permission was not granted. Enable notifications for this app in your device settings.');setBusy(false);return;}
      const reg=await navigator.serviceWorker.ready;
      const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:b64ToU8(VAPID_PUBLIC)});
      let frId=null;
      if(profile.role!=='hq'){try{frId=await resolveFranchiseeId(profile);}catch(e){}}
      const row={endpoint:sub.endpoint,subscription:sub.toJSON(),user_id:profile.id,role:profile.role||null,franchisee_id:frId};
      const{error}=await sb.from('push_subscriptions').upsert([row],{onConflict:'endpoint'});
      if(error){setMsg('Could not save: '+error.message);}else{setSubOn(true);setMsg('Notifications are on for this device.');}
    }catch(e){setMsg('Could not enable: '+(e.message||e));}
    setBusy(false);

// Shared resolver: get a franchisee record for a given portal profile.
// Tries profile.franchisee_id first, then falls back to matching store name.
// Returns the franchisee object (or null). Used by all portal screens for consistency.
async function resolveFranchisee(profile){
  if(!profile)return null;
  if(profile.franchisee_id){
    const{data}=await sb.from('franchisees').select('id,name,store_name,email').eq('id',profile.franchisee_id).maybeSingle();
    if(data)return data;
  }
  const sn=(profile.store||profile.full_name||profile.name||'').trim().toLowerCase();
  if(!sn)return null;
  const{data:allFr}=await sb.from('franchisees').select('id,name,store_name,email').in('status',['open','soft_open']);
  return (allFr||[]).find(f=>(f.store_name||'').toLowerCase()===sn||(f.name||'').toLowerCase()===sn)||null;
}
async function resolveFranchiseeId(profile){
  const fr=await resolveFranchisee(profile);
  return fr?fr.id:null;
}
function daysUntil(d){if(!d)return null;return Math.ceil((new Date(d)-new Date())/(1000*60*60*24));}

// ── APP ───────────────────────────────────────────────────
function App(){
  const [session,setSession]=useState(null);
  const [profile,setProfile]=useState(null);
  const [loading,setLoading]=useState(true);
  const [view,setView]=useState('dashboard');
  const [recoveryMode,setRecoveryMode]=useState(false);
  const [linkError,setLinkError]=useState('');

  useEffect(()=>{
    // Detect arrival from a reset link. Supabase puts recovery info in the URL hash
    // (#access_token=...&type=recovery) or, on error, in the query/hash as error=...
    if(typeof window!=='undefined'){
      const hash=window.location.hash||'';
      const qs=window.location.search||'';
      if(hash.includes('type=recovery')||qs.includes('type=recovery')){
        setRecoveryMode(true);
      }
      // If the link failed (expired/invalid/redirect not allowed), Supabase appends an error.
      const errMatch=(hash+qs).match(/error_description=([^&]+)/);
      if(errMatch){
        setLinkError(decodeURIComponent(errMatch[1].replace(/\+/g,' ')));
      }
    }
    let done=false;
    const finish=()=>{ if(!done){ done=true; setLoading(false); } };
    // Never get stuck on the loading screen (cold start / transient network on cross-app nav).
    const watchdog=setTimeout(finish,8000);
    const loadProfile=async(uid)=>{
      try{
        const{data:p,error}=await sb.from('profiles').select('*').eq('id',uid).maybeSingle();
        if(error){setProfile({role:'unknown',_loadError:true});}
        else if(p){setProfile(p);}
        else{setProfile({role:'hq'});} // no profile row = legacy HQ user
      }catch(e){ setProfile({role:'unknown',_loadError:true}); }
    };
    sb.auth.getSession().then(async({data})=>{
      setSession(data.session);
      if(data.session){ await loadProfile(data.session.user.id); }
    }).catch(()=>{/* session read failed → fall through to sign-in */})
      .finally(()=>{ clearTimeout(watchdog); finish(); });
    const{data:{subscription}}=sb.auth.onAuthStateChange(async(event,s)=>{
      if(event==='PASSWORD_RECOVERY'){setRecoveryMode(true);}
      setSession(s);
      if(s){ await loadProfile(s.user.id); }
      else{ setProfile(null); }
      finish(); // also unblocks if getSession was slow but auth resolved
    });
    return()=>{ clearTimeout(watchdog); subscription.unsubscribe(); };
  },[]);

  if(loading)return<div className="loading">Loading...</div>;
  // Password recovery: user arrived via a reset link. Show the set-new-password
  // screen before anything else, regardless of role or session state.
  if(recoveryMode)return<ResetPasswordScreen onDone={()=>{setRecoveryMode(false);}}/>;
  if(linkError)return(
    <div className="auth-wrap">
      <div className="auth-card" style={{textAlign:'center'}}>
        <div className="auth-logo">Ugly Donuts</div>
        <div className="auth-app">Franchise Ops</div>
        <div style={{color:'var(--red)',fontSize:14,margin:'20px 0',lineHeight:1.6}}>This reset link can't be used: {linkError}</div>
        <div style={{color:'var(--muted)',fontSize:13,marginBottom:20,lineHeight:1.6}}>Reset links expire after 1 hour and can only be used once. Please request a new one.</div>
        <button className="btn-gold" onClick={()=>{window.location.hash='';window.location.search='';setLinkError('');}}>Back to Sign In</button>
      </div>
    </div>
  );
  if(!session)return<AuthScreen/>;
  // Profile failed to load — don't guess the role. Ask them to retry rather than
  // risk routing a franchisee into HQ screens.
  if(profile?._loadError){
    return(
      <div className="auth-wrap">
        <div className="auth-card" style={{textAlign:'center'}}>
          <div className="auth-logo">Ugly Donuts</div>
          <div className="auth-app">Franchise Ops</div>
          <div style={{color:'var(--red)',fontSize:14,margin:'20px 0',lineHeight:1.6}}>We couldn't load your account profile. This is usually a temporary connection issue.</div>
          <button className="btn-gold" onClick={()=>window.location.reload()}>Retry</button>
          <div style={{marginTop:16}}>
            <button onClick={()=>sb.auth.signOut()} style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:12,fontFamily:'inherit',textDecoration:'underline'}}>Sign out</button>
          </div>
        </div>
      </div>
    );
  }
  // Route by role
  if(profile?.role==='franchisee')return<FranchiseePortal session={session} profile={profile}/>;
  return<MainApp view={view} setView={setView} session={session}/>;
}

function ResetPasswordScreen({onDone}){
  const [newPass,setNewPass]=useState('');
  const [confirm,setConfirm]=useState('');
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState('');
  const [done,setDone]=useState(false);

  async function save(e){
    e.preventDefault();
    if(newPass.length<8){setErr('Password must be at least 8 characters.');return;}
    if(newPass!==confirm){setErr('Passwords do not match.');return;}
    setBusy(true);setErr('');
    const{error}=await sb.auth.updateUser({password:newPass});
    if(error){setErr(error.message||'Could not update password. The reset link may have expired — request a new one.');setBusy(false);return;}
    setDone(true);setBusy(false);
    // Sign out so they log in fresh with the new password.
    await sb.auth.signOut();
  }

  if(done){
    return(
      <div className="auth-wrap">
        <div className="auth-card" style={{textAlign:'center'}}>
          <div className="auth-logo">Ugly Donuts</div>
          <div className="auth-app">Franchise Ops</div>
          <div style={{color:'var(--green)',fontSize:15,fontWeight:600,margin:'24px 0 8px'}}>Password updated</div>
          <div style={{color:'var(--muted)',fontSize:13,marginBottom:20,lineHeight:1.6}}>You can now sign in with your new password.</div>
          <button className="btn-gold" onClick={onDone}>Go to Sign In</button>
        </div>
      </div>
    );
  }

  return(
    <div className="auth-wrap">
      <div className="auth-card">
        <div style={{textAlign:'center'}}>
          <div className="auth-logo">Ugly Donuts</div>
          <div className="auth-app">Franchise Ops</div>
        </div>
        <div style={{fontSize:15,fontWeight:700,margin:'20px 0 4px'}}>Set a new password</div>
        <div style={{fontSize:13,color:'var(--muted)',marginBottom:18,lineHeight:1.5}}>Enter a new password for your account below.</div>
        <form onSubmit={save}>
          <div className="form-group">
            <label>New Password</label>
            <input type="password" value={newPass} onChange={e=>setNewPass(e.target.value)} placeholder="Min. 8 characters" autoFocus/>
          </div>
          <div className="form-group">
            <label>Confirm Password</label>
            <input type="password" value={confirm} onChange={e=>setConfirm(e.target.value)} placeholder="Repeat new password"/>
          </div>
          {err&&<div style={{color:'var(--red)',fontSize:13,marginBottom:12}}>{err}</div>}
          <button type="submit" className="btn-gold" style={{width:'100%'}} disabled={busy||!newPass||!confirm}>{busy?'Saving...':'Update Password'}</button>
        </form>
      </div>
    </div>
  );
}

    const{count}=await sb.from('ops_assignments').select('id',{count:'exact',head:true}).eq('status','submitted');

    const{count:mc}=await sb.from('ops_messages').select('id',{count:'exact',head:true}).eq('is_read',false);
    setUnreadMsgs(mc||0);
    const{count:wc}=await sb.from('ops_warnings').select('id',{count:'exact',head:true}).eq('status','submitted');
    setReviewWarnings(wc||0);
    setAppBadgeCount((count||0)+(mc||0)+(wc||0));
    // Stores open but without an Ops account yet (need HQ approval)
    const[pRes,sRes]=await Promise.all([
      sb.from('profiles').select('store').eq('role','franchisee'),
      sb.from('franchisees').select('store_name,name').in('status',['open','soft_open']),
    ]);
    const registered=new Set((pRes.data||[]).map(p=>p.store).filter(Boolean));
    const needApproval=(sRes.data||[]).filter(s=>!registered.has(s.store_name||s.name)).length;
    setPendingAccounts(needApproval);
  },[]);
  useEffect(()=>{
    refreshBadges();const t=setInterval(refreshBadges,60000);return()=>clearInterval(t);
  },[refreshBadges]);
  const navItems=[
    {key:'dashboard', icon:'◈', label:'Dashboard'},
    {key:'tasks',     icon:'▤', label:'Tasks & Anmt'},
    {key:'broadcast', icon:'⊕', label:'New Task'},
    {key:'announce',  icon:'◈', label:'New Anmt'},
    {key:'messages',  icon:'✉', label:'Messages', badge:unreadMsgs||null},
    {key:'warnings',  icon:'⚠', label:'Warnings', badge:reviewWarnings||null},
    {key:'stores',    icon:'◍', label:'Stores'},
    {key:'review',    icon:'◎', label:'HQ Review', badge:pendingCount||null},
    {key:'accounts',  icon:'◯', label:'Accounts', badge:pendingAccounts||null},
  ];
  return(
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="brand">Ugly Donuts</div>
          <div className="app-tag">Franchise Ops</div>
          <a href="https://uglycrm.netlify.app/" className="switch-link" style={{color:"#F26419",opacity:.75}}>← Back to Franchise OS</a>
        </div>
        <nav className="nav">
          {navItems.map(n=>(
            <button key={n.key} className={`nav-item ${view===n.key?'active':''}`} onClick={()=>setView(n.key)}>
              <span className="nav-icon" style={{fontSize:15,width:20,textAlign:'center'}}>{n.icon}</span>{n.label}
              {n.badge?<span className="nav-badge">{n.badge}</span>:null}
            </button>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div style={{marginBottom:4,fontSize:11,color:'var(--muted)'}}>{session.user.email}</div>
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>setView('password')}>Change Password</button>
            <button onClick={()=>sb.auth.signOut()} style={{color:'var(--red)'}}>Sign out</button>
          </div>
          <div style={{marginTop:6,fontSize:10,color:'var(--muted2)'}}>build 2026-06-24-v4</div>
        </div>
      </aside>
      <main className="main">
        {view==='dashboard'&&<Dashboard setView={setView}/>}
        {view==='tasks'&&<TaskList setView={setView}/>}
        {view==='broadcast'&&<BroadcastTask onDone={()=>setView('tasks')}/>}
        {view==='stores'&&<StoreList setView={setView}/>}
        {view==='review'&&<HQReview/>}
        {view==='messages'&&<HQMessages onBadgeRefresh={refreshBadges}/>}
        {view==='warnings'&&<HQWarnings onUpdate={refreshBadges}/>}
        {view==='password'&&<><ChangePassword onDone={()=>setView('dashboard')}/><PwaCards profile={{id:session.user.id,role:'hq',franchisee_id:null}}/></>}
        {view==='accounts'&&<AccountManager onBadgeRefresh={refreshBadges}/>}
        {view==='announce'&&<Announcements/>}
      </main>
    </div>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────
function Dashboard({setView}){
  const [stats,setStats]=useState({stores:0,activeTasks:0,pending:0});
  const [taskStats,setTaskStats]=useState([]);
  const [storeStats,setStoreStats]=useState([]);
  const [announceStats,setAnnounceStats]=useState([]);
  const [popup,setPopup]=useState(null); // 'stores' | 'tasks' | 'pending'
  const [popupData,setPopupData]=useState([]);

  useEffect(()=>{
    async function load(){
      const[storesRes,tasksRes,assignRes,annRes,annReceiptRes,profRes]=await Promise.all([
        sb.from('franchisees').select('id,name,store_name,territory').in('status',['open','soft_open']),
        sb.from('ops_tasks').select('*').eq('status','active').order('created_at',{ascending:false}),
        sb.from('ops_assignments').select('ops_task_id,franchisee_id,status'),
        sb.from('ops_announcements').select('*').eq('status','active').order('created_at',{ascending:false}),
        sb.from('ops_announcement_receipts').select('announcement_id,franchisee_id,confirmed'),
        sb.from('profiles').select('franchisee_id').eq('role','franchisee'),
      ]);
      const stores=storesRes.data||[];
      const tasks=tasksRes.data||[];
      const assigns=assignRes.data||[];
      const anns=annRes.data||[];
      const receipts=annReceiptRes.data||[];
      const linkedIds=new Set((profRes.data||[]).map(p=>p.franchisee_id).filter(Boolean));
      const pending=assigns.filter(a=>a.status==='submitted').length;
      setStats({stores:stores.length,activeTasks:tasks.length,pending});

      // Per-task completion rates
      const perTask=tasks.map(t=>{
        const ta=assigns.filter(a=>a.ops_task_id===t.id);
        const approved=ta.filter(a=>a.status==='approved').length;
        const submitted=ta.filter(a=>a.status==='submitted').length;
        const total=ta.length;
        const pct=total?Math.round(approved/total*100):0;
        return{...t,approved,submitted,total,pct};
      });
      setTaskStats(perTask);

      // Per-announcement confirmation rates (only the stores this announcement was assigned to)
      const perAnn=anns.map(a=>{
        const rs=receipts.filter(x=>x.announcement_id===a.id);
        const confirmed=rs.filter(x=>x.confirmed).length;
        const total=rs.length;
        return{...a,confirmed,total,pct:total?Math.round(confirmed/total*100):0};
      });
      setAnnounceStats(perAnn);

      // Per-store completion (across all active tasks). Flag stores with no portal account yet.
      if(stores.length){
        const taskIds=tasks.map(t=>t.id);
        const perStore=stores.map(s=>{
          const mine=assigns.filter(a=>a.franchisee_id===s.id&&taskIds.includes(a.ops_task_id));
          const done=mine.filter(a=>a.status==='approved').length;
          return{...s,done,total:mine.length,pct:mine.length?Math.round(done/mine.length*100):0,noAccount:!linkedIds.has(s.id)};
        }).sort((a,b)=>a.pct-b.pct);
        setStoreStats(perStore);
      }
    }
    load();
  },[]);

  const overallPct=useMemo(()=>{
    const total=taskStats.reduce((s,t)=>s+t.total,0);
    const done=taskStats.reduce((s,t)=>s+t.approved,0);
    return total?Math.round(done/total*100):0;
  },[taskStats]);

  useEffect(()=>{
    if(!popup){setPopupData([]);return;}
    async function loadPopup(){
      if(popup==='stores'){
        const{data}=await sb.from('franchisees').select('*').in('status',['open','soft_open']).order('name');
        setPopupData(data||[]);
      }else if(popup==='tasks'){
        const{data}=await sb.from('ops_tasks').select('*').eq('status','active').order('created_at',{ascending:false});
        setPopupData(data||[]);
      }else if(popup==='pending'){
        const{data}=await sb.from('ops_assignments').select('*,franchisees(name,store_name,territory),ops_tasks(title,category)').eq('status','submitted').order('updated_at',{ascending:false});
        setPopupData(data||[]);
      }
    }
    loadPopup();
  },[popup]);

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Ops Dashboard</div><div className="page-sub">Open store task management</div></div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-ghost" onClick={()=>setView('announce')}>+ New Announcement</button>
          <button className="btn btn-primary" onClick={()=>setView('broadcast')}>+ New Task</button>
        </div>
      </div>
      <div className="content">
        {/* Top stats */}
        <div className="card-grid-4" style={{marginBottom:24}}>
          <div className="card" style={{cursor:'pointer'}} onClick={()=>setPopup('stores')}>
            <div className="stat-label">Open Stores</div><div className="stat-value" style={{color:'var(--green)'}}>{stats.stores}</div>
            <div className="stat-sub">Operational · <span style={{color:'var(--green)'}}>View →</span></div>
          </div>
          <div className="card" style={{cursor:'pointer'}} onClick={()=>setPopup('tasks')}>
            <div className="stat-label">Active Tasks</div><div className="stat-value" style={{color:'var(--orange)'}}>{stats.activeTasks}</div>
            <div className="stat-sub">Broadcast tasks · <span style={{color:'var(--orange)'}}>View →</span></div>
          </div>
          <div className="card" style={{cursor:'pointer'}} onClick={()=>setPopup('pending')}>
            <div className="stat-label">Pending Review</div><div className="stat-value" style={{color:stats.pending>0?'var(--gold)':'var(--text)'}}>{stats.pending}</div>
            <div className="stat-sub">Awaiting HQ approval · <span style={{color:'var(--gold)'}}>View →</span></div>
          </div>
          <div className="card">
            <div className="stat-label">Overall Rate</div><div className="stat-value" style={{color:overallPct===100?'var(--green)':overallPct>50?'var(--gold)':'var(--text)'}}>{overallPct}%</div>
            <div className="stat-sub">Approved across all tasks</div>
          </div>
        </div>

        {/* Task-by-task completion */}
        <div className="card" style={{marginBottom:16}}>
          <div style={{fontWeight:700,marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            Task Completion by Task
            <button className="btn btn-ghost btn-sm" onClick={()=>setView('tasks')}>See all →</button>
          </div>
          {taskStats.length===0&&<div style={{color:'var(--muted)',fontSize:13}}>No active tasks yet.</div>}
          {taskStats.map(t=>{
            const days=daysUntil(t.due_date);
            return(
              <div key={t.id} style={{marginBottom:14,paddingBottom:14,borderBottom:'1px solid var(--border)'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
                  <span className={`cat-badge cat-${t.category}`}>{catLabel(t.category)}</span>
                  <span style={{flex:1,fontSize:13,fontWeight:600}}>{t.title}</span>
                  <div style={{display:'flex',gap:10,alignItems:'center',flexShrink:0}}>
                    {t.submitted>0&&<span style={{fontSize:11,color:'var(--gold)',fontWeight:600}}>{t.submitted} pending review</span>}
                    {days!==null&&<span style={{fontSize:11,color:days<0?'var(--red)':days<=3?'var(--orange)':'var(--muted)',whiteSpace:'nowrap'}}>{days<0?`${Math.abs(days)}d late`:days===0?'Due today':`${days}d left`}</span>}
                    <span style={{fontSize:12,fontWeight:700,color:t.pct===100?'var(--green)':t.pct>50?'var(--gold)':'var(--muted)',minWidth:36,textAlign:'right'}}>{t.pct}%</span>
                  </div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div className="progress-bar" style={{flex:1}}>
                    <div className="progress-fill" style={{width:`${t.pct}%`,background:t.pct===100?'var(--green)':'var(--orange)'}}/>
                  </div>
                  <span style={{fontSize:11,color:'var(--muted)',whiteSpace:'nowrap'}}>{t.approved}/{t.total} stores</span>
                </div>
              </div>
            );
          })}
        </div>

        {/* Store-level breakdown */}
        <div className="card">
          <div style={{fontWeight:700,marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            Store Completion (All Tasks)
            <button className="btn btn-ghost btn-sm" onClick={()=>setView('stores')}>See stores →</button>
          </div>
          {storeStats.length===0&&<div style={{color:'var(--muted)',fontSize:13}}>No data yet.</div>}
          {storeStats.map(s=>(
            <div key={s.id} style={{marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <div>
                  <span style={{fontSize:13,fontWeight:600}}>{s.name}</span>
                  <span style={{fontSize:11,color:'var(--muted)',marginLeft:8}}>{s.territory}</span>
                  {s.noAccount&&<span onClick={()=>setView('accounts')} style={{fontSize:10,fontWeight:700,color:'var(--red)',background:'rgba(224,82,82,.12)',border:'1px solid rgba(224,82,82,.3)',borderRadius:6,padding:'2px 7px',marginLeft:8,cursor:'pointer',whiteSpace:'nowrap'}}>● APPROVE PENDING</span>}
                </div>
                {s.noAccount?(
                  <span style={{fontSize:11,color:'var(--muted)'}}>no portal account</span>
                ):(
                  <span style={{fontSize:12,color:s.pct===100?'var(--green)':s.pct>50?'var(--gold)':'var(--muted)',fontWeight:600}}>{s.done}/{s.total} · {s.pct}%</span>
                )}
              </div>
              <div className="progress-bar">
                <div className="progress-fill" style={{width:`${s.noAccount?0:s.pct}%`,background:s.pct===100?'var(--green)':'var(--orange)'}}/>
              </div>
            </div>
          ))}
        </div>

        {/* Announcement confirmation rates */}
        <div className="card" style={{marginTop:16}}>
          <div style={{fontWeight:700,marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            Announcement Confirmations
            <button className="btn btn-ghost btn-sm" onClick={()=>setView('tasks')}>Manage →</button>
          </div>
          {announceStats.length===0&&<div style={{color:'var(--muted)',fontSize:13}}>No active announcements.</div>}
          {announceStats.map(a=>(
            <div key={a.id} style={{marginBottom:14,paddingBottom:14,borderBottom:'1px solid var(--border)'}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
                <span style={{flex:1,fontSize:13,fontWeight:600}}>{a.title}</span>
                <span style={{fontSize:12,fontWeight:700,color:a.pct===100?'var(--green)':a.pct>50?'var(--gold)':'var(--muted)',minWidth:36,textAlign:'right'}}>{a.pct}%</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div className="progress-bar" style={{flex:1}}>
                  <div className="progress-fill" style={{width:`${a.pct}%`,background:a.pct===100?'var(--green)':'var(--orange)'}}/>
                </div>
                <span style={{fontSize:11,color:'var(--muted)',whiteSpace:'nowrap'}}>{a.confirmed}/{a.total} confirmed</span>
              </div>
            </div>
          ))}
        </div>
      </div>
      {popup&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setPopup(null)}>
          <div className="modal modal-lg">
            <div className="modal-header">
              <div className="modal-title">
                {popup==='stores'&&`Open Stores (${popupData.length})`}
                {popup==='tasks'&&`Active Tasks (${popupData.length})`}
                {popup==='pending'&&`Pending Review (${popupData.length})`}
              </div>
              <button className="close-btn" onClick={()=>setPopup(null)}>×</button>
            </div>
            <div className="modal-body">
              {popup==='stores'&&(
                <div>
                  {popupData.length===0&&<div style={{color:'var(--muted)',textAlign:'center',padding:'30px 0'}}>No open stores yet.</div>}
                  {popupData.map(s=>(
                    <div key={s.id} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:14,fontWeight:700}}>{s.store_name||s.name}</div>
                        <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{s.name} · {s.territory}</div>
                      </div>
                      <div style={{textAlign:'right'}}>
                        {s.email&&<a href={`mailto:${s.email}`} style={{fontSize:12,color:'var(--blue)',textDecoration:'none',display:'block'}}>✉ {s.email}</a>}
                        {s.phone&&<a href={`tel:${s.phone}`} style={{fontSize:12,color:'var(--green)',textDecoration:'none',marginTop:2,display:'block'}}>📞 {s.phone}</a>}
                      </div>
                    </div>
                  ))}
                </div>
              )}
              {popup==='tasks'&&(
                <div>
                  {popupData.length===0&&<div style={{color:'var(--muted)',textAlign:'center',padding:'30px 0'}}>No active tasks.</div>}
                  {popupData.map(t=>{
                    const days=daysUntil(t.due_date);
                    return(
                      <div key={t.id} style={{padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                          <span className={`cat-badge cat-${t.category}`}>{catLabel(t.category)}</span>
                          <span style={{fontSize:14,fontWeight:700,flex:1}}>{t.title}</span>
                          {days!==null&&<span style={{fontSize:11,color:days<0?'var(--red)':days<=3?'var(--orange)':'var(--muted)',whiteSpace:'nowrap'}}>{days<0?`${Math.abs(days)}d late`:days===0?'Due today':`${days}d left`}</span>}
                        </div>
                        {t.description&&<div style={{fontSize:12,color:'var(--muted)',paddingLeft:0}}>{t.description}</div>}
                        <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>Due: {fmtDate(t.due_date)||'No date'} · Target: {t.target==='all'?'All stores':t.target}</div>
                      </div>
                    );
                  })}
                </div>
              )}
              {popup==='pending'&&(
                <div>
                  {popupData.length===0&&<div style={{color:'var(--muted)',textAlign:'center',padding:'30px 0'}}>No pending reviews.</div>}
                  {popupData.map(a=>(
                    <div key={a.id} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:14,fontWeight:700}}>{a.franchisees?.store_name||a.franchisees?.name}</div>
                        <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{a.franchisees?.territory}</div>
                        <div style={{display:'flex',gap:6,marginTop:4}}>
                          <span className={`cat-badge cat-${a.ops_tasks?.category}`}>{catLabel(a.ops_tasks?.category)}</span>
                          <span style={{fontSize:12}}>{a.ops_tasks?.title}</span>
                        </div>
                      </div>
                      <div style={{display:'flex',gap:8}}>
                        <button className="btn btn-danger btn-sm" onClick={async()=>{
                          const n=window.prompt('Rejection reason:');
                          if(n===null)return;
                          await sb.from('ops_assignments').update({status:'rejected',hq_notes:n,reviewed_at:new Date().toISOString(),reviewed_by:'HQ'}).eq('id',a.id);
                          setPopupData(pd=>pd.filter(x=>x.id!==a.id));
                          setStats(s=>({...s,pending:s.pending-1}));
                        }}>Reject</button>
                        <button className="btn btn-green btn-sm" onClick={async()=>{
                          await sb.from('ops_assignments').update({status:'approved',reviewed_at:new Date().toISOString(),reviewed_by:'HQ'}).eq('id',a.id);
                          setPopupData(pd=>pd.filter(x=>x.id!==a.id));
                          setStats(s=>({...s,pending:s.pending-1}));
                        }}>Approve ✓</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div className="modal-footer"><button className="btn btn-ghost" onClick={()=>setPopup(null)}>Close</button></div>
          </div>
        </div>
      )}
    </>
  );
}

// ── TASK LIST ─────────────────────────────────────────────
function TaskList({setView}){
  const [tasks,setTasks]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filterCat,setFilterCat]=useState('all');
  const [filterStatus,setFilterStatus]=useState('active');
  const [selected,setSelected]=useState(null);

  async function load(){
    setLoading(true);
    let q=sb.from('ops_tasks').select('*').order('created_at',{ascending:false});
    if(filterStatus!=='all')q=q.eq('status',filterStatus);
    const{data}=await q;
    setTasks(data||[]);setLoading(false);
  }
  useEffect(()=>{load();},[filterStatus]);

  const filtered=useMemo(()=>tasks.filter(t=>filterCat==='all'||t.category===filterCat),[tasks,filterCat]);

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Tasks & Announcements</div><div className="page-sub">Broadcast tasks and store announcements</div></div>
        <button className="btn btn-primary" onClick={()=>setView('broadcast')}>+ New Task</button>
      </div>
      <div className="content">
        <div className="filter-bar">
          <select value={filterCat} onChange={e=>setFilterCat(e.target.value)}>
            <option value="all">All Categories</option>
            {CATEGORIES.map(c=><option key={c.key} value={c.key}>{c.label}</option>)}
          </select>
          <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
            <option value="active">Active</option>
            <option value="completed">Completed</option>
            <option value="archived">Archived</option>
            <option value="all">All</option>
          </select>
          <span style={{marginLeft:'auto',fontSize:12,color:'var(--muted)'}}>{filtered.length} tasks</span>
        </div>
        {loading?<div className="loading">Loading...</div>:filtered.length===0?(
          <div className="empty"><div className="empty-icon">▤</div><div className="empty-title">No tasks yet</div><div style={{fontSize:13,color:'var(--muted)'}}>Create a broadcast task to get started</div></div>
        ):(
          filtered.map(t=><TaskCard key={t.id} task={t} onClick={()=>setSelected(t)} onRefresh={load}/>)
        )}
        <AnnouncementsSummary/>
      </div>
      {selected&&<TaskDetailModal task={selected} onClose={()=>{setSelected(null);load();}}/>}
    </>
  );
}

// ── ANNOUNCEMENTS SUMMARY ─────────────────────────────────
function AnnouncementsSummary(){
  const [announcements,setAnnouncements]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    sb.from('ops_announcements').select('*').neq('status','archived').order('created_at',{ascending:false}).limit(10)
      .then(r=>{setAnnouncements(r.data||[]);setLoading(false);});
  },[]);

  const ANN_CATS=[
    {key:'general',label:'General',color:'#5B8FD4'},
    {key:'urgent',label:'Urgent',color:'#E05252'},
    {key:'menu',label:'Menu Update',color:'#CC9C3A'},
    {key:'policy',label:'Policy',color:'#9B78D4'},
  ];
  function catColor(k){return ANN_CATS.find(c=>c.key===k)?.color||'#5B8FD4';}
  function catLbl(k){return ANN_CATS.find(c=>c.key===k)?.label||k;}

  if(loading||announcements.length===0)return(
    <div style={{marginTop:28,paddingTop:20,borderTop:'1px solid var(--border)',textAlign:'center',color:'var(--muted)',fontSize:13}}>
      {!loading&&'No announcements yet'}
    </div>
  );

  return(
    <div style={{marginTop:28,borderTop:'1px solid var(--border)',paddingTop:20}}>

function TaskCard({task,onClick,onRefresh}){
  const [stats,setStats]=useState({total:0,approved:0,submitted:0,pending:0});
  useEffect(()=>{
    sb.from('ops_assignments').select('status').eq('ops_task_id',task.id).then(r=>{
      const a=r.data||[];
      setStats({total:a.length,approved:a.filter(x=>x.status==='approved').length,submitted:a.filter(x=>x.status==='submitted').length,pending:a.filter(x=>x.status==='pending'||x.status==='in_progress').length});
    });
  },[task.id]);
  const pct=stats.total?Math.round(stats.approved/stats.total*100):0;
  const days=daysUntil(task.due_date);

  async function archive(e){
    e.stopPropagation();
    if(!window.confirm('Archive this task?'))return;
    await sb.from('ops_tasks').update({status:'archived'}).eq('id',task.id);
    onRefresh();
  }

  return(
    <div className="task-card" onClick={onClick}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <span className={`cat-badge cat-${task.category}`}>{catLabel(task.category)}</span>
          {task.require_hq_approval&&<span style={{fontSize:10,background:'rgba(155,120,212,.15)',color:'var(--purple)',padding:'2px 6px',borderRadius:4,fontWeight:700}}>HQ APPROVAL</span>}
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {days!==null&&<span style={{fontSize:11,color:days<0?'var(--red)':days<=3?'var(--orange)':'var(--muted)',fontWeight:600}}>{days<0?`${Math.abs(days)}d overdue`:days===0?'Due today':`${days}d left`}</span>}
          <button className="btn btn-ghost btn-sm" onClick={archive} style={{fontSize:11,padding:'2px 8px'}}>Archive</button>
          <button className="btn btn-danger btn-sm" onClick={async(e)=>{e.stopPropagation();if(!window.confirm('Permanently delete this task and all store assignments? This cannot be undone.'))return;await sb.from('ops_tasks').delete().eq('id',task.id);onRefresh();}} style={{fontSize:11,padding:'2px 8px'}}>Delete</button>
        </div>
      </div>
      <div className="task-card-title">{task.title}</div>
      {task.description&&<div style={{fontSize:12,color:'var(--muted)',marginBottom:10,lineHeight:1.5}}>{task.description}</div>}
      <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:8}}>
        <span style={{fontSize:12,color:'var(--muted)'}}>Due: {fmtDate(task.due_date)||'No date'}</span>
        <span style={{fontSize:12,color:'var(--muted)'}}>Target: {task.target==='all'?'All open stores':`${(task.target||'').split(',').length} selected store${(task.target||'').split(',').length!==1?'s':''}`}</span>
      </div>
      {stats.total>0&&(
        <>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
            <span style={{color:'var(--muted)'}}>{stats.approved}/{stats.total} approved</span>
            <span style={{display:'flex',gap:10}}>
              {stats.submitted>0&&<span style={{color:'var(--gold)'}}>{stats.submitted} pending review</span>}
              {stats.pending>0&&<span style={{color:'var(--muted)'}}>{stats.pending} not started</span>}
            </span>
          </div>
          <div className="progress-bar">
            <div className="progress-fill" style={{width:`${pct}%`,background:pct===100?'var(--green)':'var(--orange)'}}/>
          </div>
        </>
      )}
    </div>
  );
}

// ── TASK DETAIL MODAL ─────────────────────────────────────
function TaskDetailModal({task,onClose}){
  const [assignments,setAssignments]=useState([]);
  const [subtasks,setSubtasks]=useState([]);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState('overview');
  const [selected,setSelected]=useState(null); // selected assignment for detail

  async function load(){
    setLoading(true);
    const[aRes,sRes]=await Promise.all([
      sb.from('ops_assignments').select('*,franchisees(name,territory,email)').eq('ops_task_id',task.id).order('created_at'),
      sb.from('ops_subtasks').select('*').eq('ops_task_id',task.id).order('sort_order'),
    ]);
    setAssignments(aRes.data||[]);setSubtasks(sRes.data||[]);setLoading(false);
  }
  useEffect(()=>{load();},[]);

  async function approve(aId){
    await sb.from('ops_assignments').update({status:'approved',reviewed_at:new Date().toISOString(),reviewed_by:'HQ'}).eq('id',aId);
    load();
  }
  async function reject(aId){
    const note=window.prompt('Reason for rejection (optional):');
    if(note===null)return;
    await sb.from('ops_assignments').update({status:'rejected',hq_notes:note,reviewed_at:new Date().toISOString(),reviewed_by:'HQ'}).eq('id',aId);
    load();
  }
  async function markComplete(){
    if(!window.confirm('Mark this task as completed for all stores?'))return;
    await sb.from('ops_tasks').update({status:'completed'}).eq('id',task.id);
    onClose();
  }

  const byStatus={submitted:[],approved:[],rejected:[],pending:[],in_progress:[]};
  assignments.forEach(a=>{if(byStatus[a.status])byStatus[a.status].push(a);});
  const totalApproved=byStatus.approved.length;
  const pct=assignments.length?Math.round(totalApproved/assignments.length*100):0;

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-xl">
        <div className="modal-header">
          <div>
            <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:4}}>
              <span className={`cat-badge cat-${task.category}`}>{catLabel(task.category)}</span>
              {task.require_hq_approval&&<span style={{fontSize:10,background:'rgba(155,120,212,.15)',color:'var(--purple)',padding:'2px 6px',borderRadius:4,fontWeight:700}}>HQ APPROVAL REQUIRED</span>}
            </div>
            <div className="modal-title">{task.title}</div>
            {task.description&&<div style={{fontSize:12,color:'var(--muted)',marginTop:3}}>{task.description}</div>}
          </div>

            <button key={t.k} className={`tab-btn ${tab===t.k?'active':''}`} onClick={()=>setTab(t.k)}>{t.l}</button>

              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
                {[{l:'Total Stores',v:assignments.length,c:'var(--text)'},{l:'Approved',v:byStatus.approved.length,c:'var(--green)'},{l:'Pending Review',v:byStatus.submitted.length,c:'var(--gold)'},{l:'Not Started',v:byStatus.pending.length+byStatus.in_progress.length,c:'var(--muted)'}].map(s=>(
                  <div key={s.l} style={{background:'var(--panel2)',borderRadius:8,padding:12,textAlign:'center'}}>

                    <div style={{fontSize:24,fontWeight:700,color:s.c}}>{s.v}</div>

              <div style={{marginBottom:16}}>

                  <span style={{color:'var(--muted)'}}>Overall completion</span>

  );
