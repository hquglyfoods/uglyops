<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ugly Donuts — Franchise Ops</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap');
:root{
  --gold:#CC9C3A;--gold-dim:#7A5C1E;--black:#0E0E0E;--panel:#1E1E1E;--panel2:#252525;
  --border:#2E2E2E;--border2:#383838;--text:#F0EDE8;--muted:#8A8480;--muted2:#5A5654;
  --red:#E05252;--green:#5FB87A;--blue:#5B8FD4;--orange:#F26419;--purple:#9B78D4;
  --cat-operations:#5B8FD4;--cat-marketing:#D98AA0;--cat-qa:#E05252;
  --cat-training:#CC9C3A;--cat-seasonal:#9B78D4;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--black);color:var(--text);min-height:100vh;font-size:14px;}
/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;}
.auth-card{width:380px;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:40px;}
.auth-logo{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);margin-bottom:2px;}
.auth-app{font-size:12px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:28px;}
.auth-card label{display:block;color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.auth-card input{width:100%;background:var(--panel2);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none;margin-bottom:14px;transition:border-color .2s;}
.auth-card input:focus{border-color:var(--gold);}
.btn-gold{width:100%;background:var(--gold);color:var(--black);border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;}
.btn-gold:hover{opacity:.88;}
.auth-err{color:var(--red);font-size:12px;margin-top:10px;text-align:center;}
/* LAYOUT */
.app{display:flex;min-height:100vh;}
.sidebar{width:220px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;}
.sidebar-logo{padding:16px 20px 14px;border-bottom:1px solid var(--border);}
.sidebar-logo img.brand-logo{width:36px;height:36px;object-fit:contain;border-radius:6px;}
.sidebar-logo img.brand-wordmark{width:120px;height:auto;object-fit:contain;margin-top:6px;display:block;}
.sidebar-logo .brand{font-family:'Playfair Display',serif;font-size:15px;color:var(--gold);}
.sidebar-logo .app-tag{font-size:10px;color:var(--orange);letter-spacing:.12em;text-transform:uppercase;margin-top:3px;font-weight:700;}
.sidebar-logo .switch-link{font-size:11px;color:var(--muted);margin-top:8px;cursor:pointer;text-decoration:none;display:block;}
.sidebar-logo .switch-link:hover{color:var(--text);}
.nav{padding:12px 8px;flex:1;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px;background:none;border:none;width:100%;text-align:left;font-family:inherit;}
.nav-item:hover{background:var(--panel2);color:var(--text);}
.nav-item.active{background:rgba(242,100,25,.1);color:var(--orange);}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:999px;font-size:10px;font-weight:700;padding:1px 6px;}
.sidebar-footer{padding:14px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);}
.sidebar-footer button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;font-family:inherit;}
.sidebar-footer button:hover{color:var(--red);}
.main{flex:1;min-width:0;}
.page-header{padding:26px 32px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--panel);position:sticky;top:0;z-index:10;}
.page-title{font-size:20px;font-weight:700;}
.page-sub{font-size:13px;color:var(--muted);margin-top:2px;}
.content{padding:24px 32px;}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all .15s;}
.btn-primary{background:var(--orange);color:#fff;}
.btn-primary:hover{opacity:.88;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--panel2);color:var(--text);}
.btn-danger{background:rgba(224,82,82,.15);color:var(--red);border:1px solid rgba(224,82,82,.3);}
.btn-green{background:rgba(95,184,122,.15);color:var(--green);border:1px solid rgba(95,184,122,.3);}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px;}
/* CARDS */
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;}
.card-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.card-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.stat-value{font-size:26px;font-weight:700;}
.stat-sub{font-size:12px;color:var(--muted);margin-top:4px;}
/* CATEGORY */
.cat-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.cat-operations{background:rgba(91,143,212,.15);color:var(--cat-operations);}
.cat-marketing{background:rgba(217,138,160,.15);color:var(--cat-marketing);}
.cat-qa{background:rgba(224,82,82,.15);color:var(--cat-qa);}
.cat-training{background:rgba(204,156,58,.15);color:var(--cat-training);}
.cat-seasonal{background:rgba(155,120,212,.15);color:var(--cat-seasonal);}
/* STATUS */
.status-pending{background:rgba(138,132,128,.12);color:var(--muted);}
.status-in_progress{background:rgba(91,143,212,.15);color:var(--blue);}
.status-submitted{background:rgba(204,156,58,.15);color:var(--gold);}
.status-approved{background:rgba(95,184,122,.15);color:var(--green);}
.status-rejected{background:rgba(224,82,82,.15);color:var(--red);}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;}
.modal-lg{max-width:820px;}
.modal-xl{max-width:1000px;}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:16px;font-weight:700;}
.modal-body{padding:20px 24px;}
.modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
.close-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;}
.close-btn:hover{color:var(--text);}
/* FORM */
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--panel2);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--orange);}
.form-group textarea{resize:vertical;min-height:80px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
/* PROGRESS */
.progress-bar{height:6px;background:var(--border);border-radius:999px;overflow:hidden;}
.progress-fill{height:100%;border-radius:999px;transition:width .3s;}
/* TAB */
.tab-bar{display:flex;border-bottom:1px solid var(--border);padding:0 24px;}
.tab-btn{background:none;border:none;padding:11px 16px;cursor:pointer;font-family:inherit;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
.tab-btn.active{color:var(--orange);font-weight:700;border-bottom-color:var(--orange);}
/* SUBTASK */
.subtask-row{display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);}
.subtask-row:last-child{border-bottom:none;}
.subtask-check{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border2);background:var(--panel2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;margin-top:1px;}
.subtask-check.done{background:var(--green);border-color:var(--green);}
.subtask-check.done::after{content:'✓';font-size:12px;color:#000;font-weight:700;}
/* PROOF */
.proof-box{background:var(--panel2);border:1px solid var(--border2);border-radius:8px;padding:12px;margin-top:8px;}
/* TASK CARD */
.task-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:border-color .2s;margin-bottom:12px;}
.task-card:hover{border-color:var(--orange);}
.task-card-title{font-size:15px;font-weight:700;margin-bottom:6px;}
/* STORE ROW */
.store-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.store-row:last-child{border-bottom:none;}
/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:36px;margin-bottom:10px;}
.empty-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px;}
/* FILTER */
.filter-bar{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap;}
.filter-bar input,.filter-bar select{background:var(--panel);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--orange);}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--muted);}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const SUPA_URL = "https://ciufbbdzekqlqdzodnrr.supabase.co";
const SUPA_KEY = "sb_publishable_26hdkwY53clveH7bDPf21w_JGtrY1NP";
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

async function sendEmail(to, subject, html){
  try{
    const res = await fetch(EMAIL_FN, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({to, subject, html}),
    });
    return res.ok;
  }catch(e){console.error('Email error:',e);return false;}
}

function announcementEmailHtml(title, body, category, storeName, attachmentUrl, attachmentName, attachmentType, linkUrl, linkLabel){

      <div style="display:inline-block;background:${color}22;color:${color};padding:2px 10px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:12px;">${category}</div>

      ${linkUrl?`<a href="${linkUrl}" style="display:inline-block;background:#9B78D4;color:#fff;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:700;font-size:14px;margin-right:10px;">${linkLabel||'View Link'}</a>`:''}
      <a href="https://uglyops.netlify.app/" style="display:inline-block;background:#5B8FD4;color:#fff;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:700;font-size:14px;">Confirm Receipt in Franchise Ops</a>
      <p style="color:#5A5654;font-size:11px;margin-top:24px;">Please confirm receipt in the Franchise Ops portal. · Ugly Donuts & Corn Dogs Franchising LLC</p>
    </div>
  `;

const CATEGORIES = [
  {key:'operations', label:'Operations', color:'#5B8FD4'},
  {key:'marketing',  label:'Marketing',  color:'#D98AA0'},
  {key:'qa',         label:'QA / Audit', color:'#E05252'},
  {key:'training',   label:'Training',   color:'#CC9C3A'},
  {key:'seasonal',   label:'Seasonal',   color:'#9B78D4'},
];
const PROOF_TYPES = [
  {key:'photo',    label:'Photo Upload'},
  {key:'text',     label:'Text Confirmation'},
  {key:'checkbox', label:'Checkbox Only'},
];
const STATUS_LABELS = {
  pending:'Pending', in_progress:'In Progress',
  submitted:'Submitted', approved:'Approved', rejected:'Rejected'
};

function catStyle(k){const c=CATEGORIES.find(x=>x.key===k);return c?{background:c.color+'22',color:c.color}:{background:'rgba(255,255,255,.05)',color:'var(--muted)'};}
function catLabel(k){return CATEGORIES.find(x=>x.key===k)?.label||k;}
function fmtDate(ts){if(!ts)return'';return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function daysUntil(d){if(!d)return null;return Math.ceil((new Date(d)-new Date())/(1000*60*60*24));}

// ── APP ───────────────────────────────────────────────────
function App(){
  const [session,setSession]=useState(null);
  const [profile,setProfile]=useState(null);
  const [loading,setLoading]=useState(true);
  const [view,setView]=useState('dashboard');

  useEffect(()=>{
    sb.auth.getSession().then(async({data})=>{
      setSession(data.session);
      if(data.session){
        const{data:p}=await sb.from('profiles').select('*').eq('id',data.session.user.id).single();
        setProfile(p||{role:'hq'});
      }
      setLoading(false);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange(async(_,s)=>{
      setSession(s);
      if(s){
        const{data:p}=await sb.from('profiles').select('*').eq('id',s.user.id).single();
        setProfile(p||{role:'hq'});
      }else{
        setProfile(null);
      }
    });
    return()=>subscription.unsubscribe();
  },[]);

  if(loading)return<div className="loading">Loading...</div>;
  if(!session)return<AuthScreen/>;
  // Route by role
  if(profile?.role==='franchisee')return<FranchiseePortal session={session} profile={profile}/>;
  return<MainApp view={view} setView={setView} session={session}/>;
}

function AuthScreen(){
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  async function login(e){e.preventDefault();setBusy(true);setErr('');const{error}=await sb.auth.signInWithPassword({email,password:pass});if(error){setErr(error.message);setBusy(false);}}
  return(
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-logo">Ugly Donuts</div>
        <div className="auth-app">Franchise Ops</div>
        <form onSubmit={login}>
          <div className="form-group"><label>Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} autoFocus/></div>
          <div className="form-group"><label>Password</label><input type="password" value={pass} onChange={e=>setPass(e.target.value)}/></div>
          <button className="btn-gold" type="submit" disabled={busy}>{busy?'Signing in...':'Sign In'}</button>
          {err&&<div className="auth-err">{err}</div>}
        </form>
      </div>
    </div>
  );
}

function MainApp({view,setView,session}){
  const [pendingCount,setPendingCount]=useState(0);
  useEffect(()=>{
    async function count(){
      const{count}=await sb.from('ops_assignments').select('id',{count:'exact',head:true}).eq('status','submitted');
      setPendingCount(count||0);
    }
    count();const t=setInterval(count,60000);return()=>clearInterval(t);
  },[]);
  const navItems=[
    {key:'dashboard', icon:'◈', label:'Dashboard'},
    {key:'tasks',     icon:'▤', label:'Tasks & Announcements'},
    {key:'broadcast', icon:'⊕', label:'New Task'},
    {key:'announce',  icon:'◈', label:'New Announcement'},
    {key:'stores',    icon:'◍', label:'Stores'},
    {key:'review',    icon:'◎', label:'HQ Review', badge:pendingCount||null},
    {key:'accounts',  icon:'◯', label:'Accounts'},
  ];
  return(
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="brand">Ugly Donuts</div>
          <div className="app-tag">Franchise Ops</div>
          <a href="https://uglycrm.netlify.app/" className="switch-link">← Back to Franchise OS</a>
        </div>
        <nav className="nav">
          {navItems.map(n=>(
            <button key={n.key} className={`nav-item ${view===n.key?'active':''}`} onClick={()=>setView(n.key)}>
              <span style={{fontSize:15,width:20,textAlign:'center'}}>{n.icon}</span>{n.label}
              {n.badge?<span className="nav-badge">{n.badge}</span>:null}
            </button>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div style={{marginBottom:4,fontSize:11,color:'var(--muted)'}}>{session.user.email}</div>
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>setView('password')}>Change Password</button>
            <button onClick={()=>sb.auth.signOut()} style={{color:'var(--red)'}}>Sign out</button>
          </div>
        </div>
      </aside>
      <main className="main">
        {view==='dashboard'&&<Dashboard setView={setView}/>}
        {view==='tasks'&&<TaskList setView={setView}/>}
        {view==='broadcast'&&<BroadcastTask onDone={()=>setView('tasks')}/>}
        {view==='stores'&&<StoreList setView={setView}/>}
        {view==='review'&&<HQReview/>}
        {view==='password'&&<ChangePassword onDone={()=>setView('dashboard')}/>}
        {view==='accounts'&&<AccountManager/>}
        {view==='announce'&&<Announcements/>}
      </main>
    </div>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────
function Dashboard({setView}){
  const [stats,setStats]=useState({stores:0,activeTasks:0,pending:0});
  const [taskStats,setTaskStats]=useState([]);
  const [storeStats,setStoreStats]=useState([]);
  const [popup,setPopup]=useState(null); // 'stores' | 'tasks' | 'pending'
  const [popupData,setPopupData]=useState([]);

  useEffect(()=>{
    async function load(){
      const[storesRes,tasksRes,assignRes]=await Promise.all([
        sb.from('franchisees').select('id,name,territory').eq('status','open'),
        sb.from('ops_tasks').select('*').eq('status','active').order('created_at',{ascending:false}),
        sb.from('ops_assignments').select('ops_task_id,franchisee_id,status'),
      ]);
      const stores=storesRes.data||[];
      const tasks=tasksRes.data||[];
      const assigns=assignRes.data||[];
      const pending=assigns.filter(a=>a.status==='submitted').length;
      setStats({stores:stores.length,activeTasks:tasks.length,pending});

      // Per-task completion rates
      const perTask=tasks.map(t=>{
        const ta=assigns.filter(a=>a.ops_task_id===t.id);
        const approved=ta.filter(a=>a.status==='approved').length;
        const submitted=ta.filter(a=>a.status==='submitted').length;
        const total=ta.length;
        const pct=total?Math.round(approved/total*100):0;
        return{...t,approved,submitted,total,pct};
      });
      setTaskStats(perTask);

      // Per-store completion (across all active tasks)
      if(stores.length&&tasks.length){
        const taskIds=tasks.map(t=>t.id);
        const perStore=stores.map(s=>{
          const mine=assigns.filter(a=>a.franchisee_id===s.id&&taskIds.includes(a.ops_task_id));
          const done=mine.filter(a=>a.status==='approved').length;
          return{...s,done,total:mine.length,pct:mine.length?Math.round(done/mine.length*100):0};
        }).sort((a,b)=>a.pct-b.pct);
        setStoreStats(perStore);
      }
    }
    load();
  },[]);

  const overallPct=useMemo(()=>{
    const total=taskStats.reduce((s,t)=>s+t.total,0);
    const done=taskStats.reduce((s,t)=>s+t.approved,0);
    return total?Math.round(done/total*100):0;
  },[taskStats]);

  useEffect(()=>{
    if(!popup){setPopupData([]);return;}
    async function loadPopup(){
      if(popup==='stores'){
        const{data}=await sb.from('franchisees').select('*').eq('status','open').order('name');
        setPopupData(data||[]);
      }else if(popup==='tasks'){
        const{data}=await sb.from('ops_tasks').select('*').eq('status','active').order('created_at',{ascending:false});
        setPopupData(data||[]);
      }else if(popup==='pending'){
        const{data}=await sb.from('ops_assignments').select('*,franchisees(name,store_name,territory),ops_tasks(title,category)').eq('status','submitted').order('updated_at',{ascending:false});
        setPopupData(data||[]);
      }
    }
    loadPopup();
  },[popup]);

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Ops Dashboard</div><div className="page-sub">Open store task management</div></div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-ghost" onClick={()=>setView('announce')}>+ New Announcement</button>
          <button className="btn btn-primary" onClick={()=>setView('broadcast')}>+ New Task</button>
        </div>
      </div>
      <div className="content">
        {/* Top stats */}
        <div className="card-grid-4" style={{marginBottom:24}}>
          <div className="card" style={{cursor:'pointer'}} onClick={()=>setPopup('stores')}>
            <div className="stat-label">Open Stores</div><div className="stat-value" style={{color:'var(--green)'}}>{stats.stores}</div>
            <div className="stat-sub">Operational · <span style={{color:'var(--green)'}}>View →</span></div>
          </div>
          <div className="card" style={{cursor:'pointer'}} onClick={()=>setPopup('tasks')}>
            <div className="stat-label">Active Tasks</div><div className="stat-value" style={{color:'var(--orange)'}}>{stats.activeTasks}</div>
            <div className="stat-sub">Broadcast tasks · <span style={{color:'var(--orange)'}}>View →</span></div>
          </div>
          <div className="card" style={{cursor:'pointer'}} onClick={()=>setPopup('pending')}>
            <div className="stat-label">Pending Review</div><div className="stat-value" style={{color:stats.pending>0?'var(--gold)':'var(--text)'}}>{stats.pending}</div>
            <div className="stat-sub">Awaiting HQ approval · <span style={{color:'var(--gold)'}}>View →</span></div>
          </div>
          <div className="card">
            <div className="stat-label">Overall Rate</div><div className="stat-value" style={{color:overallPct===100?'var(--green)':overallPct>50?'var(--gold)':'var(--text)'}}>{overallPct}%</div>
            <div className="stat-sub">Approved across all tasks</div>
          </div>
        </div>

        {/* Task-by-task completion */}
        <div className="card" style={{marginBottom:16}}>
          <div style={{fontWeight:700,marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            Task Completion by Task
            <button className="btn btn-ghost btn-sm" onClick={()=>setView('tasks')}>See all →</button>
          </div>
          {taskStats.length===0&&<div style={{color:'var(--muted)',fontSize:13}}>No active tasks yet.</div>}
          {taskStats.map(t=>{
            const days=daysUntil(t.due_date);
            return(
              <div key={t.id} style={{marginBottom:14,paddingBottom:14,borderBottom:'1px solid var(--border)'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
                  <span className={`cat-badge cat-${t.category}`}>{catLabel(t.category)}</span>
                  <span style={{flex:1,fontSize:13,fontWeight:600}}>{t.title}</span>
                  <div style={{display:'flex',gap:10,alignItems:'center',flexShrink:0}}>
                    {t.submitted>0&&<span style={{fontSize:11,color:'var(--gold)',fontWeight:600}}>{t.submitted} pending review</span>}
                    {days!==null&&<span style={{fontSize:11,color:days<0?'var(--red)':days<=3?'var(--orange)':'var(--muted)',whiteSpace:'nowrap'}}>{days<0?`${Math.abs(days)}d late`:days===0?'Due today':`${days}d left`}</span>}
                    <span style={{fontSize:12,fontWeight:700,color:t.pct===100?'var(--green)':t.pct>50?'var(--gold)':'var(--muted)',minWidth:36,textAlign:'right'}}>{t.pct}%</span>
                  </div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div className="progress-bar" style={{flex:1}}>
                    <div className="progress-fill" style={{width:`${t.pct}%`,background:t.pct===100?'var(--green)':'var(--orange)'}}/>
                  </div>
                  <span style={{fontSize:11,color:'var(--muted)',whiteSpace:'nowrap'}}>{t.approved}/{t.total} stores</span>
                </div>
              </div>
            );
          })}
        </div>

        {/* Store-level breakdown */}
        <div className="card">
          <div style={{fontWeight:700,marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            Store Completion (All Tasks)
            <button className="btn btn-ghost btn-sm" onClick={()=>setView('stores')}>See stores →</button>
          </div>
          {storeStats.length===0&&<div style={{color:'var(--muted)',fontSize:13}}>No data yet.</div>}
          {storeStats.map(s=>(
            <div key={s.id} style={{marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <div>
                  <span style={{fontSize:13,fontWeight:600}}>{s.name}</span>
                  <span style={{fontSize:11,color:'var(--muted)',marginLeft:8}}>{s.territory}</span>
                </div>
                <span style={{fontSize:12,color:s.pct===100?'var(--green)':s.pct>50?'var(--gold)':'var(--muted)',fontWeight:600}}>{s.done}/{s.total} · {s.pct}%</span>
              </div>
              <div className="progress-bar">
                <div className="progress-fill" style={{width:`${s.pct}%`,background:s.pct===100?'var(--green)':'var(--orange)'}}/>
              </div>
            </div>
          ))}
        </div>
      </div>
      {popup&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setPopup(null)}>
          <div className="modal modal-lg">
            <div className="modal-header">
              <div className="modal-title">
                {popup==='stores'&&`Open Stores (${popupData.length})`}
                {popup==='tasks'&&`Active Tasks (${popupData.length})`}
                {popup==='pending'&&`Pending Review (${popupData.length})`}
              </div>
              <button className="close-btn" onClick={()=>setPopup(null)}>×</button>
            </div>
            <div className="modal-body">
              {popup==='stores'&&(
                <div>
                  {popupData.length===0&&<div style={{color:'var(--muted)',textAlign:'center',padding:'30px 0'}}>No open stores yet.</div>}
                  {popupData.map(s=>(
                    <div key={s.id} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:14,fontWeight:700}}>{s.store_name||s.name}</div>
                        <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{s.name} · {s.territory}</div>
                      </div>
                      <div style={{textAlign:'right'}}>
                        {s.email&&<a href={`mailto:${s.email}`} style={{fontSize:12,color:'var(--blue)',textDecoration:'none',display:'block'}}>✉ {s.email}</a>}
                        {s.phone&&<a href={`tel:${s.phone}`} style={{fontSize:12,color:'var(--green)',textDecoration:'none',marginTop:2,display:'block'}}>📞 {s.phone}</a>}
                      </div>
                    </div>
                  ))}
                </div>
              )}
              {popup==='tasks'&&(
                <div>
                  {popupData.length===0&&<div style={{color:'var(--muted)',textAlign:'center',padding:'30px 0'}}>No active tasks.</div>}
                  {popupData.map(t=>{
                    const days=daysUntil(t.due_date);
                    return(
                      <div key={t.id} style={{padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                          <span className={`cat-badge cat-${t.category}`}>{catLabel(t.category)}</span>
                          <span style={{fontSize:14,fontWeight:700,flex:1}}>{t.title}</span>
                          {days!==null&&<span style={{fontSize:11,color:days<0?'var(--red)':days<=3?'var(--orange)':'var(--muted)',whiteSpace:'nowrap'}}>{days<0?`${Math.abs(days)}d late`:days===0?'Due today':`${days}d left`}</span>}
                        </div>
                        {t.description&&<div style={{fontSize:12,color:'var(--muted)',paddingLeft:0}}>{t.description}</div>}
                        <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>Due: {fmtDate(t.due_date)||'No date'} · Target: {t.target==='all'?'All stores':t.target}</div>
                      </div>
                    );
                  })}
                </div>
              )}
              {popup==='pending'&&(
                <div>
                  {popupData.length===0&&<div style={{color:'var(--muted)',textAlign:'center',padding:'30px 0'}}>No pending reviews.</div>}
                  {popupData.map(a=>(
                    <div key={a.id} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:14,fontWeight:700}}>{a.franchisees?.store_name||a.franchisees?.name}</div>
                        <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{a.franchisees?.territory}</div>
                        <div style={{display:'flex',gap:6,marginTop:4}}>
                          <span className={`cat-badge cat-${a.ops_tasks?.category}`}>{catLabel(a.ops_tasks?.category)}</span>
                          <span style={{fontSize:12}}>{a.ops_tasks?.title}</span>
                        </div>
                      </div>
                      <div style={{display:'flex',gap:8}}>
                        <button className="btn btn-danger btn-sm" onClick={async()=>{
                          const n=window.prompt('Rejection reason:');
                          if(n===null)return;
                          await sb.from('ops_assignments').update({status:'rejected',hq_notes:n,reviewed_at:new Date().toISOString(),reviewed_by:'HQ'}).eq('id',a.id);
                          setPopupData(pd=>pd.filter(x=>x.id!==a.id));
                          setStats(s=>({...s,pending:s.pending-1}));
                        }}>Reject</button>
                        <button className="btn btn-green btn-sm" onClick={async()=>{
                          await sb.from('ops_assignments').update({status:'approved',reviewed_at:new Date().toISOString(),reviewed_by:'HQ'}).eq('id',a.id);
                          setPopupData(pd=>pd.filter(x=>x.id!==a.id));
                          setStats(s=>({...s,pending:s.pending-1}));
                        }}>Approve ✓</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div className="modal-footer"><button className="btn btn-ghost" onClick={()=>setPopup(null)}>Close</button></div>
          </div>
        </div>
      )}
    </>
  );
}

// ── TASK LIST ─────────────────────────────────────────────
function TaskList({setView}){
  const [tasks,setTasks]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filterCat,setFilterCat]=useState('all');
  const [filterStatus,setFilterStatus]=useState('active');
  const [selected,setSelected]=useState(null);

  async function load(){
    setLoading(true);
    let q=sb.from('ops_tasks').select('*').order('created_at',{ascending:false});
    if(filterStatus!=='all')q=q.eq('status',filterStatus);
    const{data}=await q;
    setTasks(data||[]);setLoading(false);
  }
  useEffect(()=>{load();},[filterStatus]);

  const filtered=useMemo(()=>tasks.filter(t=>filterCat==='all'||t.category===filterCat),[tasks,filterCat]);

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Tasks & Announcements</div><div className="page-sub">Broadcast tasks and store announcements</div></div>
        <button className="btn btn-primary" onClick={()=>setView('broadcast')}>+ New Task</button>
      </div>
      <div className="content">
        <div className="filter-bar">
          <select value={filterCat} onChange={e=>setFilterCat(e.target.value)}>
            <option value="all">All Categories</option>
            {CATEGORIES.map(c=><option key={c.key} value={c.key}>{c.label}</option>)}
          </select>
          <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
            <option value="active">Active</option>
            <option value="completed">Completed</option>
            <option value="archived">Archived</option>
            <option value="all">All</option>
          </select>
          <span style={{marginLeft:'auto',fontSize:12,color:'var(--muted)'}}>{filtered.length} tasks</span>
        </div>
        {loading?<div className="loading">Loading...</div>:filtered.length===0?(
          <div className="empty"><div className="empty-icon">▤</div><div className="empty-title">No tasks yet</div><div style={{fontSize:13,color:'var(--muted)'}}>Create a broadcast task to get started</div></div>
        ):(
          filtered.map(t=><TaskCard key={t.id} task={t} onClick={()=>setSelected(t)} onRefresh={load}/>)
        )}
      </div>
      {selected&&<TaskDetailModal task={selected} onClose={()=>{setSelected(null);load();}}/>}
    </>
  );
}

function TaskCard({task,onClick,onRefresh}){
  const [stats,setStats]=useState({total:0,approved:0,submitted:0,pending:0});
  useEffect(()=>{
    sb.from('ops_assignments').select('status').eq('ops_task_id',task.id).then(r=>{
      const a=r.data||[];
      setStats({total:a.length,approved:a.filter(x=>x.status==='approved').length,submitted:a.filter(x=>x.status==='submitted').length,pending:a.filter(x=>x.status==='pending'||x.status==='in_progress').length});
    });
  },[task.id]);
  const pct=stats.total?Math.round(stats.approved/stats.total*100):0;
  const days=daysUntil(task.due_date);

  async function archive(e){
    e.stopPropagation();
    if(!window.confirm('Archive this task?'))return;
    await sb.from('ops_tasks').update({status:'archived'}).eq('id',task.id);
    onRefresh();
  }

  return(
    <div className="task-card" onClick={onClick}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <span className={`cat-badge cat-${task.category}`}>{catLabel(task.category)}</span>
          {task.require_hq_approval&&<span style={{fontSize:10,background:'rgba(155,120,212,.15)',color:'var(--purple)',padding:'2px 6px',borderRadius:4,fontWeight:700}}>HQ APPROVAL</span>}
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {days!==null&&<span style={{fontSize:11,color:days<0?'var(--red)':days<=3?'var(--orange)':'var(--muted)',fontWeight:600}}>{days<0?`${Math.abs(days)}d overdue`:days===0?'Due today':`${days}d left`}</span>}
          <button className="btn btn-ghost btn-sm" onClick={archive} style={{fontSize:11,padding:'2px 8px'}}>Archive</button>
        </div>
      </div>
      <div className="task-card-title">{task.title}</div>
      {task.description&&<div style={{fontSize:12,color:'var(--muted)',marginBottom:10,lineHeight:1.5}}>{task.description}</div>}
      <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:8}}>
        <span style={{fontSize:12,color:'var(--muted)'}}>Due: {fmtDate(task.due_date)||'No date'}</span>
        <span style={{fontSize:12,color:'var(--muted)'}}>Target: {task.target==='all'?'All open stores':task.target}</span>
      </div>
      {stats.total>0&&(
        <>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
            <span style={{color:'var(--muted)'}}>{stats.approved}/{stats.total} approved</span>
            <span style={{display:'flex',gap:10}}>
              {stats.submitted>0&&<span style={{color:'var(--gold)'}}>{stats.submitted} pending review</span>}
              {stats.pending>0&&<span style={{color:'var(--muted)'}}>{stats.pending} not started</span>}
            </span>
          </div>
          <div className="progress-bar">
            <div className="progress-fill" style={{width:`${pct}%`,background:pct===100?'var(--green)':'var(--orange)'}}/>
          </div>
        </>
      )}
    </div>
  );
}

// ── TASK DETAIL MODAL ─────────────────────────────────────
function TaskDetailModal({task,onClose}){
  const [assignments,setAssignments]=useState([]);
  const [subtasks,setSubtasks]=useState([]);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState('overview');
  const [selected,setSelected]=useState(null); // selected assignment for detail

  async function load(){
    setLoading(true);
    const[aRes,sRes]=await Promise.all([
      sb.from('ops_assignments').select('*,franchisees(name,territory,email)').eq('ops_task_id',task.id).order('created_at'),
      sb.from('ops_subtasks').select('*').eq('ops_task_id',task.id).order('sort_order'),
    ]);
    setAssignments(aRes.data||[]);setSubtasks(sRes.data||[]);setLoading(false);
  }
  useEffect(()=>{load();},[]);

  async function approve(aId){
    await sb.from('ops_assignments').update({status:'approved',reviewed_at:new Date().toISOString(),reviewed_by:'HQ'}).eq('id',aId);
    load();
  }
  async function reject(aId){
    const note=window.prompt('Reason for rejection (optional):');
    if(note===null)return;
    await sb.from('ops_assignments').update({status:'rejected',hq_notes:note,reviewed_at:new Date().toISOString(),reviewed_by:'HQ'}).eq('id',aId);
    load();
  }
  async function markComplete(){
    if(!window.confirm('Mark this task as completed for all stores?'))return;
    await sb.from('ops_tasks').update({status:'completed'}).eq('id',task.id);
    onClose();
  }

  const byStatus={submitted:[],approved:[],rejected:[],pending:[],in_progress:[]};
  assignments.forEach(a=>{if(byStatus[a.status])byStatus[a.status].push(a);});
  const totalApproved=byStatus.approved.length;
  const pct=assignments.length?Math.round(totalApproved/assignments.length*100):0;

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-xl">
        <div className="modal-header">
          <div>
            <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:4}}>
              <span className={`cat-badge cat-${task.category}`}>{catLabel(task.category)}</span>
              {task.require_hq_approval&&<span style={{fontSize:10,background:'rgba(155,120,212,.15)',color:'var(--purple)',padding:'2px 6px',borderRadius:4,fontWeight:700}}>HQ APPROVAL REQUIRED</span>}
            </div>
            <div className="modal-title">{task.title}</div>
            {task.description&&<div style={{fontSize:12,color:'var(--muted)',marginTop:3}}>{task.description}</div>}
          </div>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>

        <div className="tab-bar">
          {[{k:'overview',l:'Overview'},{k:'stores',l:`Stores (${assignments.length})`},{k:'subtasks',l:`Sub-tasks (${subtasks.length})`}].map(t=>(
            <button key={t.k} className={`tab-btn ${tab===t.k?'active':''}`} onClick={()=>setTab(t.k)}>{t.l}</button>
          ))}
        </div>

        <div className="modal-body">
          {tab==='overview'&&(
            <>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
                {[{l:'Total Stores',v:assignments.length,c:'var(--text)'},{l:'Approved',v:byStatus.approved.length,c:'var(--green)'},{l:'Pending Review',v:byStatus.submitted.length,c:'var(--gold)'},{l:'Not Started',v:byStatus.pending.length+byStatus.in_progress.length,c:'var(--muted)'}].map(s=>(
                  <div key={s.l} style={{background:'var(--panel2)',borderRadius:8,padding:12,textAlign:'center'}}>
                    <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:4}}>{s.l}</div>
                    <div style={{fontSize:24,fontWeight:700,color:s.c}}>{s.v}</div>
                  </div>
                ))}
              </div>
              <div style={{marginBottom:16}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:13}}>
                  <span style={{color:'var(--muted)'}}>Overall completion</span>
                  <span style={{fontWeight:700,color:pct===100?'var(--green)':'var(--orange)'}}>{pct}%</span>
                </div>
                <div className="progress-bar" style={{height:10}}>
                  <div className="progress-fill" style={{width:`${pct}%`,background:pct===100?'var(--green)':'var(--orange)'}}/>
                </div>
              </div>
              <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                {task.status==='active'&&<button className="btn btn-green btn-sm" onClick={markComplete}>Mark All Complete</button>}
              </div>

              {/* Submitted - needs review */}
              {byStatus.submitted.length>0&&(
                <div style={{marginTop:20}}>
                  <div style={{fontSize:12,fontWeight:700,color:'var(--gold)',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:10}}>Awaiting HQ Review ({byStatus.submitted.length})</div>
                  {byStatus.submitted.map(a=>(
                    <StoreAssignmentRow key={a.id} a={a} subtasks={subtasks} onApprove={()=>approve(a.id)} onReject={()=>reject(a.id)} onView={()=>setSelected(a)} showActions/>
                  ))}
                </div>
              )}
            </>
          )}

          {tab==='stores'&&(
            loading?<div className="loading">Loading...</div>:(
              <>
                {['submitted','approved','in_progress','pending','rejected'].map(status=>{
                  const items=byStatus[status]||[];
                  if(!items.length)return null;
                  const colors={submitted:'var(--gold)',approved:'var(--green)',in_progress:'var(--blue)',pending:'var(--muted)',rejected:'var(--red)'};
                  return(
                    <div key={status} style={{marginBottom:20}}>
                      <div style={{fontSize:11,fontWeight:700,color:colors[status],letterSpacing:'.08em',textTransform:'uppercase',marginBottom:10}}>
                        {STATUS_LABELS[status]} ({items.length})
                      </div>
                      {items.map(a=>(
                        <StoreAssignmentRow key={a.id} a={a} subtasks={subtasks}
                          onApprove={status==='submitted'?()=>approve(a.id):null}
                          onReject={status==='submitted'?()=>reject(a.id):null}
                          onView={()=>setSelected(a)}
                          showActions={status==='submitted'}/>
                      ))}
                    </div>
                  );
                })}
              </>
            )
          )}

          {tab==='subtasks'&&(
            <div>
              {subtasks.length===0&&<div style={{color:'var(--muted)',textAlign:'center',padding:'30px 0'}}>No sub-tasks defined.</div>}
              {subtasks.map((st,i)=>(
                <div key={st.id} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
                  <div style={{width:24,height:24,borderRadius:'50%',background:'var(--panel2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'var(--muted)',flexShrink:0}}>{i+1}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600}}>{st.title}</div>
                    {st.description&&<div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{st.description}</div>}
                  </div>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <span style={{fontSize:11,background:'rgba(255,255,255,.05)',padding:'2px 8px',borderRadius:4,color:'var(--muted)'}}>
                      {PROOF_TYPES.find(p=>p.key===st.proof_type)?.label||st.proof_type}
                    </span>
                    {st.is_required&&<span style={{fontSize:10,color:'var(--red)',fontWeight:700}}>REQUIRED</span>}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
        <div className="modal-footer"><button className="btn btn-ghost" onClick={onClose}>Close</button></div>
      </div>
      {selected&&<AssignmentDetailModal assignment={selected} subtasks={subtasks} onClose={()=>{setSelected(null);load();}} onApprove={()=>{approve(selected.id);setSelected(null);}} onReject={()=>{reject(selected.id);setSelected(null);}}/>}
    </div>
  );
}

function StoreAssignmentRow({a,subtasks,onApprove,onReject,onView,showActions}){
  const [completions,setCompletions]=useState([]);
  useEffect(()=>{
    sb.from('ops_completions').select('*').eq('ops_assignment_id',a.id).then(r=>setCompletions(r.data||[]));
  },[a.id]);
  const done=completions.filter(c=>c.completed).length;
  const pct=subtasks.length?Math.round(done/subtasks.length*100):0;
  const statusColors={pending:'var(--muted)',in_progress:'var(--blue)',submitted:'var(--gold)',approved:'var(--green)',rejected:'var(--red)'};

  return(
    <div className="store-row">
      <div style={{flex:1}}>
        <div style={{fontSize:13,fontWeight:600}}>{a.franchisees?.name}</div>
        <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>{a.franchisees?.territory}</div>
        {subtasks.length>0&&(
          <div style={{marginTop:6,width:120}}>
            <div className="progress-bar" style={{height:4}}>
              <div className="progress-fill" style={{width:`${pct}%`,background:pct===100?'var(--green)':'var(--orange)'}}/>
            </div>
            <div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>{done}/{subtasks.length} sub-tasks</div>
          </div>
        )}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontSize:11,fontWeight:700,color:statusColors[a.status]||'var(--muted)',background:(statusColors[a.status]||'var(--muted)')+'22',padding:'2px 8px',borderRadius:4}}>
          {STATUS_LABELS[a.status]||a.status}
        </span>
        <button className="btn btn-ghost btn-sm" onClick={onView} style={{fontSize:11}}>View</button>
        {showActions&&onApprove&&<button className="btn btn-green btn-sm" onClick={onApprove} style={{fontSize:11}}>Approve</button>}
        {showActions&&onReject&&<button className="btn btn-danger btn-sm" onClick={onReject} style={{fontSize:11}}>Reject</button>}
      </div>
    </div>
  );
}

// ── ASSIGNMENT DETAIL (per store proof view) ──────────────

  const getCompletion=(stId)=>completions.find(c=>c.ops_subtask_id===stId);
  const done=completions.filter(c=>c.completed).length;

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-lg">
        <div className="modal-header">
          <div>
            <div className="modal-title">{assignment.franchisees?.name}</div>
            <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{assignment.franchisees?.territory} · {assignment.franchisees?.email}</div>

        <div className="modal-body">

              <div style={{fontSize:14,fontWeight:700,color:assignment.status==='approved'?'var(--green)':assignment.status==='submitted'?'var(--gold)':'var(--muted)',marginTop:2}}>{STATUS_LABELS[assignment.status]}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <span style={{fontSize:11,color:'var(--muted)'}}>{done}/{subtasks.length} sub-tasks complete</span>

          {loading?<div className="loading">Loading...</div>:(

                    <div style={{width:20,height:20,borderRadius:5,background:comp?.completed?'var(--green)':'var(--panel2)',border:`1.5px solid ${comp?.completed?'var(--green)':'var(--border2)'}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>

                    </div>

                      <div style={{fontSize:13,fontWeight:600}}>{st.title}</div>
                      <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>{PROOF_TYPES.find(p=>p.key===st.proof_type)?.label}</div>
                    </div>
                    {!comp?.completed&&<span style={{fontSize:11,color:'var(--muted)'}}>Not submitted</span>}
                    {comp?.completed&&<span style={{fontSize:11,color:'var(--muted)'}}>{fmtDate(comp.completed_at)}</span>}
                  </div>
                  {comp?.completed&&(
                    <div className="proof-box">
                      {comp.proof_text&&<div style={{fontSize:13,color:'var(--text)',marginBottom:comp.proof_image_url?8:0}}>{comp.proof_text}</div>}
                      {comp.proof_image_url&&(
                        <div>
                          <img src={comp.proof_image_url} alt="proof" style={{maxWidth:'100%',maxHeight:200,borderRadius:6,objectFit:'cover',cursor:'pointer'}} onClick={()=>window.open(comp.proof_image_url,'_blank')}/>
                        </div>

// ── BROADCAST TASK (New Task) ─────────────────────────────
function BroadcastTask({onDone}){
  const [stores,setStores]=useState([]);
  const [form,setForm]=useState({title:'',description:'',category:'operations',due_date:'',target:'all',require_hq_approval:false});
  const [subtasks,setSubtasks]=useState([{title:'',proof_type:'photo',description:'',is_required:true}]);
  const [selectedStores,setSelectedStores]=useState([]);
  const [busy,setBusy]=useState(false);
  const [step,setStep]=useState(1); // 1=task info, 2=subtasks, 3=target
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  useEffect(()=>{
    sb.from('franchisees').select('id,name,store_name,territory,email').eq('status','open').order('name').then(r=>setStores(r.data||[]));
  },[]);

  function addSubtask(){setSubtasks(s=>[...s,{title:'',proof_type:'photo',description:'',is_required:true}]);}
  function removeSubtask(i){setSubtasks(s=>s.filter((_,idx)=>idx!==i));}
  function updateSubtask(i,k,v){setSubtasks(s=>s.map((x,idx)=>idx===i?{...x,[k]:v}:x));}
  function toggleStore(id){setSelectedStores(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);}

  async function broadcast(){
    if(!form.title||subtasks.some(s=>!s.title)){alert('Fill in task title and all sub-task names.');return;}
    setBusy(true);
    // 1. Create task
    const{data:task}=await sb.from('ops_tasks').insert([{...form,target:form.target==='all'?'all':selectedStores.join(',')}]).select().single();
    if(!task){setBusy(false);return;}
    // 2. Create subtasks
    await sb.from('ops_subtasks').insert(subtasks.map((s,i)=>({ops_task_id:task.id,sort_order:i+1,...s})));
    // 3. Create assignments per store
    const targetStores=form.target==='all'?stores:stores.filter(s=>selectedStores.includes(s.id));
    if(targetStores.length){
      await sb.from('ops_assignments').insert(targetStores.map(s=>({ops_task_id:task.id,franchisee_id:s.id,status:'pending'})));
    }
    // Send email notifications
    if(targetStores.length){
      const emailTargets=targetStores.filter(s=>s.email).map(s=>({email:s.email,name:s.store_name||s.name}));
      if(emailTargets.length){
        await sendEmail(
          emailTargets,
          `New Task: ${form.title}`,
          taskEmailHtml(form.title, catLabel(form.category), form.due_date, 'your store')
        );
      }
    }
    setBusy(false);onDone();
  }

  const stepValid={1:!!form.title,2:subtasks.length>0&&subtasks.every(s=>s.title),3:form.target==='all'||selectedStores.length>0};

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">New Broadcast Task</div><div className="page-sub">Create and send to open stores</div></div>
        <button className="btn btn-ghost" onClick={onDone}>Cancel</button>
      </div>
      <div className="content">
        {/* Step indicator */}
        <div style={{display:'flex',gap:0,marginBottom:28}}>
          {[{n:1,l:'Task Info'},{n:2,l:'Sub-Tasks'},{n:3,l:'Target & Send'}].map((s,i)=>(
            <div key={s.n} style={{display:'flex',alignItems:'center'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,cursor:step>s.n?'pointer':'default'}} onClick={()=>{if(step>s.n||stepValid[step])setStep(s.n);}}>
                <div style={{width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:12,background:step===s.n?'var(--orange)':step>s.n?'var(--green)':'var(--panel2)',color:step>=s.n?'var(--black)':'var(--muted)',border:step===s.n?'none':`1px solid ${step>s.n?'var(--green)':'var(--border2)'}`}}>
                  {step>s.n?'✓':s.n}
                </div>
                <span style={{fontSize:13,fontWeight:step===s.n?700:400,color:step===s.n?'var(--orange)':step>s.n?'var(--green)':'var(--muted)'}}>{s.l}</span>
              </div>
              {i<2&&<div style={{width:40,height:1,background:'var(--border)',margin:'0 12px'}}/>}
            </div>
          ))}
        </div>

        {step===1&&(
          <div className="card" style={{maxWidth:600}}>
            <div className="form-group"><label>Task Title</label><input value={form.title} onChange={e=>set('title',e.target.value)} placeholder="e.g. Summer Menu Launch, QA Follow-up"/></div>
            <div className="form-group"><label>Description</label><textarea value={form.description} onChange={e=>set('description',e.target.value)} placeholder="What needs to be done and why..."/></div>
            <div className="form-row">
              <div className="form-group">
                <label>Category</label>
                <select value={form.category} onChange={e=>set('category',e.target.value)}>
                  {CATEGORIES.map(c=><option key={c.key} value={c.key}>{c.label}</option>)}
                </select>
              </div>
              <div className="form-group"><label>Due Date</label><input type="date" value={form.due_date} onChange={e=>set('due_date',e.target.value)}/></div>
            </div>
            <div className="form-group">
              <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',textTransform:'none',letterSpacing:0}}>
                <input type="checkbox" checked={form.require_hq_approval} onChange={e=>set('require_hq_approval',e.target.checked)} style={{width:'auto',margin:0}}/>
                <span style={{fontSize:13,fontWeight:500,color:'var(--text)'}}>Require HQ approval after franchisee submits</span>
              </label>
              <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>If unchecked, submissions are auto-approved</div>
            </div>
            <button className="btn btn-primary" onClick={()=>setStep(2)} disabled={!stepValid[1]}>Next: Add Sub-Tasks →</button>
          </div>
        )}

        {step===2&&(
          <div className="card" style={{maxWidth:680}}>
            <div style={{fontWeight:700,marginBottom:4}}>Sub-Tasks</div>
            <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>Break down what franchisees need to complete and what proof to submit</div>
            {subtasks.map((st,i)=>(
              <div key={i} style={{background:'var(--panel2)',border:'1px solid var(--border)',borderRadius:10,padding:16,marginBottom:12}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                  <span style={{fontSize:12,fontWeight:700,color:'var(--muted)'}}>Sub-task {i+1}</span>
                  {subtasks.length>1&&<button onClick={()=>removeSubtask(i)} style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:16,padding:0}}>✕</button>}
                </div>
                <div className="form-group" style={{marginBottom:10}}>
                  <label>Title</label>
                  <input value={st.title} onChange={e=>updateSubtask(i,'title',e.target.value)} placeholder="e.g. Order new ingredients, Upload setup photo"/>
                </div>
                <div className="form-row">
                  <div className="form-group" style={{marginBottom:0}}>
                    <label>Proof Required</label>
                    <select value={st.proof_type} onChange={e=>updateSubtask(i,'proof_type',e.target.value)}>
                      {PROOF_TYPES.map(p=><option key={p.key} value={p.key}>{p.label}</option>)}
                    </select>
                  </div>
                  <div className="form-group" style={{marginBottom:0}}>
                    <label>Description (optional)</label>
                    <input value={st.description} onChange={e=>updateSubtask(i,'description',e.target.value)} placeholder="Additional context..."/>
                  </div>
                </div>
                <div style={{marginTop:10}}>
                  <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:12,fontWeight:500,color:'var(--muted)'}}>
                    <input type="checkbox" checked={st.is_required} onChange={e=>updateSubtask(i,'is_required',e.target.checked)} style={{width:'auto',margin:0}}/>
                    Required sub-task
                  </label>
                </div>
              </div>
            ))}
            <button className="btn btn-ghost btn-sm" onClick={addSubtask} style={{marginBottom:16}}>+ Add Sub-Task</button>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-ghost" onClick={()=>setStep(1)}>← Back</button>
              <button className="btn btn-primary" onClick={()=>setStep(3)} disabled={!stepValid[2]}>Next: Choose Stores →</button>
            </div>
          </div>
        )}

        {step===3&&(
          <div className="card" style={{maxWidth:600}}>
            <div style={{fontWeight:700,marginBottom:14}}>Target Stores</div>
            <div style={{display:'flex',gap:10,marginBottom:16}}>
              <button className={`btn btn-sm ${form.target==='all'?'btn-primary':'btn-ghost'}`} onClick={()=>set('target','all')}>All Open Stores ({stores.length})</button>
              <button className={`btn btn-sm ${form.target==='select'?'btn-primary':'btn-ghost'}`} onClick={()=>set('target','select')}>Select Stores</button>
            </div>

            {form.target==='select'&&(
              <div style={{marginBottom:20}}>
                {stores.length===0&&<div style={{color:'var(--muted)',fontSize:13}}>No open stores yet.</div>}
                {stores.map(s=>(
                  <div key={s.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:'1px solid var(--border)',cursor:'pointer'}} onClick={()=>toggleStore(s.id)}>
                    <div style={{width:18,height:18,borderRadius:4,border:`1.5px solid ${selectedStores.includes(s.id)?'var(--orange)':'var(--border2)'}`,background:selectedStores.includes(s.id)?'var(--orange)':'var(--panel2)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      {selectedStores.includes(s.id)&&<span style={{fontSize:11,color:'#000',fontWeight:700}}>✓</span>}
                    </div>
                    <div>
                      <div style={{fontSize:13,fontWeight:600}}>{s.name}</div>
                      <div style={{fontSize:11,color:'var(--muted)'}}>{s.territory}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Summary */}
            <div style={{background:'var(--panel2)',borderRadius:10,padding:16,marginBottom:20}}>
              <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',marginBottom:10,textTransform:'uppercase',letterSpacing:'.06em'}}>Task Summary</div>
              <div style={{fontSize:13,marginBottom:4}}><span style={{color:'var(--muted)'}}>Title:</span> {form.title}</div>
              <div style={{fontSize:13,marginBottom:4}}><span style={{color:'var(--muted)'}}>Category:</span> {catLabel(form.category)}</div>
              <div style={{fontSize:13,marginBottom:4}}><span style={{color:'var(--muted)'}}>Due:</span> {fmtDate(form.due_date)||'No date'}</div>
              <div style={{fontSize:13,marginBottom:4}}><span style={{color:'var(--muted)'}}>Sub-tasks:</span> {subtasks.length}</div>
              <div style={{fontSize:13,marginBottom:4}}><span style={{color:'var(--muted)'}}>HQ Approval:</span> {form.require_hq_approval?'Required':'Auto-approve'}</div>
              <div style={{fontSize:13}}><span style={{color:'var(--muted)'}}>Sending to:</span> {form.target==='all'?`All ${stores.length} open stores`:`${selectedStores.length} selected stores`}</div>
            </div>

            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-ghost" onClick={()=>setStep(2)}>← Back</button>
              <button className="btn btn-primary" onClick={broadcast} disabled={busy||!stepValid[3]}>
                {busy?'Broadcasting...':`Broadcast to ${form.target==='all'?stores.length:selectedStores.length} Store${(form.target==='all'?stores.length:selectedStores.length)!==1?'s':''} →`}
              </button>
            </div>
          </div>
        )}
      </div>
    </>
  );
}

// ── STORE LIST ────────────────────────────────────────────
function StoreList({setView}){
  const [stores,setStores]=useState([]);
  const [tasks,setTasks]=useState([]);
  const [assignments,setAssignments]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selected,setSelected]=useState(null);
  const [search,setSearch]=useState('');
  const [registeredStores,setRegisteredStores]=useState(new Set());

  useEffect(()=>{
    async function load(){
      setLoading(true);
      const[sRes,tRes,aRes,pRes]=await Promise.all([
        sb.from('franchisees').select('*').eq('status','open').order('store_name'),
        sb.from('ops_tasks').select('id,title,category').eq('status','active'),
        sb.from('ops_assignments').select('*'),
        sb.from('profiles').select('store,full_name,name').eq('role','franchisee'),
      ]);
      setStores(sRes.data||[]);setTasks(tRes.data||[]);setAssignments(aRes.data||[]);
      // Build set of store names that have accounts
      const registeredStores=new Set((pRes.data||[]).map(p=>p.store).filter(Boolean));
      setRegisteredStores(registeredStores);
      setLoading(false);
    }
    load();
  },[]);

  const filtered=useMemo(()=>{
    const q=search.toLowerCase();
    return stores.filter(s=>!q||
      s.store_name?.toLowerCase().includes(q)||
      s.name?.toLowerCase().includes(q)||
      s.territory?.toLowerCase().includes(q)||
      s.email?.toLowerCase().includes(q)
    );
  },[stores,search]);

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Open Stores</div><div className="page-sub">{stores.length} operational franchisees</div></div>
      </div>
      <div className="content">
        <div className="filter-bar" style={{marginBottom:16}}>
          <input placeholder="Search store name, territory, email..." value={search} onChange={e=>setSearch(e.target.value)} style={{minWidth:280}}/>
          <span style={{marginLeft:'auto',fontSize:12,color:'var(--muted)'}}>{filtered.length} stores</span>
        </div>
        {loading?<div className="loading">Loading...</div>:stores.length===0?(
          <div className="empty"><div className="empty-icon">◍</div><div className="empty-title">No open stores yet</div><div style={{fontSize:13,color:'var(--muted)'}}>Stores appear here when marked Open in Franchise OS</div></div>
        ):(()=>{
          const unregistered=filtered.filter(s=>!registeredStores.has(s.store_name||s.name));
          const registered=filtered.filter(s=>registeredStores.has(s.store_name||s.name));
          return(
            <div>
              {/* Unregistered — needs attention */}
              {unregistered.length>0&&(
                <div style={{marginBottom:24}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,padding:'10px 14px',background:'rgba(224,82,82,.08)',border:'1px solid rgba(224,82,82,.25)',borderRadius:10}}>
                    <span style={{fontSize:16}}>⚠</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:700,color:'var(--red)'}}>{unregistered.length} store{unregistered.length>1?'s':''} without Ops account</div>
                      <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>These stores cannot log in to Franchise Ops yet</div>
                    </div>
                  </div>
                  {unregistered.map(s=>{

// ── ACCOUNT MANAGER ──────────────────────────────────────
function AccountManager(){
  const [accounts,setAccounts]=useState([]);
  const [unregistered,setUnregistered]=useState([]);
  const [loading,setLoading]=useState(true);
  const [editMember,setEditMember]=useState(null);
  const [busy,setBusy]=useState(null);
  const [msgs,setMsgs]=useState({});
  const [emailInputs,setEmailInputs]=useState({});
  const [filterRole,setFilterRole]=useState('all');

  async function load(){
    setLoading(true);
    const[pRes,sRes]=await Promise.all([
      sb.from('profiles').select('id,full_name,name,title,role,store,is_active,created_at').order('full_name'),
      sb.from('franchisees').select('id,name,store_name,territory,email').eq('status','open').order('store_name'),
    ]);
    const profiles=pRes.data||[];
    const allStores=sRes.data||[];
    const registeredNames=new Set(profiles.filter(p=>p.role==='franchisee').map(p=>p.store).filter(Boolean));
    setAccounts(profiles);
    setUnregistered(allStores.filter(s=>!registeredNames.has(s.store_name||s.name)));
    setLoading(false);
  }
  useEffect(()=>{load();},[]);

  async function approveStore(s){
    const email=emailInputs[s.id]||s.email;
    if(!email){setMsgs(m=>({...m,[s.id]:'Please enter an email address.'}));return;}
    setBusy(s.id);
    const storeName=s.store_name||s.name||'';
    try{
      const res=await fetch(CREATE_ACCOUNT_FN,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email,storeName,franchiseeId:s.id}),
      });
      const data=await res.json();
      if(!res.ok||data.error){
        setMsgs(m=>({...m,[s.id]:'Error: '+(data.error||'Unknown error')}));
      }else{
        setMsgs(m=>({...m,[s.id]:data.emailSent
          ?`✓ Account created and login sent to ${email}`
          :`✓ Account created. Email failed — temp password: ${data.tempPass}`
        }));
        load();
      }
    }catch(e){
      setMsgs(m=>({...m,[s.id]:'Error: '+e.message}));
    }
    setBusy(null);
  }
  }

  async function toggleActive(m){await sb.from('profiles').update({is_active:!m.is_active}).eq('id',m.id);load();}
  async function deleteAccount(m){
    if(!window.confirm(`Delete ${m.full_name||m.name||'this account'}? Cannot be undone.`))return;
    await sb.from('profiles').delete().eq('id',m.id);load();
  }

  const filtered=accounts.filter(a=>filterRole==='all'||a.role===filterRole);

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Accounts</div><div className="page-sub">Franchisee and HQ account management</div></div>
      </div>
      <div className="content">
        {/* Pending activation */}
        {unregistered.length>0&&(
          <div style={{marginBottom:24}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,padding:'10px 14px',background:'rgba(224,82,82,.08)',border:'1px solid rgba(224,82,82,.25)',borderRadius:10}}>
              <span style={{fontSize:16}}>⚠</span>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:'var(--red)'}}>{unregistered.length} store{unregistered.length>1?'s':''} need Ops account activation</div>
                <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>Enter email and approve to create login access</div>
              </div>
            </div>
            {unregistered.map(s=>(
              <div key={s.id} style={{background:'var(--panel)',border:'1px solid rgba(224,82,82,.2)',borderRadius:10,padding:16,marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
                  <div style={{flex:1,minWidth:160}}>
                    <div style={{fontSize:14,fontWeight:700}}>{s.store_name||s.name}</div>
                    <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{s.name} · {s.territory}</div>
                  </div>
                  <input value={emailInputs[s.id]||s.email||''} onChange={e=>setEmailInputs(ei=>({...ei,[s.id]:e.target.value}))}
                    placeholder="franchisee@email.com" type="email"
                    style={{flex:2,minWidth:200,background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'8px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none'}}/>
                  <button className="btn btn-primary btn-sm" disabled={busy===s.id||!(emailInputs[s.id]||s.email)} onClick={()=>approveStore(s)} style={{whiteSpace:'nowrap'}}>
                    {busy===s.id?'Creating...':'Approve & Send Login →'}
                  </button>
                </div>
                {msgs[s.id]&&(
                  <div style={{marginTop:8,fontSize:12,color:msgs[s.id].startsWith('✓')?'var(--green)':'var(--red)',padding:'6px 10px',background:msgs[s.id].startsWith('✓')?'rgba(95,184,122,.08)':'rgba(224,82,82,.08)',borderRadius:6}}>
                    {msgs[s.id]}
                  </div>
                )}
              </div>
            ))}
          </div>
        )}

        {/* Account list */}
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          {['franchisee','hq','all'].map(r=>(
            <button key={r} className={`btn btn-sm ${filterRole===r?'btn-primary':'btn-ghost'}`} onClick={()=>setFilterRole(r)}>
              {r==='franchisee'?'Franchisees':r==='hq'?'HQ Team':'All'}
            </button>
          ))}
          <span style={{marginLeft:'auto',fontSize:12,color:'var(--muted)'}}>{filtered.length} accounts</span>
        </div>

        {loading?<div className="loading">Loading...</div>:(
          <div className="table-wrap">
            <table>
              <thead><tr><th>Name</th><th>Store</th><th>Role</th><th>Status</th><th>Action</th></tr></thead>
              <tbody>
                {filtered.length===0&&<tr><td colSpan={5}><div className="empty"><div className="empty-title">No accounts yet</div></div></td></tr>}
                {filtered.map(m=>(
                  <tr key={m.id}>
                    <td style={{fontWeight:600}}>{m.full_name||m.name||'—'}</td>
                    <td style={{fontSize:12,color:'var(--muted)'}}>{m.store||'—'}</td>
                    <td>
                      <div style={{display:'flex',flexDirection:'column',gap:3}}>
                        {m.title&&<span style={{fontSize:11,background:'rgba(95,184,122,.15)',color:'#5FB87A',padding:'2px 8px',borderRadius:4,fontWeight:700}}>{m.title}</span>}
                        <span style={{fontSize:10,color:'var(--muted)'}}>{m.role==='hq'?'HQ':'Franchisee'}</span>
                      </div>
                    </td>
                    <td><span className={`badge ${m.is_active!==false?'badge-green':'badge-red'}`}>{m.is_active!==false?'Active':'Inactive'}</span></td>
                    <td style={{display:'flex',gap:6}}>
                      <button className="btn btn-ghost btn-sm" onClick={()=>setEditMember(m)}>Edit</button>
                      <button className="btn btn-ghost btn-sm" onClick={()=>toggleActive(m)}>{m.is_active!==false?'Deactivate':'Reactivate'}</button>
                      <button className="btn btn-danger btn-sm" onClick={()=>deleteAccount(m)}>Delete</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
      {editMember&&<EditAccountModal member={editMember} stores={[]} onClose={()=>{setEditMember(null);load();}}/>}
    </>
  );
}

          {msg&&<div style={{marginTop:10,fontSize:13,color:msg.startsWith('Error')?'var(--red)':'var(--green)'}}>{msg}</div>}
